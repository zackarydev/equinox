        moonHudCtx.arc(cx + shadowDir * coverAmount * r * 1.1, cy, r + 1, 0, Math.PI * 2);
        moonHudCtx.fill();
        moonHudCtx.restore();
      }
    }
    function updateTimeDisplay() {
      const hours = Math.floor(timeOfDay * 24);
      const mins = Math.floor((timeOfDay * 24 - hours) * 60);
      const hStr = String(hours).padStart(2, '0');
      const mStr = String(mins).padStart(2, '0');
      let period = '';
      if (timeOfDay > 0.3 && timeOfDay < 0.7) period = 'DAY';
      else if (timeOfDay >= 0.2 && timeOfDay <= 0.3) period = 'DAWN';
      else if (timeOfDay >= 0.7 && timeOfDay <= 0.8) period = 'DUSK';
      else period = 'NIGHT';
      timeEl.textContent = `${hStr}:${mStr}  ${period}${autoCycle ? '' : '  [paused]'}`;

      // Moon phase display — draw matching cratered disc
      const phase = getCurrentMoonPhase();
      const isNightForDisplay = period === 'NIGHT' || period === 'DUSK';
      const waxing = moonPhaseIndex >= 1 && moonPhaseIndex <= 4;
      drawMoonHud(phase.light, waxing);
      moonEl.textContent = `${phase.name}`;
      if (isNightForDisplay) {
        moonEl.textContent += `  |  Dawnkeeper ×${phase.dawnPower.toFixed(2)}  Ashen ×${phase.ashenPower.toFixed(2)}`;
      }
    }

    // ─────────────────────────────────────────
    //  GAME LOOP
    // ─────────────────────────────────────────
    //  WIND VECTOR FIELD
    // ─────────────────────────────────────────
    // Returns wind direction + strength at a world position and time.
    // Uses layered noise for gusts, prevailing direction, local turbulence,
    // and Coriolis-like rotational drift.
    const _windOut = { dx: 0, dy: 0, dz: 0, strength: 0 };
    function getWind(wx, wz, t) {
      // Prevailing wind — very slowly drifting direction (~30 s per shift)
      const prevAngle = simplex2(t * 0.03, 0) * Math.PI;
      const prevStr = 0.5 + simplex2(t * 0.05 + 100, 0) * 0.3;
      // Gust layer — spatial variation with slow temporal drift (~15 s per gust cycle)
      // Amplitude kept below prevailing so gusts push rather than override direction
      const gustX = simplex2(wx * 0.008 + t * 0.07, wz * 0.008) * 0.38;
      const gustZ = simplex2(wx * 0.008, wz * 0.008 + t * 0.07 + 50) * 0.38;
      // Turbulence — gentle local swirls (~5 s variation, barely perceptible)
      const turbX = simplex2(wx * 0.03 + t * 0.22, wz * 0.03 + 300) * 0.14;
      const turbZ = simplex2(wx * 0.03 + 400, wz * 0.03 + t * 0.22) * 0.14;

      let bx = Math.cos(prevAngle) * prevStr + gustX + turbX;
      let bz = Math.sin(prevAngle) * prevStr + gustZ + turbZ;

      // Coriolis-like drift: slowly rotates the whole field, ~60s period
      const corAngle = t * 0.017; // ~0.06 rad/s ≈ full rotation in ~105s
      const corStr = 0.06;
      const cosC = Math.cos(corAngle), sinC = Math.sin(corAngle);
      bx += (-bz * sinC) * corStr;
      bz += ( bx * sinC) * corStr;

      _windOut.dx = bx;
      _windOut.dz = bz;
      _windOut.dy = 0; // base getWind stays 2D for tree sway
      _windOut.strength = Math.sqrt(bx * bx + bz * bz);
      return _windOut;
    }

    // ─────────────────────────────────────────
    //  3D DEBUG WIND — fully volumetric
    //  Called with a world-space (wx, wy, wz) sample point.
    //  Models:
    //   • Logarithmic boundary layer  — wind near-zero at ground, full speed aloft
    //   • Terrain-slope updrafts/downdrafts — wind flows OVER terrain, not along it
    //   • Hard structures (walls/buildings) — 3D blocking + updraft windward,
    //       downdraft leeward, vortex shedding at wake edges
    //   • Soft structures (trees) — canopy fade above tree top, updraft at canopy
    //       crown, boundary turbulence, forest-edge channeling
    // ─────────────────────────────────────────
    const _wdbgOut = { dx: 0, dy: 0, dz: 0, strength: 0, blocked: false, turbulent: false };
    function getWindDebug(wx, wy, wz, t) {
      // ── 1. Height above local ground ────────────────────────────────────
      const groundY = getTerrainY(wx, wz);
      const hag = Math.max(0.05, wy - groundY); // height above ground (world units)

      // ── 2. Logarithmic wind-speed profile ───────────────────────────────
      // Modeled after the atmospheric surface layer:  U(z) ∝ ln(z/z0)
      // z0 ≈ 1.5 — aerodynamic roughness for mixed terrain/forest
      // Normalised so hf ≈ 1 at 20 units above ground, ≈ 0 at surface.
      const z0  = 1.5;
      const href = 20;
      const hf  = Math.min(Math.log(1 + hag / z0) / Math.log(1 + href / z0), 1.8);

      // ── 3. Base horizontal wind (same noise as getWind, height-scaled) ──
      const prevAngle = simplex2(t * 0.03, 0) * Math.PI;
      const prevStr   = (0.5 + simplex2(t * 0.05 + 100, 0) * 0.3) * hf;
      const gustX = simplex2(wx * 0.008 + t * 0.07, wz * 0.008) * 0.38 * hf;
      const gustZ = simplex2(wx * 0.008, wz * 0.008 + t * 0.07 + 50) * 0.38 * hf;
      const turbX = simplex2(wx * 0.03 + t * 0.22, wz * 0.03 + 300) * 0.14;
      const turbZ = simplex2(wx * 0.03 + 400, wz * 0.03 + t * 0.22) * 0.14;
      let dx = Math.cos(prevAngle) * prevStr + gustX + turbX;
      let dz = Math.sin(prevAngle) * prevStr + gustZ + turbZ;

      // ── 4. Terrain-induced vertical component ───────────────────────────
      // Wind hitting an upslope creates an updraft; downslope creates a downdraft.
      // Effect decays exponentially with altitude (strong near surface).
      const eps  = 1.5;
      const slopeX = (getTerrainY(wx + eps, wz) - groundY) / eps; // dh/dx
      const slopeZ = (getTerrainY(wx, wz + eps) - groundY) / eps; // dh/dz
      const upliftDecay = Math.exp(-hag * 0.18);
      let dy = -(dx * slopeX + dz * slopeZ) * 0.4 * upliftDecay;

      // Weak atmospheric background vertical motion (thermals / subsidence)
      dy += simplex2(wx * 0.006 + t * 0.04, wz * 0.006 + 500) * 0.10;

      // ── 5. Object influencers ────────────────────────────────────────────
      let blocked = false, turbulent = false;

      for (let i = 0; i < windInfluencers.length; i++) {
        const inf = windInfluencers[i];

        // Fast 2D horizontal reject
        const ddx = wx - inf.x, ddz = wz - inf.z;
        const distSq = ddx * ddx + ddz * ddz;
        const effectR = inf.radius * 2.5;
        if (distSq > effectR * effectR) continue;
        const dist  = Math.sqrt(distSq);
        const f2d = Math.max(0, 1 - dist / effectR);

        // Vertical zone: how far above the structure top are we?
        const infTop = inf.groundY + inf.height;
        const relY   = wy - infTop; // < 0 = inside/below structure height

        {
          // ── Soft blocker (tree / vegetation) ────────────────────────────
          // Effect fades quickly above canopy top.
          const canopyF = relY < 0
            ? 1.0
            : Math.exp(-relY / (inf.height * 0.25 + 0.5));
          if (canopyF < 0.03) continue; // well above canopy, skip

          // Boundary turbulence peaks exactly at canopy edge (f2d ≈ 0.5)
          const edgeFalloff = f2d * (1 - f2d) * 4;

          const swirl = simplex2(wx * 0.18 + t * 0.35 + 77, wz * 0.18) * 0.35;
          const eTx = simplex2(wx * 0.28 + t * 0.25 + inf.x * 0.07, wz * 0.28) * 0.55;
          const eTz = simplex2(wx * 0.28, wz * 0.28 + t * 0.25 + inf.z * 0.07) * 0.55;

          // Forest-edge channeling: wind pushed perpendicular to sample→tree vector
          const invD = 1 / (dist + 0.0001);
          const perpX = -ddz * invD, perpZ = ddx * invD;

          dx = dx * (1 - f2d * inf.strength * 0.5 * canopyF)
               + swirl * f2d * 0.20 * canopyF
               + eTx * edgeFalloff * 0.32 * canopyF
               + perpX * edgeFalloff * 0.22 * inf.strength;
          dz = dz * (1 - f2d * inf.strength * 0.5 * canopyF)
               + swirl * f2d * 0.20 * canopyF
               + eTz * edgeFalloff * 0.32 * canopyF
               + perpZ * edgeFalloff * 0.22 * inf.strength;

          // Vertical: wind deflected upward at/near canopy crown
          if (relY > -inf.height * 0.6 && relY < inf.height * 0.4) {
            dy += f2d * inf.strength * 0.30 * canopyF;
          }

          if (edgeFalloff > 0.5) turbulent = true;
        }
      }

      // ── 6. Face-normal hard-blocker deflection ──────────────────────────
      // Each entry is one physical face of a wall/building.
      // Windward side: project out the normal component so wind can't pass through,
      //   accelerate the tangential component (Bernoulli), deflect upward over top.
      // Lee side: calm wake pocket, mild downdraft.
      const FACE_WIND_DIST = 8.0;  // windward influence depth (world units)
      const FACE_WAKE_DIST = 14.0; // leeward wake depth
      for (let fi = 0; fi < windFaces.length; fi++) {
        const face = windFaces[fi];
        const fdx = wx - face.cx, fdz = wz - face.cz;
        // Signed distance from face plane: positive = windward, negative = wake
        const signedDist = fdx * face.nx + fdz * face.nz;
        if (signedDist > FACE_WIND_DIST || signedDist < -FACE_WAKE_DIST) continue;

        // Lateral extent — how far along the face surface is this sample?
        const tanX = -face.nz, tanZ = face.nx; // 90° rotation of normal
        const lateralDist = Math.abs(fdx * tanX + fdz * tanZ);
        // Taper off beyond face halfExtent with a soft margin
        const lateralF = Math.max(0, 1 - Math.max(0, lateralDist - face.halfExtent) / (FACE_WIND_DIST * 0.65));
        if (lateralF < 0.01) continue;

        // Vertical extent
        const fRelY = wy - (face.groundY + face.height);
        const vf = fRelY < 0
          ? 1.0
          : Math.exp(-fRelY * fRelY / (face.height * face.height * 0.5 + 1));
        if (vf < 0.03) continue;

        const roofZone = Math.exp(-fRelY * fRelY / (face.height * face.height * 0.8 + 1));

        if (signedDist >= 0) {
          // ── WINDWARD SIDE ──────────────────────────────────────────────
          const distF = (1 - signedDist / FACE_WIND_DIST) * lateralF * vf;
          // How much wind is pressing INTO the face?
          const wNorm = dx * face.nx + dz * face.nz; // positive = away from face
          if (wNorm < 0) {
            // Block: remove the inward normal component
            const block = -wNorm * distF;
            dx += block * face.nx;
            dz += block * face.nz;
            // Tangential acceleration (Bernoulli — flow squeezes around the face)
            const currNorm = dx * face.nx + dz * face.nz;
            const wTanX = dx - currNorm * face.nx;
            const wTanZ = dz - currNorm * face.nz;
            const tanMag = Math.sqrt(wTanX * wTanX + wTanZ * wTanZ) + 0.0001;
            dx += (wTanX / tanMag) * block * 0.42;
            dz += (wTanZ / tanMag) * block * 0.42;
            // Upward deflection over the top
            dy += block * 0.90 * roofZone;
            if (distF > 0.25) blocked = true;
          }
        } else {
          // ── WAKE / LEE SIDE ───────────────────────────────────────────
          const wakeF = (1 + signedDist / FACE_WAKE_DIST) * lateralF * vf;
          // Calm pocket — damp horizontal wind
          dx *= (1 - wakeF * 0.72);
          dz *= (1 - wakeF * 0.72);
          // Mild downdraft
          dy -= (Math.sqrt(dx * dx + dz * dz) + 0.01) * wakeF * 0.28 * roofZone;
          if (wakeF > 0.35) blocked = true;
        }
      }

      const strength = Math.sqrt(dx * dx + dy * dy + dz * dz);
      _wdbgOut.dx = dx; _wdbgOut.dy = dy; _wdbgOut.dz = dz;
      _wdbgOut.strength = strength;
      _wdbgOut.blocked = blocked;
      _wdbgOut.turbulent = turbulent;
      return _wdbgOut;
    }

    let windTime = 0;
    let _windBatch = 0;
    const WIND_BATCH_SIZE = 200; // update ~200 trees per frame, cycle through all
    function updateWind(dt) {
      windTime += dt;
      const len = windTrees.length;
      if (len === 0) return;
      const end = Math.min(_windBatch + WIND_BATCH_SIZE, len);
      for (let i = _windBatch; i < end; i++) {
        const wt = windTrees[i];
        const w = getWind(wt.wx, wt.wz, windTime + wt.phase);
        const lean = w.strength * wt.flex;
        const sway = Math.sin(windTime * 1.8 + wt.phase) * 0.15 * wt.flex;
        wt.group.rotation.x = w.dz * lean + sway;
        wt.group.rotation.z = -w.dx * lean;
      }
      _windBatch = end >= len ? 0 : end;
    }

    // ─────────────────────────────────────────
    //  3D WIND DEBUG FIELD (toggle V)
    //  A grid of ArrowHelper objects placed at terrain height.
    //  Arrows show the full terrain-following, object-influenced wind
    //  vector at each sample point.  Color encodes state:
    //  Color coding:
    //    cyan → white  — open wind, brightness = speed
    //    orange / red  — hard-blocked wake (wall / building)
    //    magenta       — turbulent zone (vortex shedding / canopy edge)
    //    dim teal      — calm inside a forest canopy
    // ─────────────────────────────────────────

    // V cycles: off → sparse → medium → dense → off.
    // Each level defines a horizontal grid + an array of height offsets above terrain.
    // Higher layers are more transparent so the ground layer always reads clearly.
    //
    // Level 1 — 1 slice  at +2         →  14×14×1  = 196  arrows
    // Level 2 — 3 slices at +1, +8, +18 →  18×18×3  = 972  arrows
    // Level 3 — 4 slices at +1,+5,+12,+25 → 22×22×4 = 1936 arrows
    const WIND_DBG_LEVELS = [
      null,
      { grid: 14, spacing: 9, layers: [2] },
      { grid: 18, spacing: 6, layers: [1, 8, 18] },
      { grid: 22, spacing: 4, layers: [1, 5, 12, 25] },
    ];
    // Max total arrows = level-3 count
    const WIND_DBG_MAX_ARROWS = 22 * 22 * 4; // 1936

    let windDebugLevel = 0;

    const windDebugGroup = new THREE.Group();
    scene.add(windDebugGroup);

    // Pre-allocate all arrows at maximum count; hide unused ones each update.
    const windDebugArrows = [];
    const _dbgDir0 = new THREE.Vector3(1, 0, 0);
    for (let i = 0; i < WIND_DBG_MAX_ARROWS; i++) {
      const arrow = new THREE.ArrowHelper(
        _dbgDir0.clone(), new THREE.Vector3(), 2.5, 0x44ffee, 0.7, 0.35
      );
      arrow.line.material.transparent = true;
      arrow.cone.material.transparent = true;
      arrow.visible = false;
      windDebugGroup.add(arrow);
      windDebugArrows.push(arrow);
    }

    let _windDbgTimer = 0;
    const _dbgDirV = new THREE.Vector3();
    const _dbgCol  = new THREE.Color();

    function updateWindDebug(dt) {
      if (windDebugLevel === 0) return;
      _windDbgTimer += dt;
      // Refresh budget scales with arrow count
      const refreshRate = windDebugLevel === 3 ? 0.5 : windDebugLevel === 2 ? 0.35 : 0.25;
      if (_windDbgTimer < refreshRate) return;
      _windDbgTimer = 0;

      const { grid, spacing, layers } = WIND_DBG_LEVELS[windDebugLevel];
      // Arrow length fills ~80% of grid spacing — readable without overlapping
      const arrowBase = spacing * 0.80;
      const px = playerGroup.position.x;
      const pz = playerGroup.position.z;
      const half = (grid - 1) * spacing * 0.5;
      const perLayer = grid * grid;
      const activeCount = perLayer * layers.length;

      for (let li = 0; li < layers.length; li++) {
        const heightOffset = layers[li];
        // Higher layers: slightly more transparent so ground layer is always readable
        const opacity = Math.max(0.35, 0.85 - li * 0.15);

        for (let gi = 0; gi < grid; gi++) {
          for (let gj = 0; gj < grid; gj++) {
            const wx  = px + gi * spacing - half;
            const wz  = pz + gj * spacing - half;
            const wy  = getTerrainY(wx, wz) + heightOffset;

            const w   = getWindDebug(wx, wy, wz, windTime);
            const str = w.strength;

            const arrow = windDebugArrows[li * perLayer + gi * grid + gj];
            arrow.visible = true;
            arrow.position.set(wx, wy, wz);

            // Update per-layer opacity (cheap — material is shared within a layer)
            arrow.line.material.opacity = opacity;
            arrow.cone.material.opacity = opacity;

            // Direction — straight up as a calm-spot sentinel
            if (str > 0.01) {
              _dbgDirV.set(w.dx / str, w.dy / str, w.dz / str);
            } else {
              _dbgDirV.set(0, 1, 0);
            }
            arrow.setDirection(_dbgDirV);

            const scale = Math.max(0.18, Math.min(str, 1.5));
            const len   = arrowBase * scale;
            arrow.setLength(len, len * 0.30, len * 0.14);

            // Color encodes wind state:
            //   orange-red  — hard-blocked wake (wall / building)
            //   magenta     — turbulent zone (vortex shedding / canopy boundary)
            //   cyan→white  — free wind, brightness proportional to speed
            if (w.blocked) {
              _dbgCol.setRGB(1.0, 0.22 + str * 0.28, 0.05);
            } else if (w.turbulent) {
              _dbgCol.setRGB(0.90 + str * 0.10, 0.12 + str * 0.18, 0.90);
            } else {
              _dbgCol.setRGB(0.10 + str * 0.55, 0.78 + str * 0.22, 1.0);
            }
            arrow.setColor(_dbgCol);
          }
        }
      }

      // Hide arrows beyond the active set (level changed or just turned on)
      for (let i = activeCount; i < WIND_DBG_MAX_ARROWS; i++) {
        windDebugArrows[i].visible = false;
      }
    }

    // ─────────────────────────────────────────
    //  FACE-NORMAL DEBUG (toggle F)
    //  Shows one cyan arrow per registered windFace, pointing outward from
    //  the face centroid at mid-height.  Lets you see exactly what geometry
    //  the wind physics is operating on.
    // ─────────────────────────────────────────
    let faceDebugVisible = false;
    const windFaceGroup = new THREE.Group();
    scene.add(windFaceGroup);

    function buildFaceDebugArrows() {
      // Dispose and remove previous arrows
      while (windFaceGroup.children.length > 0) {
        const child = windFaceGroup.children[0];
        child.line?.geometry.dispose();
        child.cone?.geometry.dispose();
        windFaceGroup.remove(child);
      }
      if (!faceDebugVisible) return;
      const dir = new THREE.Vector3();
      for (const face of windFaces) {
        dir.set(face.nx, 0, face.nz);
        const origin = new THREE.Vector3(face.cx, face.groundY + face.height * 0.5, face.cz);
        const arrow = new THREE.ArrowHelper(dir, origin, 3.5, 0x00ffff, 0.9, 0.45);
        arrow.line.material.transparent = true;
        arrow.line.material.opacity = 0.85;
        arrow.cone.material.transparent = true;
        arrow.cone.material.opacity = 0.85;
        windFaceGroup.add(arrow);
      }
    }

    // ─────────────────────────────────────────
    //  SMOKE PARTICLE SYSTEM
    //  CPU-simulated particles that rise with thermal buoyancy, then
    //  get progressively carried by the 3D wind field.
    //  Uses a struct-of-arrays layout for cache-friendly iteration.
    // ─────────────────────────────────────────
    const SMOKE_MAX = 1600;
    const INITIAL_SMOKE_SPREAD_DISTANCE = 6;

    // CPU state — one typed array per property
    const _sx  = new Float32Array(SMOKE_MAX); // world position
    const _sy  = new Float32Array(SMOKE_MAX);
    const _sz  = new Float32Array(SMOKE_MAX);
    const _svx = new Float32Array(SMOKE_MAX); // velocity
    const _svy = new Float32Array(SMOKE_MAX);
    const _svz = new Float32Array(SMOKE_MAX);
    const _sli = new Float32Array(SMOKE_MAX); // normalised life [0=fresh, 1=dead]
    const _sml = new Float32Array(SMOKE_MAX); // max lifetime (seconds)
    const _ssi = new Float32Array(SMOKE_MAX); // spawn size scale
    const _sac = new Uint8Array(SMOKE_MAX);   // active flag

    // GPU buffers (written each frame for active particles)
    const _gPos  = new Float32Array(SMOKE_MAX * 3);
    const _gSz   = new Float32Array(SMOKE_MAX);
    const _gAlph = new Float32Array(SMOKE_MAX);
    const _gLife = new Float32Array(SMOKE_MAX);

    const smokeGeo = new THREE.BufferGeometry();
    smokeGeo.setAttribute('position', new THREE.BufferAttribute(_gPos,  3).setUsage(THREE.DynamicDrawUsage));
    smokeGeo.setAttribute('pSize',    new THREE.BufferAttribute(_gSz,   1).setUsage(THREE.DynamicDrawUsage));
    smokeGeo.setAttribute('pAlpha',   new THREE.BufferAttribute(_gAlph, 1).setUsage(THREE.DynamicDrawUsage));
    smokeGeo.setAttribute('pLife',    new THREE.BufferAttribute(_gLife, 1).setUsage(THREE.DynamicDrawUsage));

    const smokeMat = new THREE.ShaderMaterial({
      uniforms: {
        uNightGlow: { value: 0.0 }
      },
      vertexShader: `
        attribute float pSize;
        attribute float pAlpha;
        attribute float pLife;
        varying float vAlpha;
        varying float vLife;
        varying float vHash;
        void main() {
          vAlpha = pAlpha;
          vLife  = pLife;
          // Derive a stable per-particle hash from world position
          vHash  = fract(sin(dot(position.xz, vec2(127.1, 311.7))) * 43758.5453);
          vec4 mv = modelViewMatrix * vec4(position, 1.0);
          gl_PointSize = pSize * projectionMatrix[1][1] * 380.0 / (-mv.z);
          gl_Position  = projectionMatrix * mv;
        }
      `,
      fragmentShader: `
        uniform float uNightGlow;
        varying float vAlpha;
        varying float vLife;
        varying float vHash;

        vec3 hsv2rgb(vec3 c) {
          vec4 K = vec4(1.0, 2.0/3.0, 1.0/3.0, 3.0);
          vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
          return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
        }

        void main() {
          vec2 c = gl_PointCoord - 0.5;
          float r = length(c) * 2.0;
          if (r > 1.0) discard;

          // --- Day: standard smoke ---
          float dayA = vAlpha * (1.0 - smoothstep(0.20, 1.0, r));
          vec3 dayCol = mix(vec3(0.94, 0.90, 0.84), vec3(0.66, 0.67, 0.72), vLife);

          // --- Night: neon ethereal magic ---
          // Hue distribution: mostly deep blue/violet, rare green
          // vHash 0-0.88 → blue-violet-magenta range, 0.88-1.0 → rare green
          float hue;
          if (vHash > 0.88) {
            hue = 0.28 + (vHash - 0.88) * 1.5; // 0.28-0.46 green-teal range
          } else {
            hue = 0.58 + (vHash / 0.88) * 0.30; // 0.58-0.88 blue→violet→magenta
          }
          // High saturation that pops early, stays vivid
          float sat = 1.0 - vLife * 0.12; // 1.0 → 0.88 — stays punchy
          float val = 1.0;
          vec3 neonBase = hsv2rgb(vec3(hue, sat, val));

          // Core: tinted, not white — saturated color all the way through
          float coreFade = smoothstep(0.0, 0.4, r);
          vec3 tintedCore = neonBase * 1.3; // brighter version of same hue
          tintedCore = min(tintedCore, vec3(1.0)); // clamp
          vec3 neonCol = mix(tintedCore, neonBase, coreFade);

          // Glow: bright core + soft outer halo
          float innerA = 1.0 - smoothstep(0.0, 0.5, r);
          float outerA = (1.0 - smoothstep(0.3, 1.0, r)) * 0.6;
          float neonA  = (innerA + outerA) * (0.6 + vAlpha * 0.6);
          neonA *= (1.0 - vLife * 0.3);

          // --- Blend ---
          vec3  col = mix(dayCol, neonCol, uNightGlow);
          float a   = mix(dayA, neonA, uNightGlow);
          gl_FragColor = vec4(col, a);
        }
      `,
      transparent: true,
      depthWrite:  false,
      blending:    THREE.NormalBlending,
    });

    const smokePoints = new THREE.Points(smokeGeo, smokeMat);
    smokePoints.frustumCulled = false;
    smokePoints.renderOrder = 2; // terrain(0) → water(1) → smoke(2)
    scene.add(smokePoints);

    // ─────────────────────────────────────────
    //  CHIMNEY SMOKE — white wisps from bakeries / hearths during daytime
    // ─────────────────────────────────────────
    const CHIM_MAX = 200;
    const _cx = new Float32Array(CHIM_MAX);
    const _cy = new Float32Array(CHIM_MAX);
    const _cz = new Float32Array(CHIM_MAX);
    const _cvx = new Float32Array(CHIM_MAX);
    const _cvy = new Float32Array(CHIM_MAX);
    const _cvz = new Float32Array(CHIM_MAX);
    const _cli = new Float32Array(CHIM_MAX); // life 0→1
    const _cml = new Float32Array(CHIM_MAX); // max life
    const _cac = new Uint8Array(CHIM_MAX);
    const _cgP = new Float32Array(CHIM_MAX * 3);
    const _cgS = new Float32Array(CHIM_MAX);
    const _cgA = new Float32Array(CHIM_MAX);
    let _chimHead = 0;

    const chimGeo = new THREE.BufferGeometry();
    chimGeo.setAttribute('position', new THREE.BufferAttribute(_cgP, 3).setUsage(THREE.DynamicDrawUsage));
    chimGeo.setAttribute('pSize',    new THREE.BufferAttribute(_cgS, 1).setUsage(THREE.DynamicDrawUsage));
    chimGeo.setAttribute('pAlpha',   new THREE.BufferAttribute(_cgA, 1).setUsage(THREE.DynamicDrawUsage));

    const chimMat = new THREE.ShaderMaterial({
      vertexShader: `
        attribute float pSize;
        attribute float pAlpha;
        varying float vAlpha;
        void main() {
          vAlpha = pAlpha;
          vec4 mv = modelViewMatrix * vec4(position, 1.0);
          gl_PointSize = pSize * projectionMatrix[1][1] * 380.0 / (-mv.z);
          gl_Position  = projectionMatrix * mv;
        }
      `,
      fragmentShader: `
        varying float vAlpha;
        void main() {
          vec2 c = gl_PointCoord - 0.5;
          float r = length(c) * 2.0;
          if (r > 1.0) discard;
          float a = vAlpha * (1.0 - smoothstep(0.15, 1.0, r));
          gl_FragColor = vec4(0.92, 0.90, 0.88, a);
        }
      `,
      transparent: true,
      depthWrite: false,
      blending: THREE.NormalBlending,
    });

    const chimPoints = new THREE.Points(chimGeo, chimMat);
    chimPoints.frustumCulled = false;
    chimPoints.renderOrder = 2;
    scene.add(chimPoints);

    let _chimSpawnT = 0;
    function updateChimneySmoke(dt) {
      // Only emit during daytime (dawn through dusk)
      const dayActive = timeOfDay > 0.28 && timeOfDay < 0.72;

      // Spawn — each building's hearth score drives emission rate
      // hearth 0.3 → ~1 puff/s, hearth 1.0 → ~4 puffs/s
      _chimSpawnT += dt;
      if (dayActive && _chimSpawnT >= 0.10) {
        _chimSpawnT = 0;
        for (let bi = 0; bi < buildingAttractors.length; bi++) {
          const b = buildingAttractors[bi];
          if (b.hearth <= 0) continue;
          // Emission probability scales with hearth score
          if (Math.random() > b.hearth * 0.4) continue;
          const ci = _chimHead;
          _chimHead = (_chimHead + 1) % CHIM_MAX;
          _cx[ci] = b.x + (Math.random() - 0.5) * 0.6;
          _cy[ci] = b.roofY + 0.5 + Math.random() * 0.3;
          _cz[ci] = b.z + (Math.random() - 0.5) * 0.6;
          _cvx[ci] = (Math.random() - 0.5) * 0.3;
          _cvy[ci] = (0.5 + b.hearth * 0.5) + Math.random() * 0.4;
          _cvz[ci] = (Math.random() - 0.5) * 0.3;
          _cli[ci] = 0;
          _cml[ci] = 4.0 + b.hearth * 3.0 + Math.random() * 3.0; // hotter hearths → longer-lasting plumes
          _cac[ci] = 1;
          _cgS[ci] = (0.3 + b.hearth * 0.4); // start size scales with hearth
        }
      }

      // Update particles
      const groundRef = getTerrainY(playerGroup.position.x, playerGroup.position.z);
      for (let i = 0; i < CHIM_MAX; i++) {
        const pi3 = i * 3;
        if (!_cac[i]) { _cgS[i] = 0; _cgA[i] = 0; continue; }
        _cli[i] += dt / _cml[i];
        if (_cli[i] >= 1.0) { _cac[i] = 0; _cgS[i] = 0; _cgA[i] = 0; continue; }
        const life = _cli[i];
        // Wind
        const w = windForSmoke(_cx[i], _cz[i], _cy[i], groundRef, windTime);
        const drag = Math.min(life * 1.5, 1.0);
        _cvx[i] += (w.dx * 3.5 - _cvx[i]) * drag * dt * 1.5;
        _cvz[i] += (w.dz * 3.5 - _cvz[i]) * drag * dt * 1.5;
        // Gentle rise that fades
        const buoy = Math.max(0, 1.0 - life * 2.0) * 0.4;
        _cvy[i] += (buoy - _cvy[i]) * 2.0 * dt;
        _cvy[i] = Math.max(_cvy[i], -0.02);
        _cx[i] += _cvx[i] * dt;
        _cy[i] += _cvy[i] * dt;
        _cz[i] += _cvz[i] * dt;
        // Opacity — hotter hearths produce denser, more visible plumes
        const fadeIn  = Math.min(life * 10.0, 1.0);
        const fadeOut = 1.0 - Math.pow(Math.max(0, (life - 0.4) / 0.6), 1.5);
        _cgA[i] = fadeIn * fadeOut * 0.40;
        // Size grows as it disperses (initial size was set at spawn based on hearth)
        _cgS[i] += dt * 0.35;
        _cgP[pi3]   = _cx[i];
        _cgP[pi3+1] = _cy[i];
        _cgP[pi3+2] = _cz[i];
      }
      chimGeo.attributes.position.needsUpdate = true;
      chimGeo.attributes.pSize.needsUpdate    = true;
      chimGeo.attributes.pAlpha.needsUpdate   = true;
    }

    // ─────────────────────────────────────────
    //  SMOKE TRAILS — static glowing dots left behind moving smoke
    // ─────────────────────────────────────────
    const TRAIL_MAX = 4000;
    const _tPos  = new Float32Array(TRAIL_MAX * 3);
    const _tSz   = new Float32Array(TRAIL_MAX);
    const _tAlph = new Float32Array(TRAIL_MAX);
    const _tLife = new Float32Array(TRAIL_MAX); // 0=fresh, 1=dead
    const _tMaxL = new Float32Array(TRAIL_MAX); // max lifetime
    const _tAc   = new Uint8Array(TRAIL_MAX);
    let _trailHead = 0;

    const trailGeo = new THREE.BufferGeometry();
    trailGeo.setAttribute('position', new THREE.BufferAttribute(_tPos,  3).setUsage(THREE.DynamicDrawUsage));
    trailGeo.setAttribute('pSize',    new THREE.BufferAttribute(_tSz,   1).setUsage(THREE.DynamicDrawUsage));
    trailGeo.setAttribute('pAlpha',   new THREE.BufferAttribute(_tAlph, 1).setUsage(THREE.DynamicDrawUsage));
    trailGeo.setAttribute('pLife',    new THREE.BufferAttribute(_tLife, 1).setUsage(THREE.DynamicDrawUsage));

    const trailMat = new THREE.ShaderMaterial({
      uniforms: {
        uNightGlow: smokeMat.uniforms.uNightGlow // share the same uniform object
      },
      vertexShader: `
        attribute float pSize;
        attribute float pAlpha;
        attribute float pLife;
        varying float vAlpha;
        varying float vLife;
        varying float vHash;
        void main() {
          vAlpha = pAlpha;
          vLife  = pLife;
          vHash  = fract(sin(dot(position.xz, vec2(127.1, 311.7))) * 43758.5453);
          vec4 mv = modelViewMatrix * vec4(position, 1.0);
          gl_PointSize = pSize * projectionMatrix[1][1] * 380.0 / (-mv.z);
          gl_Position  = projectionMatrix * mv;
        }
      `,
      fragmentShader: `
        uniform float uNightGlow;
        varying float vAlpha;
        varying float vLife;
        varying float vHash;

        vec3 hsv2rgb(vec3 c) {
          vec4 K = vec4(1.0, 2.0/3.0, 1.0/3.0, 3.0);
          vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
          return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
        }

        void main() {
          vec2 c = gl_PointCoord - 0.5;
          float r = length(c) * 2.0;
          if (r > 1.0) discard;

          // Day: faint wispy grey
          float dayA = vAlpha * (1.0 - smoothstep(0.1, 0.8, r)) * 0.3;
          vec3 dayCol = vec3(0.75, 0.74, 0.72);

          // Night: soft neon glow dot — same hue distribution as smoke
          float hue;
          if (vHash > 0.88) {
            hue = 0.28 + (vHash - 0.88) * 1.5;
          } else {
            hue = 0.58 + (vHash / 0.88) * 0.30;
          }
          vec3 neonCol = hsv2rgb(vec3(hue, 1.0, 1.0));
          // Softer falloff for dreamy trail look
          float neonA = vAlpha * (1.0 - smoothstep(0.0, 0.9, r));
          neonA *= (1.0 - vLife * 0.6);

          vec3  col = mix(dayCol, neonCol, uNightGlow);
          float a   = mix(dayA, neonA, uNightGlow);
          gl_FragColor = vec4(col, a);
        }
      `,
      transparent: true,
      depthWrite: false,
      blending: THREE.NormalBlending,
    });

    const trailPoints = new THREE.Points(trailGeo, trailMat);
    trailPoints.frustumCulled = false;
    trailPoints.renderOrder = 1; // behind main smoke
    scene.add(trailPoints);

    // Smoke glow lights — small pool of PointLights that follow brightest particles
    const SMOKE_LIGHT_COUNT = 6;
    const smokeLights = [];
    const _smokeLightHSL = { h: 0, s: 0, l: 0 };
    for (let i = 0; i < SMOKE_LIGHT_COUNT; i++) {
      const pl = new THREE.PointLight(0x6644ff, 0, 18, 2); // color, intensity, distance, decay
      pl.visible = false;
      scene.add(pl);
      smokeLights.push(pl);
    }

    // HSV→RGB helper (CPU side, matching shader palette)
    function hsvToColor(h, s, v) {
      const c = v * s, x = c * (1 - Math.abs((h * 6) % 2 - 1)), m = v - c;
      let r, g, b;
      if (h < 1/6)      { r = c; g = x; b = 0; }
      else if (h < 2/6) { r = x; g = c; b = 0; }
      else if (h < 3/6) { r = 0; g = c; b = x; }
      else if (h < 4/6) { r = 0; g = x; b = c; }
      else if (h < 5/6) { r = x; g = 0; b = c; }
      else              { r = c; g = 0; b = x; }
      return new THREE.Color(r + m, g + m, b + m);
    }

    let _smokeHead = 0; // ring-buffer write index

    function spawnSmoke() {
      const i = _smokeHead;
      _smokeHead = (_smokeHead + 1) % SMOKE_MAX;

      const px = playerGroup.position.x;
      const py = playerGroup.position.y;
      const pz = playerGroup.position.z;

      // Emit just above the character's head with a little jitter
      const dx = (Math.random() - 0.5 * Math.sin(Math.random())) * INITIAL_SMOKE_SPREAD_DISTANCE;
      const dz = (Math.random() - 0.5 * Math.cos(Math.random())) * INITIAL_SMOKE_SPREAD_DISTANCE;
      _sx[i]  = px + dx;
      _sy[i]  = py + Math.random() * INITIAL_SMOKE_SPREAD_DISTANCE;
      _sz[i]  = pz + dz;

      // Initial velocity: upward thermal burst + slight spread
      _svx[i] = (Math.random() - 0.3) * 0.6;
      _svy[i] = 0.9 + Math.random() * 0.8;
      _svz[i] = (Math.random() - 0.3) * 0.6;

      _sli[i] = 0;
      _sml[i] = 5.0 + Math.random() * 4.0; // 5–9 second lifetime
      _ssi[i] = 0.6 + Math.random() * 0.55; // size variety
      _sac[i] = 1;
    }

    // Lightweight wind sampler for smoke — log height profile + vertical turbulence.
    // 4 layers: prevailing, gusts, horizontal turbulence, vertical turbulence.
    // Also estimates object-proximity vertical kick from buildingAttractors +
    // terrain slope for updraft/downdraft, with Coriolis rotational drift.
    const _swBuf = { dx: 0, dy: 0, dz: 0 };
    function windForSmoke(wx, wz, wy, groundRef, t) {
      const hag = Math.max(0.05, wy - groundRef);
      const hf  = Math.min(Math.log(1 + hag / 1.5) / Math.log(1 + 20 / 1.5), 1.8);

      // Layer 1: prevailing
      const ang  = simplex2(t * 0.03, 0) * Math.PI;
      const str  = (0.5 + simplex2(t * 0.05 + 100, 0) * 0.3) * hf;
      // Layer 2: gusts
      const gx   = simplex2(wx * 0.008 + t * 0.07, wz * 0.008) * 0.38 * hf;
      const gz   = simplex2(wx * 0.008, wz * 0.008 + t * 0.07 + 50) * 0.38 * hf;
      // Layer 3: horizontal turbulence
      const tx   = simplex2(wx * 0.03 + t * 0.22, wz * 0.03 + 300) * 0.14;
      const tz   = simplex2(wx * 0.03 + 400, wz * 0.03 + t * 0.22) * 0.14;

      let bx = Math.cos(ang) * str + gx + tx;
      let bz = Math.sin(ang) * str + gz + tz;
      const hSpeed = Math.sqrt(bx * bx + bz * bz);

      // Coriolis-like drift: slowly rotates the whole field
      const corAngle = t * 0.017;
      const sinC = Math.sin(corAngle) * 0.06;
      bx += -bz * sinC;
      bz +=  bx * sinC;

      // ── Layer 4: vertical turbulence ──
      // Base vertical noise — different frequency/phase from horizontal layers
      // Amplitude inversely proportional to horizontal wind strength:
      // strong laminar flow = low vertical turbulence (open plains)
      // weak/gusty flow = more chaotic vertical mixing
      const laminarDamping = 1.0 / (1.0 + hSpeed * 3.0); // ~1 calm, ~0.15 strong winds
      const vTurb = simplex2(wx * 0.018 + t * 0.15 + 700, wz * 0.018 + 800) * 0.35 * laminarDamping;
      // Higher-frequency vertical chop
      const vChop = simplex2(wx * 0.06 + t * 0.3 + 900, wz * 0.06 + 1000) * 0.15 * laminarDamping;

      let dy = vTurb + vChop;

      // ── Terrain slope updraft/downdraft ──
      // Wind hitting upslope → updraft, downslope → downdraft
      const eps = 2.0;
      const slopeX = (getTerrainY(wx + eps, wz) - groundRef) / eps;
      const slopeZ = (getTerrainY(wx, wz + eps) - groundRef) / eps;
      const slopeUplift = -(bx * slopeX + bz * slopeZ) * 0.35;
      // Effect decays with altitude
      dy += slopeUplift * Math.exp(-hag * 0.12);

      // ── Object proximity vertical kick ──
      // Buildings create updrafts (windward deflection) and downdrafts (lee wake)
      // Uses buildingAttractors for cheap proximity check (no full influencer scan)
      const OBJ_VERT_RANGE = 25;
      for (let bi = 0; bi < buildingAttractors.length; bi++) {
        const ba = buildingAttractors[bi];
        const odx = wx - ba.x, odz = wz - ba.z;
        const od2 = odx * odx + odz * odz;
        if (od2 > OBJ_VERT_RANGE * OBJ_VERT_RANGE) continue;
        const od = Math.sqrt(od2);
        const proximity = 1.0 - od / OBJ_VERT_RANGE;
        // Dot product: is wind blowing toward or away from building?
        const invOd = 1.0 / (od + 0.5);
        const toObjX = -odx * invOd, toObjZ = -odz * invOd;
        const windDot = bx * toObjX + bz * toObjZ; // positive = blowing toward building
        if (windDot > 0) {
          // Windward: deflect upward (stronger close to building)
          dy += windDot * proximity * proximity * 0.8;
        } else {
          // Lee: downdraft in wake
          dy += windDot * proximity * 0.3;
        }
        // Turbulent mixing near roofline
        const roofDist = Math.abs(wy - ba.y);
        if (roofDist < 5) {
          dy += simplex2(wx * 0.12 + t * 0.4 + bi, wz * 0.12) * proximity * 0.4;
        }
      }

      _swBuf.dx = bx;
      _swBuf.dy = dy;
      _swBuf.dz = bz;
      return _swBuf;
    }

    let _smokeSpawnT = 0;
    const SMOKE_SPAWN_RATE  = 0.0065; // one puff every ~65 ms ≈ 15/s
    const SMOKE_WIND_SPEED  = 10;   // world units per second per unit wind

    function updateSmoke(dt) {
      // Spawn — rate scales with night glow (no smoke during bright day/full moon)
      const glowVal = smokeMat.uniforms.uNightGlow.value;
      const effectiveRate = glowVal < 0.01 ? Infinity : SMOKE_SPAWN_RATE / glowVal;
      _smokeSpawnT += dt;
      if (_smokeSpawnT >= effectiveRate) {
        _smokeSpawnT = 0;
        spawnSmoke();
      }

      // One terrain lookup shared by all particles this frame
      const groundRef = getTerrainY(playerGroup.position.x, playerGroup.position.z);

      for (let i = 0; i < SMOKE_MAX; i++) {
        const pi3 = i * 3;

        if (!_sac[i]) {
          _gSz[i] = 0; _gAlph[i] = 0;
          continue;
        }

        _sli[i] += dt / _sml[i];
        if (_sli[i] >= 1.0) {
          _sac[i] = 0; _gSz[i] = 0; _gAlph[i] = 0;
          continue;
        }

        const life = _sli[i];

        // Sample wind — smoke is carried more strongly as it cools and slows
        const w    = windForSmoke(_sx[i], _sz[i], _sy[i], groundRef, windTime);
        const drag = Math.min(life * 1.2, 1.0); // 0 = own momentum, 1 = wind-controlled

        // Steer horizontal velocity toward ambient wind
        _svx[i] += (w.dx * SMOKE_WIND_SPEED - _svx[i]) * drag * dt * 2.0;
        _svz[i] += (w.dz * SMOKE_WIND_SPEED - _svz[i]) * drag * dt * 2.0;
        // Vertical wind steering — turbulence, slope updrafts, object deflection
        _svy[i] += w.dy * SMOKE_WIND_SPEED * 0.5 * drag * dt;

        // ── Building attraction: structures pull in nearby smoke ──
        // Wind competes with attraction — strong gusts blow smoke past homes
        const ATTRACT_RANGE = 30;
        const ATTRACT_STRENGTH = 5.0;
        const windSpeed = Math.sqrt(w.dx * w.dx + w.dz * w.dz) * SMOKE_WIND_SPEED;
        // Wind suppression: attraction fades as wind grows stronger
        // At windSpeed ~4 attraction is full, at ~14+ it's nearly zero
        const windSuppression = Math.max(0, 1.0 - (windSpeed - 4.0) / 10.0);

        let nearDist2 = ATTRACT_RANGE * ATTRACT_RANGE;
        let nearIdx = -1;
        for (let bi = 0; bi < buildingAttractors.length; bi++) {
          const ba = buildingAttractors[bi];
          const adx = ba.x - _sx[i], adz = ba.z - _sz[i];
          const d2 = adx * adx + adz * adz;
          if (d2 < nearDist2) { nearDist2 = d2; nearIdx = bi; }
        }
        if (nearIdx >= 0 && windSuppression > 0.01) {
          const ba = buildingAttractors[nearIdx];
          const adx = ba.x - _sx[i], ady = ba.y - _sy[i], adz = ba.z - _sz[i];
          const dist = Math.sqrt(nearDist2);
          // Attraction ramps up closer, but modulated by wind calm
          const pull = ATTRACT_STRENGTH * (1.0 - dist / ATTRACT_RANGE) * windSuppression;
          const invD = 1.0 / (dist + 0.5);
          _svx[i] += adx * invD * pull * dt;
          _svy[i] += ady * invD * pull * 0.5 * dt;
          _svz[i] += adz * invD * pull * dt;
          // Consume only when wind is calm enough for smoke to actually reach
          if (dist < ba.r && windSuppression > 0.3) {
            _sli[i] = Math.max(_sli[i], 0.88);
            // Light up windows with the smoke's neon hue
            if (ba.windowMats.length > 0) {
              const pHash = Math.abs(Math.sin(_sx[i] * 127.1 + _sz[i] * 311.7) * 43758.5453) % 1;
              let pHue;
              if (pHash > 0.88) pHue = 0.28 + (pHash - 0.88) * 1.5;
              else pHue = 0.58 + (pHash / 0.88) * 0.30;
              // Warm-tinted window glow: neon hue blended toward amber
              const neonCol = hsvToColor(pHue, 0.8, 1.0);
              const warmCol = new THREE.Color(1.0, 0.85, 0.5);
              neonCol.lerp(warmCol, 0.5);
              // Accumulate charge — each particle adds a small amount
              ba.charge = Math.min(ba.charge + 0.008, ba.chargeMax);
              ba.glowIntensity = Math.min(ba.charge * 1.2, 1.0);
              ba.glowColor.lerp(neonCol, 0.3);
            }
          }
        }

        // ── Canopy attraction: tree canopies pull in nearby smoke ──
        // Weaker than buildings, but trees glow when they consume smoke
        const CANOPY_RANGE = 20;
        const CANOPY_STRENGTH = 2.5;
        const cnResult = findNearestCanopy(_sx[i], _sz[i], CANOPY_RANGE);
        if (cnResult.idx >= 0 && windSuppression > 0.01) {
          const ca = canopyAttractors[cnResult.idx];
          const cdx = ca.x - _sx[i], cdy = ca.y - _sy[i], cdz = ca.z - _sz[i];
          const cDist = Math.sqrt(cnResult.dist2);
          const cPull = CANOPY_STRENGTH * (1.0 - cDist / CANOPY_RANGE) * windSuppression;
          const cInvD = 1.0 / (cDist + 0.5);
          _svx[i] += cdx * cInvD * cPull * dt;
          _svy[i] += cdy * cInvD * cPull * 0.8 * dt;
          _svz[i] += cdz * cInvD * cPull * dt;
          // Consume + glow: smoke absorbed by canopy
          if (cDist < ca.r && windSuppression > 0.2) {
            _sli[i] = Math.max(_sli[i], 0.90);
            // Compute neon hue from particle position hash (same as shader)
            const pHash = Math.abs(Math.sin(_sx[i] * 127.1 + _sz[i] * 311.7) * 43758.5453) % 1;
            let pHue;
            if (pHash > 0.88) pHue = 0.28 + (pHash - 0.88) * 1.5;
            else pHue = 0.58 + (pHash / 0.88) * 0.30;
            // Charge the canopy glow — mostly just brightens the tree's own green
            const glowBoost = 0.06 * smokeMat.uniforms.uNightGlow.value;
            ca.glowIntensity = Math.min(ca.glowIntensity + glowBoost, 0.15);
            // Tint: 85% tree's own green, 15% neon hue
            ca.glowColor.lerp(hsvToColor(pHue, 1.0, 1.0), 0.08);
          }
        }

        // Buoyancy: strong upwash when fresh, decays as smoke cools
        const buoy = Math.max(0, 1.0 - life * 1.9) * 0.55;
        _svy[i] += (buoy - _svy[i]) * 2.8 * dt;
        _svy[i] = Math.max(_svy[i], -0.05); // don't let it sink hard

        _sx[i] += _svx[i] * dt;
        _sy[i] += _svy[i] * dt;
        _sz[i] += _svz[i] * dt;

        // Opacity: snappy fade-in, long plateau, graceful fade-out
        const fadeIn  = Math.min(life * 14.0, 1.0);
        const fadeOut = 1.0 - Math.pow(Math.max(0, (life - 0.50) / 0.50), 1.8);
        const alpha   = fadeIn * fadeOut * 0.50;

        // Size grows as smoke disperses, but shrinks with distance from camera
        const cam = camera.position;
        const dx = _sx[i] - cam.x;
        const dy = _sy[i] - cam.y;
        const dz = _sz[i] - cam.z;
        const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
        // Perspective: further = smaller, but clamp min/max for visibility
        const perspective = Math.max(0.18, Math.min(1.0, 18.0 / (dist + 1)));
        const size = _ssi[i] * (0.45 + life * 3.2) * perspective;

        _gPos[pi3]   = _sx[i];
        _gPos[pi3+1] = _sy[i];
        _gPos[pi3+2] = _sz[i];
        _gSz[i]   = size;
        _gAlph[i] = alpha;
        _gLife[i] = life;
      }

      smokeGeo.attributes.position.needsUpdate = true;
      smokeGeo.attributes.pSize.needsUpdate    = true;
      smokeGeo.attributes.pAlpha.needsUpdate   = true;
      smokeGeo.attributes.pLife.needsUpdate    = true;

      // ── Trail particles: deposit + age ──
      // Deposit trail dots behind moving smoke particles
      let trailBudget = 12; // max new trail points per frame (keeps it cheap)
      for (let i = 0; i < SMOKE_MAX && trailBudget > 0; i++) {
        if (!_sac[i]) continue;
        const life = _sli[i];
        // Only trail particles that are past the initial burst and not almost dead
        if (life < 0.08 || life > 0.85) continue;
        // Stagger: not every particle every frame — use index + frame modulo
        if ((i + _trailHead) % 4 !== 0) continue;
        const ti = _trailHead;
        _trailHead = (_trailHead + 1) % TRAIL_MAX;
        const ti3 = ti * 3;
        _tPos[ti3]     = _sx[i];
        _tPos[ti3 + 1] = _sy[i];
        _tPos[ti3 + 2] = _sz[i];
        _tMaxL[ti] = (1.0 - life) * _sml[i] * (0.5 + Math.random() * 0.5); // lives as long as parent's remaining life
        _tLife[ti] = 0;
        _tAc[ti] = 1;
        trailBudget--;
      }

      // Age trail particles + drift with wind
      for (let i = 0; i < TRAIL_MAX; i++) {
        if (!_tAc[i]) {
          _tSz[i] = 0; _tAlph[i] = 0;
          continue;
        }
        _tLife[i] += dt / _tMaxL[i];
        if (_tLife[i] >= 1.0) {
          _tAc[i] = 0; _tSz[i] = 0; _tAlph[i] = 0;
          continue;
        }
        const tl = _tLife[i];
        // Wind drift — gentle carry matching smoke wind
        const ti3 = i * 3;
        const tw = windForSmoke(_tPos[ti3], _tPos[ti3 + 2], _tPos[ti3 + 1], groundRef, windTime);
        const drift = 0.3 + tl * 0.7; // older trails drift more (fully wind-carried)
        _tPos[ti3]     += tw.dx * SMOKE_WIND_SPEED * drift * dt * 0.6;
        _tPos[ti3 + 2] += tw.dz * SMOKE_WIND_SPEED * drift * dt * 0.6;
        // Vertical: wind turbulence + gentle upward float
        _tPos[ti3 + 1] += (0.15 + tw.dy * SMOKE_WIND_SPEED * drift * 0.3) * dt;
        // Fade out gracefully
        _tAlph[i] = (1.0 - tl * tl) * 0.45;
        // Small, slightly growing
        _tSz[i] = (0.15 + tl * 0.3);
      }

      trailGeo.attributes.position.needsUpdate = true;
      trailGeo.attributes.pSize.needsUpdate    = true;
      trailGeo.attributes.pAlpha.needsUpdate   = true;
      trailGeo.attributes.pLife.needsUpdate     = true;

      // ── Canopy glow decay — fade emissive back to zero ──
      for (let ci = 0; ci < canopyAttractors.length; ci++) {
        const ca = canopyAttractors[ci];
        if (ca.glowIntensity > 0.001) {
          ca.glowIntensity *= Math.pow(0.25, dt); // ~4s half-life decay
          for (let mi = 0; mi < ca.mats.length; mi++) {
            const mat = ca.mats[mi];
            // Use the tree's own diffuse color as emissive base, faintly tinted
            mat.emissive.copy(mat.color).lerp(ca.glowColor, 0.15);
            mat.emissiveIntensity = ca.glowIntensity;
          }
        } else if (ca.glowIntensity > 0) {
          ca.glowIntensity = 0;
          for (let mi = 0; mi < ca.mats.length; mi++) {
            ca.mats[mi].emissiveIntensity = 0;
          }
        }
      }

      // ── Building window glow decay — drain scales with charge level ──
      // 3 in-game hours = 0.125 of day cycle. At CYCLE_SPEED=0.015, that's ~8.3s real.
      // Full charge drains in ~8.3s; low charge drains much faster.
      // Drain pauses when clock is paused.
      const MAX_DRAIN_TIME = 0.125 / CYCLE_SPEED;
      const _bldgTop = new Float32Array(BLDG_SPOT_COUNT).fill(-1);
      const _bldgIdx = new Int32Array(BLDG_SPOT_COUNT).fill(-1);
      _bldgTop.fill(-1); _bldgIdx.fill(-1);

      for (let bi = 0; bi < buildingAttractors.length; bi++) {
        const ba = buildingAttractors[bi];
        if (ba.charge > 0.001) {
          // Only drain when clock is running
          if (autoCycle) {
            const drainRate = 1.0 / (MAX_DRAIN_TIME * Math.max(ba.charge, 0.05));
            ba.charge = Math.max(0, ba.charge - drainRate * dt);
          }
          ba.glowIntensity = Math.min(ba.charge * 1.2, 1.0);
          for (let mi = 0; mi < ba.windowMats.length; mi++) {
            ba.windowMats[mi].color.copy(ba.glowColor).multiplyScalar(ba.glowIntensity);
          }
          // Track top N for SpotLight assignment
          let minJ = 0;
          for (let j = 1; j < BLDG_SPOT_COUNT; j++) {
            if (_bldgTop[j] < _bldgTop[minJ]) minJ = j;
          }
          if (ba.glowIntensity > _bldgTop[minJ]) {
            _bldgTop[minJ] = ba.glowIntensity;
            _bldgIdx[minJ] = bi;
          }
        } else if (ba.charge > 0 || ba.glowIntensity > 0) {
          ba.charge = 0;
          ba.glowIntensity = 0;
          const dark = new THREE.Color(0x1a1a22);
          for (let mi = 0; mi < ba.windowMats.length; mi++) {
            ba.windowMats[mi].color.copy(dark);
          }
        }
      }

      // Assign shared SpotLight pool to top-N brightest buildings
      for (let si = 0; si < BLDG_SPOT_COUNT; si++) {
        const sl = bldgSpots[si];
        const bi = _bldgIdx[si];
        if (bi < 0) {
          // No building to light — zero intensity, park far away
          sl.intensity = 0;
          continue;
        }
        const ba = buildingAttractors[bi];
        sl.position.set(ba.x, ba.y + 2, ba.z);
        sl.target.position.set(ba.x, ba.y - 10, ba.z);
        sl.color.copy(ba.glowColor);
        sl.intensity = ba.glowIntensity * 8.0;
        sl.distance = 20 + ba.glowIntensity * 10;
      }

      // Update smoke glow lights — pick brightest active particles
      const nightGlow = smokeMat.uniforms.uNightGlow.value;
      if (nightGlow < 0.05) {
        for (let li = 0; li < SMOKE_LIGHT_COUNT; li++) smokeLights[li].visible = false;
      } else {
        // Find top N particles by alpha (brightness proxy)
        // Use a simple partial sort — scan once, keep top N
        const top = new Float32Array(SMOKE_LIGHT_COUNT).fill(-1);
        const topIdx = new Int32Array(SMOKE_LIGHT_COUNT).fill(-1);
        for (let i = 0; i < SMOKE_MAX; i++) {
          if (!_sac[i]) continue;
          const score = _gAlph[i] * (1 - _sli[i] * 0.5);
          // Find minimum in top array
          let minJ = 0;
          for (let j = 1; j < SMOKE_LIGHT_COUNT; j++) {
            if (top[j] < top[minJ]) minJ = j;
          }
          if (score > top[minJ]) {
            top[minJ] = score;
            topIdx[minJ] = i;
          }
        }
        for (let li = 0; li < SMOKE_LIGHT_COUNT; li++) {
          const pi = topIdx[li];
          if (pi < 0) { smokeLights[li].visible = false; continue; }
          const pl = smokeLights[li];
          pl.visible = true;
          pl.position.set(_sx[pi], _sy[pi], _sz[pi]);
          // Color from same hue palette as shader
          const hash = Math.abs(Math.sin(_sx[pi] * 127.1 + _sz[pi] * 311.7) * 43758.5453) % 1;
          let hue;
          if (hash > 0.88) {
            hue = 0.28 + (hash - 0.88) * 1.5; // rare green-teal
          } else {
            hue = 0.58 + (hash / 0.88) * 0.30; // blue-violet-magenta
          }
          pl.color.copy(hsvToColor(hue, 1.0, 1.0));
          // Intensity scales with night glow and particle brightness
          pl.intensity = nightGlow * top[li] * 3.5;
          pl.distance = 20 + top[li] * 10;
        }
      }
    }

    // ─────────────────────────────────────────
    //  NPC SYSTEM — villager simulation
    //  One NPC per home.  Gather wood → build new home → reproduce.
    //  States: IDLE → WALK_TREE → CHOP → WALK_SITE → BUILD → (spawn) → IDLE
    // ─────────────────────────────────────────
    const NPC_SPEED      = 7;
    const NPC_CHOP_TIME  = 5.0;
    const NPC_BUILD_TIME = 10.0;
    const NPC_GATHER_TIME = 2.0; // time to pick up a rock
    function createNPCMesh(palette) {
      const g = new THREE.Group();
      // Body
      const body = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.5, 1.2, 3, 5),
        new THREE.MeshStandardMaterial({ color: palette.building, flatShading: true })
      );
      body.position.y = 1.2; body.castShadow = true;
      g.add(body);
      // Head
      const head = new THREE.Mesh(
        new THREE.IcosahedronGeometry(0.35, 1),
        new THREE.MeshStandardMaterial({ color: 0xd4a574, flatShading: true })
      );
      head.position.y = 2.3; g.add(head);
      // Cloak
      const cloak = new THREE.Mesh(
        new THREE.ConeGeometry(0.7, 0.7, 5),
        new THREE.MeshStandardMaterial({ color: palette.roof, flatShading: true })
      );
      cloak.position.y = 2.0; cloak.rotation.x = Math.PI; cloak.castShadow = true;
      g.add(cloak);
      // Legs
      const lMat = new THREE.MeshStandardMaterial({ color: palette.wall || 0x5a3a2a, flatShading: true });
      const legL = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.18, 0.7, 4), lMat);
      const legR = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.18, 0.7, 4), lMat);
      legL.position.set(-0.2, 0.35, 0); legR.position.set(0.2, 0.35, 0);
      legL.castShadow = true; legR.castShadow = true;
      g.add(legL, legR);
      g.userData.legL = legL; g.userData.legR = legR;
      // Wood bundle (hidden until carrying)
      const wood = new THREE.Mesh(
        new THREE.BoxGeometry(0.8, 0.3, 0.5),
        new THREE.MeshStandardMaterial({ color: 0x8B6914, flatShading: true })
      );
      wood.position.set(0, 2.1, -0.35); wood.visible = false;
      g.add(wood);
      g.userData.woodBundle = wood;
      return g;
    }

    function spawnNPC(homeX, homeZ, palette, kingdomIdx) {
      const count = npcs.filter(n => n.kingdomIdx === kingdomIdx).length;
      if (count >= NPC_MAX_PER_KINGDOM) return;
      const mesh = createNPCMesh(palette);
      mesh.position.set(homeX, getTerrainY(homeX, homeZ), homeZ);
      scene.add(mesh);
      npcs.push({
        mesh, palette, kingdomIdx,
        homeX, homeZ,
        x: homeX, z: homeZ,
        state: NPC_IDLE,
        timer: 5 + Math.random() * 25,
        treeIdx: -1,
        rockIdx: -1,
        targetX: 0, targetZ: 0,
        siteX: 0, siteZ: 0,
        rocksCarried: 0,
        woodTrips: 0,    // trips to current tree (resets per tree)
        buildMesh: null,
        walkPhase: Math.random() * Math.PI * 2,
        carrying: false,
        isBuilder: Math.random() < NPC_BUILDER_RATIO,
        // Rock-seeking state
        seekRadius: 0,      // current search radius (grows on failure)
        seekAttempts: 0,     // how many waypoints tried this seek
      });
    }

    function findNearestTree(fromX, fromZ, maxDist) {
      let best = -1, bestD2 = maxDist * maxDist;
      for (let i = 0; i < treePositions.length; i++) {
        if (claimedTrees.has(i)) continue;
        const t = treePositions[i];
        const d2 = (t.x - fromX) ** 2 + (t.z - fromZ) ** 2;
        if (d2 < bestD2) { bestD2 = d2; best = i; }
      }
      return best;
    }

    function findNearestRock(fromX, fromZ, maxDist) {
      let best = -1, bestD2 = maxDist * maxDist;
      for (let i = 0; i < rockPositions.length; i++) {
        if (depletedRocks.has(i)) continue;
        const r = rockPositions[i];
        const d2 = (r.x - fromX) ** 2 + (r.z - fromZ) ** 2;
        if (d2 < bestD2) { bestD2 = d2; best = i; }
      }
      return best;
    }

    function pickBuildSite(npc) {
      for (let a = 0; a < 10; a++) {
        const ang = Math.random() * Math.PI * 2;
        const d = 12 + Math.random() * 12;
        const sx = npc.homeX + Math.cos(ang) * d;
        const sz = npc.homeZ + Math.sin(ang) * d;
        const sy = getTerrainY(sx, sz);
        if (sy > 2.0 && sy < 14) return { x: sx, z: sz, y: sy };
      }
      return { x: npc.homeX + 15, z: npc.homeZ, y: getTerrainY(npc.homeX + 15, npc.homeZ) };
    }

    // Pick a waypoint biased toward higher terrain (gradient ascent).
    // Samples several candidate directions and favours the one that
    // climbs the most, with some randomness so NPCs meander naturally.
    function pickUphillWaypoint(fromX, fromZ, radius) {
      const SAMPLES = 6;
      const stepDist = 12 + Math.random() * 10; // how far each waypoint step is
      let bestX = fromX, bestZ = fromZ, bestScore = -Infinity;
      for (let s = 0; s < SAMPLES; s++) {
        const ang = Math.random() * Math.PI * 2;
        const d = stepDist * (0.6 + Math.random() * 0.4);
        const cx = fromX + Math.cos(ang) * d;
        const cz = fromZ + Math.sin(ang) * d;
        // Stay in world bounds
        const bound = WORLD_SIZE * 0.45;
        if (Math.abs(cx) > bound || Math.abs(cz) > bound) continue;
        const cy = getTerrainY(cx, cz);
        if (cy < 2.0) continue; // skip water
        // Score: height gain + small random jitter for meandering
        const score = cy + Math.random() * 3.0;
        if (score > bestScore) { bestScore = score; bestX = cx; bestZ = cz; }
      }
      return { x: bestX, z: bestZ };
    }

    function moveNPC(npc, tx, tz, dt) {
      const dx = tx - npc.x, dz = tz - npc.z;
      const dist = Math.sqrt(dx * dx + dz * dz);
      if (dist < 1.5) return 0;
      const step = Math.min(NPC_SPEED * dt, dist);
      const nx = dx / dist, nz = dz / dist;
      npc.x += nx * step; npc.z += nz * step;
      npc.mesh.position.x = npc.x;
      npc.mesh.position.z = npc.z;
      npc.mesh.position.y = getTerrainY(npc.x, npc.z);
      npc.mesh.rotation.y = Math.atan2(nx, nz);
      npc.walkPhase += dt * 8;
      npc.mesh.userData.legL.rotation.x = Math.sin(npc.walkPhase) * 0.45;
      npc.mesh.userData.legR.rotation.x = Math.sin(npc.walkPhase + Math.PI) * 0.45;
      return dist;
    }

    const _bldCol = new THREE.Color();
    function updateNPCs(dt) {
      // Freeze when time is paused
      if (!autoCycle) return;

      // Dusk check — send active NPCs home (dusk ≈ timeOfDay 0.70–0.80)
      const isDusk = timeOfDay >= 0.70 && timeOfDay <= 0.80;

      for (let i = 0; i < npcs.length; i++) {
        const npc = npcs[i];
        npc.mesh.userData.woodBundle.visible = npc.carrying;

        // At dusk, interrupt active NPCs and send them home
        if (isDusk && npc.state !== NPC_IDLE && npc.state !== NPC_GOING_HOME && npc.state !== NPC_BUILD) {
          npc.carrying = false;
          npc.mesh.children[0].rotation.x = 0;
          npc.mesh.children[0].rotation.z = 0;
          npc.state = NPC_GOING_HOME;
        }

        switch (npc.state) {
          case NPC_GOING_HOME: {
            if (moveNPC(npc, npc.homeX, npc.homeZ, dt) === 0) {
              npc.state = NPC_IDLE;
              npc.timer = 5 + Math.random() * 15;
            }
            break;
          }

          case NPC_WANDER: {
            if (moveNPC(npc, npc.targetX, npc.targetZ, dt) === 0) {
              npc.state = NPC_IDLE;
              npc.timer = 4 + Math.random() * 12;
            }
            break;
          }

          case NPC_IDLE: {
            npc.mesh.userData.legL.rotation.x = 0;
            npc.mesh.userData.legR.rotation.x = 0;
            npc.timer -= dt;
            if (npc.timer > 0) break;
            if (!npc.wakeTime) npc.wakeTime = 0.32 + Math.random() * 0.08;
            if (timeOfDay < npc.wakeTime || timeOfDay > 0.65) { npc.timer = 3; break; }

            if (!npc.isBuilder) {
              // ── Wanderer: stroll to a random point near home ──
              const ang = Math.random() * Math.PI * 2;
              const wd = 8 + Math.random() * 20;
              npc.targetX = npc.homeX + Math.cos(ang) * wd;
              npc.targetZ = npc.homeZ + Math.sin(ang) * wd;
              npc.state = NPC_WANDER;
              break;
            }

            // ── Builder ──
            // Resume existing project if one is in progress
            if (npc.buildMesh) {
              if (npc.rocksCarried < ROCK_TRIPS) {
                // Start seeking rocks — gradient ascent with expanding radius
                npc.seekRadius = 25;
                npc.seekAttempts = 0;
                const wp = pickUphillWaypoint(npc.x, npc.z, npc.seekRadius);
                npc.targetX = wp.x; npc.targetZ = wp.z;
                npc.state = NPC_SEEK_ROCK;
              } else {
                // Resume wood gathering
                if (npc.treeIdx < 0 || (windTrees[npc.treeIdx] && windTrees[npc.treeIdx].chopped)) {
                  const ti = findNearestTree(npc.siteX, npc.siteZ, 80);
                  if (ti < 0) { npc.timer = 30; break; }
                  claimedTrees.add(ti);
                  npc.treeIdx = ti;
                  npc.woodTrips = 0;
                }
                npc.targetX = treePositions[npc.treeIdx].x;
                npc.targetZ = treePositions[npc.treeIdx].z;
                npc.state = NPC_WALK_TREE;
              }
              break;
            }
            // Start a new building project
            const site = pickBuildSite(npc);
            npc.siteX = site.x; npc.siteZ = site.z;
            npc.rocksCarried = 0;
            npc.woodTrips = 0;
            const bm = new THREE.Mesh(
              new THREE.BoxGeometry(5, 5, 5),
              new THREE.MeshStandardMaterial({ color: 0x7a7a7a, flatShading: true, roughness: 0.9 })
            );
            bm.scale.y = 0.03;
            bm.position.set(site.x, site.y + 0.08, site.z);
            bm.castShadow = true;
            scene.add(bm);
            npc.buildMesh = bm;
            // Start seeking rocks for new project
            npc.seekRadius = 25;
            npc.seekAttempts = 0;
            const wp = pickUphillWaypoint(npc.x, npc.z, npc.seekRadius);
            npc.targetX = wp.x; npc.targetZ = wp.z;
            npc.state = NPC_SEEK_ROCK;
            break;
          }

          case NPC_WALK_ROCK: {
            if (moveNPC(npc, npc.targetX, npc.targetZ, dt) === 0) {
              npc.state = NPC_GATHER_ROCK;
              npc.timer = NPC_GATHER_TIME;
            }
            break;
          }

          case NPC_GATHER_ROCK: {
            npc.timer -= dt;
            npc.mesh.children[0].rotation.x = 0.3;
            if (npc.timer <= 0) {
              npc.mesh.children[0].rotation.x = 0;
              // Deplete this rock
              if (npc.rockIdx >= 0) {
                depletedRocks.add(npc.rockIdx);
                if (rockMeshes[npc.rockIdx]) rockMeshes[npc.rockIdx].visible = false;
              }
              npc.carrying = true;
              npc.targetX = npc.siteX; npc.targetZ = npc.siteZ;
              npc.state = NPC_WALK_SITE;
            }
            break;
          }

          case NPC_SEEK_ROCK: {
            // Walk toward current waypoint, scanning for rocks en route
            const seekDist = moveNPC(npc, npc.targetX, npc.targetZ, dt);
            // Check for rocks within expanding search radius
            const ri = findNearestRock(npc.x, npc.z, npc.seekRadius);
            if (ri >= 0) {
              // Found one — go get it
              npc.rockIdx = ri;
              npc.targetX = rockPositions[ri].x;
              npc.targetZ = rockPositions[ri].z;
              npc.state = NPC_WALK_ROCK;
              break;
            }
            if (seekDist === 0) {
              // Reached waypoint without finding a rock — expand and try again
              npc.seekAttempts++;
              npc.seekRadius = Math.min(npc.seekRadius + 10, 200);
              if (npc.seekAttempts > 8) {
                // Give up for now — go home and rest
                npc.state = NPC_GOING_HOME;
                break;
              }
              // Pick next uphill waypoint from current position
              const wp = pickUphillWaypoint(npc.x, npc.z, npc.seekRadius);
              npc.targetX = wp.x;
              npc.targetZ = wp.z;
            }
            break;
          }

          case NPC_WALK_TREE: {
            if (moveNPC(npc, npc.targetX, npc.targetZ, dt) === 0) {
              npc.state = NPC_CHOP;
              npc.timer = NPC_CHOP_TIME;
            }
            break;
          }

          case NPC_CHOP: {
            npc.timer -= dt;
            const chopProg = 1 - npc.timer / NPC_CHOP_TIME;
            // Rhythmic chop animation
            npc.mesh.children[0].rotation.z = Math.sin(npc.timer * 8) * 0.2 * (1 - chopProg);
            // Progressive tree shrink: each visit removes 1/WOOD_TRIPS of the tree
            if (npc.treeIdx >= 0 && windTrees[npc.treeIdx] && !windTrees[npc.treeIdx].chopped) {
              const tg = windTrees[npc.treeIdx].group;
              const baseScale = 1.0 - npc.woodTrips / WOOD_TRIPS;
              const visitShrink = chopProg / WOOD_TRIPS;
              const s = Math.max(0.01, baseScale - visitShrink);
              tg.scale.set(s, s, s);
              // Lean only on final trip when nearly done
              const isFinalTrip = npc.woodTrips >= WOOD_TRIPS - 1;
              if (isFinalTrip && chopProg > 0.7) {
                tg.rotation.z = (chopProg - 0.7) * 4.0;
              }
            }
            if (npc.timer <= 0) {
              npc.woodTrips++;
              npc.mesh.children[0].rotation.z = 0;
              // Check if tree is fully felled
              if (npc.woodTrips >= WOOD_TRIPS) {
                if (npc.treeIdx >= 0 && windTrees[npc.treeIdx]) {
                  windTrees[npc.treeIdx].group.visible = false;
                  windTrees[npc.treeIdx].chopped = true;
                }
              }
              npc.carrying = true;
              npc.targetX = npc.siteX; npc.targetZ = npc.siteZ;
              npc.state = NPC_WALK_SITE;
            }
            break;
          }

          case NPC_WALK_SITE: {
            if (moveNPC(npc, npc.targetX, npc.targetZ, dt) === 0) {
              npc.carrying = false;
              if (npc.rocksCarried < ROCK_TRIPS) {
                // ── Depositing rock ──
                npc.rocksCarried++;
                if (npc.buildMesh) {
                  // Foundation grows during rock phase (scale.y 0.03 → 0.25)
                  npc.buildMesh.scale.y = 0.03 + (npc.rocksCarried / ROCK_TRIPS) * 0.22;
                  const sy = getTerrainY(npc.siteX, npc.siteZ);
                  npc.buildMesh.position.y = sy + (5 * npc.buildMesh.scale.y) * 0.5;
                }
                if (npc.rocksCarried >= ROCK_TRIPS) {
                  // Foundation done — switch to wood phase
                  if (npc.buildMesh) npc.buildMesh.material.color.setHex(0x8B7355);
                  const ti = findNearestTree(npc.siteX, npc.siteZ, 80);
                  if (ti < 0) { npc.state = NPC_IDLE; npc.timer = 40; break; }
                  claimedTrees.add(ti);
                  npc.treeIdx = ti;
                  npc.woodTrips = 0;
                  npc.targetX = treePositions[ti].x;
                  npc.targetZ = treePositions[ti].z;
                  npc.state = NPC_WALK_TREE;
                } else {
                  // Get another rock — start seeking uphill
                  npc.seekRadius = 25;
                  npc.seekAttempts = 0;
                  const wp = pickUphillWaypoint(npc.x, npc.z, npc.seekRadius);
                  npc.targetX = wp.x; npc.targetZ = wp.z;
                  npc.state = NPC_SEEK_ROCK;
                }
              } else {
                // ── Depositing wood ──
                if (npc.buildMesh) {
                  // Walls grow during wood phase (scale.y 0.25 → 0.70)
                  const woodFrac = npc.woodTrips / WOOD_TRIPS;
                  npc.buildMesh.scale.y = 0.25 + woodFrac * 0.45;
                  const sy = getTerrainY(npc.siteX, npc.siteZ);
                  npc.buildMesh.position.y = sy + (5 * npc.buildMesh.scale.y) * 0.5;
                }
                if (npc.woodTrips >= WOOD_TRIPS) {
                  // All wood gathered — start building
                  npc.state = NPC_BUILD;
                  npc.timer = NPC_BUILD_TIME;
                } else {
                  // Go back to same tree for another trip
                  npc.targetX = treePositions[npc.treeIdx].x;
                  npc.targetZ = treePositions[npc.treeIdx].z;
                  npc.state = NPC_WALK_TREE;
                }
              }
            }
            break;
          }

          case NPC_BUILD: {
            npc.timer -= dt;
            // NPC circles the construction
            const ba = (NPC_BUILD_TIME - npc.timer) * 1.2;
            npc.x = npc.siteX + Math.cos(ba) * 4;
            npc.z = npc.siteZ + Math.sin(ba) * 4;
            npc.mesh.position.x = npc.x;
            npc.mesh.position.z = npc.z;
            npc.mesh.position.y = getTerrainY(npc.x, npc.z);
            npc.mesh.rotation.y = ba + Math.PI;
            npc.walkPhase += dt * 6;
            npc.mesh.userData.legL.rotation.x = Math.sin(npc.walkPhase) * 0.3;
            npc.mesh.userData.legR.rotation.x = Math.sin(npc.walkPhase + Math.PI) * 0.3;
            // Construction grows to full height
            if (npc.buildMesh) {
              const bp = 1 - npc.timer / NPC_BUILD_TIME;
              npc.buildMesh.scale.y = 0.70 + bp * 0.30;
              const sy = getTerrainY(npc.siteX, npc.siteZ);
              npc.buildMesh.position.y = sy + (5 * npc.buildMesh.scale.y) * 0.5;
              _bldCol.set(npc.palette.building);
              npc.buildMesh.material.color.lerp(_bldCol, dt * 0.5);
            }
            if (npc.timer <= 0) {
              // Remove placeholder
              if (npc.buildMesh) {
                scene.remove(npc.buildMesh);
                npc.buildMesh.geometry.dispose();
                npc.buildMesh.material.dispose();
                npc.buildMesh = null;
              }
              // Create real building
              const ss = 0.8 + Math.random() * 0.4;
              const nb = createBuilding(npc.palette, ss);
              const bgy = getTerrainY(npc.siteX, npc.siteZ);
              nb.position.set(npc.siteX, bgy, npc.siteZ);
              nb.rotation.y = Math.random() * Math.PI * 2;
              scene.add(nb);
              // Register wind faces for new building
              const { w: bw, h: bh, d: bd } = nb.userData.dims;
              const rot = nb.rotation.y, cR = Math.cos(rot), sR = Math.sin(rot);
              windFaces.push(
                { cx: npc.siteX+(bw/2)*cR, cz: npc.siteZ+(bw/2)*sR, nx:cR, nz:sR, halfExtent:bd/2, height:bh, groundY:bgy },
                { cx: npc.siteX-(bw/2)*cR, cz: npc.siteZ-(bw/2)*sR, nx:-cR, nz:-sR, halfExtent:bd/2, height:bh, groundY:bgy },
                { cx: npc.siteX-(bd/2)*sR, cz: npc.siteZ+(bd/2)*cR, nx:-sR, nz:cR, halfExtent:bw/2, height:bh, groundY:bgy },
                { cx: npc.siteX+(bd/2)*sR, cz: npc.siteZ-(bd/2)*cR, nx:sR, nz:-cR, halfExtent:bw/2, height:bh, groundY:bgy }
              );
              // Register smoke attractor
              buildingAttractors.push({
                x: npc.siteX, y: bgy + bh * 0.5, z: npc.siteZ,
                r: Math.max(bw, bd) * 0.6,
                windowMats: nb.userData.windowMats || [],
                glowIntensity: 0, glowColor: new THREE.Color(0, 0, 0),
                charge: 0, chargeMax: 1.0
              });
              // Spawn new NPC at the new home
              spawnNPC(npc.siteX, npc.siteZ, npc.palette, npc.kingdomIdx);
              // Original NPC goes home
              npc.x = npc.homeX; npc.z = npc.homeZ;
              npc.mesh.position.set(npc.homeX, getTerrainY(npc.homeX, npc.homeZ), npc.homeZ);
              npc.state = NPC_IDLE;
              npc.timer = 10 + Math.random() * 20;
            }
            break;
          }
        }
      }
    }

    // ─────────────────────────────────────────
    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.05);

      // Time of day + moon phase advancement
      const wasDay = timeOfDay > 0.3 && timeOfDay < 0.7;
      if (autoCycle) {
        timeOfDay = (timeOfDay + CYCLE_SPEED * dt) % 1;
      }
      const isDay = timeOfDay > 0.3 && timeOfDay < 0.7;
      // Advance moon phase on day→night transition
      if (lastDayState && !isDay) {
        dayCounter++;
        if (dayCounter >= DAYS_PER_PHASE) {
          dayCounter = 0;
          moonPhaseIndex = (moonPhaseIndex + 1) % MOON_PHASES.length;
        }
      }
      lastDayState = isDay;
      applyLighting(timeOfDay);
      updateTimeDisplay();

      // Player
      updatePlayer(dt);

      // Wind
      updateWind(dt);
      updateWindDebug(dt);

      // Smoke night glow — inversely proportional to moon brightness
      const nightFac = (timeOfDay <= 0.25 || timeOfDay >= 0.75)
        ? 1.0
        : (timeOfDay < 0.35 ? 1.0 - (timeOfDay - 0.25) / 0.10
         : timeOfDay > 0.65 ? (timeOfDay - 0.65) / 0.10 : 0.0);
      const moonBrightness = getCurrentMoonPhase().light;
      // Squared falloff: full moon → near zero glow, new moon → full glow
      const moonDim = (1.0 - moonBrightness * 0.3);
      smokeMat.uniforms.uNightGlow.value = nightFac * moonDim * moonDim;

      // NPCs
      updateNPCs(dt);

      // Smoke
      updateSmoke(dt);
      updateChimneySmoke(dt);

      // Camera
      updateCamera();

      renderer.render(scene, camera);
    }

    // ─────────────────────────────────────────
    //  RESIZE
    // ─────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Start
    animate();
  </script>
</body>
