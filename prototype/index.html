      // ── Terrain slope updraft/downdraft ──
      // Wind hitting upslope → updraft, downslope → downdraft
      const eps = 2.0;
      const slopeX = (getTerrainY(wx + eps, wz) - groundRef) / eps;
      const slopeZ = (getTerrainY(wx, wz + eps) - groundRef) / eps;
      const slopeUplift = -(bx * slopeX + bz * slopeZ) * 0.35;
      // Effect decays with altitude
      dy += slopeUplift * Math.exp(-hag * 0.12);

      // ── Object proximity vertical kick ──
      // Buildings create updrafts (windward deflection) and downdrafts (lee wake)
      // Uses buildingAttractors for cheap proximity check (no full influencer scan)
      const OBJ_VERT_RANGE = 25;
      for (let bi = 0; bi < buildingAttractors.length; bi++) {
        const ba = buildingAttractors[bi];
        const odx = wx - ba.x, odz = wz - ba.z;
        const od2 = odx * odx + odz * odz;
        if (od2 > OBJ_VERT_RANGE * OBJ_VERT_RANGE) continue;
        const od = Math.sqrt(od2);
        const proximity = 1.0 - od / OBJ_VERT_RANGE;
        // Dot product: is wind blowing toward or away from building?
        const invOd = 1.0 / (od + 0.5);
        const toObjX = -odx * invOd, toObjZ = -odz * invOd;
        const windDot = bx * toObjX + bz * toObjZ; // positive = blowing toward building
        if (windDot > 0) {
          // Windward: deflect upward (stronger close to building)
          dy += windDot * proximity * proximity * 0.8;
        } else {
          // Lee: downdraft in wake
          dy += windDot * proximity * 0.3;
        }
        // Turbulent mixing near roofline
        const roofDist = Math.abs(wy - ba.y);
        if (roofDist < 5) {
          dy += simplex2(wx * 0.12 + t * 0.4 + bi, wz * 0.12) * proximity * 0.4;
        }

        // ── Chimney suction: strong downward pull above roofline ──
        // Mirrors getWindDebug §6b chimney — pulls smoke from sky into building
        const _roofTop = ba.y + ba.r;
        const _aboveRoof = wy - _roofTop;
        const _CHIMNEY_H = 50.0;
        const _CHIMNEY_HORIZ = 6.0;
        const _CHIMNEY_PULL = 18.0;
        if (_aboveRoof > 0 && od < _CHIMNEY_HORIZ) {
          const _hF = 1.0 - od / _CHIMNEY_HORIZ;
          const _cF = _aboveRoof < _CHIMNEY_H
            ? 1.0 - (_aboveRoof / _CHIMNEY_H) * 0.5
            : Math.exp(-(_aboveRoof - _CHIMNEY_H) * 0.3);
          const _sStr = _hF * _hF * _cF * _CHIMNEY_PULL;
          dy -= _sStr;
          bx += (-odx * invOd) * _sStr * 0.4;
          bz += (-odz * invOd) * _sStr * 0.4;
        }
      }

      _swBuf.dx = bx;
      _swBuf.dy = dy;
      _swBuf.dz = bz;
      return _swBuf;
    }

    let smokeVisible = true;
    let _smokeSpawnT = 0;
    const SMOKE_SPAWN_RATE  = 0.0065; // one puff every ~65 ms ≈ 15/s
    const SMOKE_WIND_SPEED  = 20;   // world units per second per unit wind

    // ── Building glow decay + deferred light push (runs every frame, even with smoke off) ──
    const _warmWinTmp = new THREE.Color();
    function updateBuildingLights(dt) {
      deferredLightsClear();
      const MAX_DRAIN_TIME = 0.250 / CYCLE_SPEED;

      // Lights on from mid-dusk (0.73) through night to dawn start (0.23)
      // Smooth fade: ramp up 0.70→0.75, ramp down 0.22→0.27
      let lightsFade;
      if (timeOfDay > 0.75 || timeOfDay < 0.22) {
        lightsFade = 1.0; // full on at night
      } else if (timeOfDay >= 0.70 && timeOfDay <= 0.75) {
        lightsFade = (timeOfDay - 0.70) / 0.05; // fade in during mid-dusk
      } else if (timeOfDay >= 0.22 && timeOfDay <= 0.27) {
        lightsFade = 1.0 - (timeOfDay - 0.22) / 0.05; // fade out at dawn
      } else {
        lightsFade = 0; // off during day
      }

      for (let bi = 0; bi < buildingAttractors.length; bi++) {
        const ba = buildingAttractors[bi];
        if (ba.charge > 0.001) {
          if (autoCycle) {
            const drainRate = 1.0 / (MAX_DRAIN_TIME * Math.max(ba.charge, 0.05));
            ba.charge = Math.max(0, ba.charge - drainRate * dt);
          }
          ba.glowIntensity = Math.min(ba.charge * 1.2, 1.0);

          // Apply time-of-day fade to visible glow
          const visGlow = ba.glowIntensity * lightsFade;
          const warmWinColor = _warmWinTmp.set(1.0, 0.85, 0.4);
          for (let mi = 0; mi < ba.windowMats.length; mi++) {
            ba.windowMats[mi].color.copy(warmWinColor).multiplyScalar(visGlow);
          }
          // One light per windowed wall face, offset outward from the building
          if (visGlow > 0.01) {
            const wl = ba.windowLights;
            if (wl) {
              for (let wi = 0; wi < wl.length; wi++) {
                deferredLightPush(
                  wl[wi].x, wl[wi].y, wl[wi].z,
                  1.0, 0.85, 0.4,    // warm yellow
                  visGlow * 12.0,
                  1500 + visGlow * 10,
                  wl[wi].nx, wl[wi].ny, wl[wi].nz,
                  0.35  // cos(~70°) — cone half-angle for window light
                );
              }
            }
          }
        } else if (ba.charge > 0 || ba.glowIntensity > 0) {
          ba.charge = 0;
          ba.glowIntensity = 0;
          const dark = new THREE.Color(0x1a1a22);
          for (let mi = 0; mi < ba.windowMats.length; mi++) {
            ba.windowMats[mi].color.copy(dark);
          }
        }
      }
    }

    function updateSmoke(dt) {
      if (!smokeVisible) return;
      const px = playerGroup.position.x, pz = playerGroup.position.z;
      // Spawn — rate scales with night glow and ghost blob count
      // More blobs alive = more trail. No blobs = no trail.
      const glowVal = smokeMat.uniforms.uNightGlow.value;
      const blobFrac = ghostMaxBlobs > 0 ? ghostBlobCount / ghostMaxBlobs : 0;
      const trailMult = ghostActive ? Math.max(0.05, blobFrac) : 1.0; // day = full trail
      const effectiveRate = (glowVal < 0.01 ? Infinity : SMOKE_SPAWN_RATE / glowVal) / trailMult;
      _smokeSpawnT += dt;
      if (_smokeSpawnT >= effectiveRate) {
        _smokeSpawnT = 0;
        spawnSmoke();
      }

      // One terrain lookup shared by all particles this frame
      const groundRef = getTerrainY(playerGroup.position.x, playerGroup.position.z);

      for (let i = 0; i < SMOKE_MAX; i++) {
        const pi3 = i * 3;

        if (!_sac[i]) {
          _gSz[i] = 0; _gAlph[i] = 0;
          continue;
        }

        _sli[i] += dt / _sml[i];
        if (_sli[i] >= 1.0) {
          _sac[i] = 0; _gSz[i] = 0; _gAlph[i] = 0;
          continue;
        }

        const life = _sli[i];

        // Sample wind — smoke is carried more strongly as it cools and slows
        const w    = windForSmoke(_sx[i], _sz[i], _sy[i], getTerrainY(_sx[i], _sz[i]), windTime);
        const drag = Math.min(life * 1.2, 1.0); // 0 = own momentum, 1 = wind-controlled

        // Steer horizontal velocity toward ambient wind (stronger pull)
        _svx[i] += (w.dx * SMOKE_WIND_SPEED - _svx[i]) * drag * dt * 3.5;
        _svz[i] += (w.dz * SMOKE_WIND_SPEED - _svz[i]) * drag * dt * 3.5;
        // Vertical wind steering — turbulence, slope updrafts, object deflection
        _svy[i] += w.dy * SMOKE_WIND_SPEED * 0.7 * drag * dt;

        // ── Building attraction: structures pull in nearby smoke ──
        // Smoke trail is strongly drawn to buildings
        const ATTRACT_RANGE = 35;
        const ATTRACT_STRENGTH = 12.0;
        const windSpeed = Math.sqrt(w.dx * w.dx + w.dz * w.dz) * SMOKE_WIND_SPEED;
        // Wind suppression is gentler — smoke is attracted even in moderate wind
        const windSuppression = Math.max(0.15, 1.0 - (windSpeed - 6.0) / 14.0);

        let nearDist2 = ATTRACT_RANGE * ATTRACT_RANGE;
        let nearIdx = -1;
        for (let bi = 0; bi < buildingAttractors.length; bi++) {
          const ba = buildingAttractors[bi];
          const adx = ba.x - _sx[i], adz = ba.z - _sz[i];
          const d2 = adx * adx + adz * adz;
          if (d2 < nearDist2) { nearDist2 = d2; nearIdx = bi; }
        }
        if (nearIdx >= 0 && windSuppression > 0.01) {
          const ba = buildingAttractors[nearIdx];
          const adx = ba.x - _sx[i], ady = ba.y - _sy[i], adz = ba.z - _sz[i];
          const dist = Math.sqrt(nearDist2);
          // Attraction ramps up closer, but modulated by wind calm
          const pull = ATTRACT_STRENGTH * (1.0 - dist / ATTRACT_RANGE) * windSuppression;
          const invD = 1.0 / (dist + 0.5);
          _svx[i] += adx * invD * pull * dt;
          _svy[i] += ady * invD * pull * 1.5 * dt;
          _svz[i] += adz * invD * pull * dt;
          // Consume only when wind is calm enough for smoke to actually reach
          if (dist < ba.r && windSuppression > 0.3) {
            _sli[i] = Math.max(_sli[i], 0.88);
            // Light up windows with the smoke's neon hue
            if (ba.windowMats.length > 0) {
              const pHash = Math.abs(Math.sin(_sx[i] * 127.1 + _sz[i] * 311.7) * 43758.5453) % 1;
              let pHue;
              if (pHash > 0.88) pHue = 0.28 + (pHash - 0.88) * 1.5;
              else pHue = 0.58 + (pHash / 0.88) * 0.30;
              // Warm-tinted window glow: neon hue blended toward amber
              const neonCol = hsvToColor(pHue, 0.8, 1.0);
              const warmCol = new THREE.Color(1.0, 0.85, 0.5);
              neonCol.lerp(warmCol, 0.5);
              // Accumulate charge — each particle adds a small amount
              ba.charge = Math.min(ba.charge + 0.08, ba.chargeMax);
              ba.glowIntensity = Math.min(ba.charge * 1.2, 1.0);
              ba.glowColor.lerp(neonCol, 0.3);
            }
          }
        }

        // ── Canopy attraction: tree canopies pull in nearby smoke ──
        // Weaker than buildings, but trees glow when they consume smoke
        const CANOPY_RANGE = 20;
        const CANOPY_STRENGTH = 2.5;
        const cnResult = findNearestCanopy(_sx[i], _sz[i], CANOPY_RANGE);
        if (cnResult.idx >= 0 && windSuppression > 0.01) {
          const ca = canopyAttractors[cnResult.idx];
          const cdx = ca.x - _sx[i], cdy = ca.y - _sy[i], cdz = ca.z - _sz[i];
          const cDist = Math.sqrt(cnResult.dist2);
          const cPull = CANOPY_STRENGTH * (1.0 - cDist / CANOPY_RANGE) * windSuppression;
          const cInvD = 1.0 / (cDist + 0.5);
          _svx[i] += cdx * cInvD * cPull * dt;
          _svy[i] += cdy * cInvD * cPull * 0.8 * dt;
          _svz[i] += cdz * cInvD * cPull * dt;
          // Consume + glow: smoke absorbed by canopy
          if (cDist < ca.r && windSuppression > 0.2) {
            _sli[i] = Math.max(_sli[i], 0.90);
            // Compute neon hue from particle position hash (same as shader)
            const pHash = Math.abs(Math.sin(_sx[i] * 127.1 + _sz[i] * 311.7) * 43758.5453) % 1;
            let pHue;
            if (pHash > 0.88) pHue = 0.28 + (pHash - 0.88) * 1.5;
            else pHue = 0.58 + (pHash / 0.88) * 0.30;
            // Charge the canopy glow — mostly just brightens the tree's own green
            const glowBoost = 0.06 * smokeMat.uniforms.uNightGlow.value;
            ca.glowIntensity = Math.min(ca.glowIntensity + glowBoost, 0.15);
            // Tint: 85% tree's own green, 15% neon hue
            ca.glowColor.lerp(hsvToColor(pHue, 1.0, 1.0), 0.08);
          }
        }

        // Buoyancy: strong upwash when fresh, decays as smoke cools
        const buoy = Math.max(0, 1.0 - life * 1.9) * 0.55;
        _svy[i] += (buoy - _svy[i]) * 2.8 * dt;
        _svy[i] = Math.max(_svy[i], -0.05); // don't let it sink hard

        _sx[i] += _svx[i] * dt;
        _sy[i] += _svy[i] * dt;
        _sz[i] += _svz[i] * dt;

        // Opacity: snappy fade-in, long plateau, graceful fade-out
        const fadeIn  = Math.min(life * 14.0, 1.0);
        const fadeOut = 1.0 - Math.pow(Math.max(0, (life - 0.50) / 0.50), 1.8);
        const alpha   = fadeIn * fadeOut * 0.50;

        // Size grows as smoke disperses, but shrinks with distance from camera
        const cam = camera.position;
        const dx = _sx[i] - cam.x;
        const dy = _sy[i] - cam.y;
        const dz = _sz[i] - cam.z;
        const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
        // Perspective: further = smaller, but clamp min/max for visibility
        const perspective = Math.max(0.18, Math.min(1.0, 18.0 / (dist + 1)));
        const size = _ssi[i] * (0.45 + life * 3.2) * perspective;

        _gPos[pi3]   = _sx[i];
        _gPos[pi3+1] = _sy[i];
        _gPos[pi3+2] = _sz[i];
        _gSz[i]   = size;
        _gAlph[i] = alpha;
        _gLife[i] = life;
      }

      smokeGeo.attributes.position.needsUpdate = true;
      smokeGeo.attributes.pSize.needsUpdate    = true;
      smokeGeo.attributes.pAlpha.needsUpdate   = true;
      smokeGeo.attributes.pLife.needsUpdate    = true;

      // ── Trail particles: deposit + age ──
      // Deposit trail dots behind moving smoke particles
      let trailBudget = 12; // max new trail points per frame (keeps it cheap)
      for (let i = 0; i < SMOKE_MAX && trailBudget > 0; i++) {
        if (!_sac[i]) continue;
        const life = _sli[i];
        // Only trail particles that are past the initial burst and not almost dead
        if (life < 0.08 || life > 0.85) continue;
        // Stagger: not every particle every frame — use index + frame modulo
        if ((i + _trailHead) % 4 !== 0) continue;
        const ti = _trailHead;
        _trailHead = (_trailHead + 1) % TRAIL_MAX;
        const ti3 = ti * 3;
        _tPos[ti3]     = _sx[i];
        _tPos[ti3 + 1] = _sy[i];
        _tPos[ti3 + 2] = _sz[i];
        _tMaxL[ti] = (1.0 - life) * _sml[i] * (0.5 + Math.random() * 0.5); // lives as long as parent's remaining life
        _tLife[ti] = 0;
        _tAc[ti] = 1;
        trailBudget--;
      }

      // Age trail particles + drift with wind
      for (let i = 0; i < TRAIL_MAX; i++) {
        if (!_tAc[i]) {
          _tSz[i] = 0; _tAlph[i] = 0;
          continue;
        }
        _tLife[i] += dt / _tMaxL[i];
        if (_tLife[i] >= 1.0) {
          _tAc[i] = 0; _tSz[i] = 0; _tAlph[i] = 0;
          continue;
        }
        const tl = _tLife[i];
        // Wind drift — gentle carry matching smoke wind
        const ti3 = i * 3;
        const tw = windForSmoke(_tPos[ti3], _tPos[ti3 + 2], _tPos[ti3 + 1], getTerrainY(_tPos[ti3], _tPos[ti3 + 2]), windTime);
        const drift = 0.3 + tl * 0.7; // older trails drift more (fully wind-carried)
        _tPos[ti3]     += tw.dx * SMOKE_WIND_SPEED * drift * dt * 0.6;
        _tPos[ti3 + 2] += tw.dz * SMOKE_WIND_SPEED * drift * dt * 0.6;
        // Vertical: wind turbulence + gentle upward float
        _tPos[ti3 + 1] += (0.15 + tw.dy * SMOKE_WIND_SPEED * drift * 0.3) * dt;
        // Fade out gracefully
        _tAlph[i] = (1.0 - tl * tl) * 0.45;
        // Small, slightly growing
        _tSz[i] = (0.15 + tl * 0.3);
      }

      trailGeo.attributes.position.needsUpdate = true;
      trailGeo.attributes.pSize.needsUpdate    = true;
      trailGeo.attributes.pAlpha.needsUpdate   = true;
      trailGeo.attributes.pLife.needsUpdate     = true;

      // ── Canopy glow decay — fade emissive back to zero ──
      for (let ci = 0; ci < canopyAttractors.length; ci++) {
        const ca = canopyAttractors[ci];
        if (ca.glowIntensity > 0.001) {
          ca.glowIntensity *= Math.pow(0.25, dt); // ~4s half-life decay
          for (let mi = 0; mi < ca.mats.length; mi++) {
            const mat = ca.mats[mi];
            // Use the tree's own diffuse color as emissive base, faintly tinted
            mat.emissive.copy(mat.color).lerp(ca.glowColor, 0.15);
            mat.emissiveIntensity = ca.glowIntensity;
          }
        } else if (ca.glowIntensity > 0) {
          ca.glowIntensity = 0;
          for (let mi = 0; mi < ca.mats.length; mi++) {
            ca.mats[mi].emissiveIntensity = 0;
          }
        }
      }

      // Update smoke glow lights — smoothly track particles, pulsate colors
      const nightGlow = smokeMat.uniforms.uNightGlow.value;

      if (nightGlow < 0.05) {
        for (let li = 0; li < SMOKE_LIGHT_COUNT; li++) {
          smokeLights[li].visible = false;
          _slTracked[li] = -1;
          _slIntensity[li] = 0;
        }
      } else {
        // Check if tracked particles are still alive; if dead, release
        for (let li = 0; li < SMOKE_LIGHT_COUNT; li++) {
          const ti = _slTracked[li];
          if (ti >= 0 && (!_sac[ti] || _sli[ti] > 0.92)) {
            _slTracked[li] = -1; // release — particle died or nearly dead
          }
        }

        // Find untracked bright particles to assign to empty slots
        const tracked = new Set();
        for (let li = 0; li < SMOKE_LIGHT_COUNT; li++) {
          if (_slTracked[li] >= 0) tracked.add(_slTracked[li]);
        }

        // Collect candidate particles (bright, untracked, not too young)
        const candidates = [];
        for (let i = 0; i < SMOKE_MAX; i++) {
          if (!_sac[i] || tracked.has(i)) continue;
          if (_sli[i] < 0.05 || _sli[i] > 0.85) continue;
          const score = _gAlph[i] * (1 - _sli[i] * 0.5);
          if (score > 0.05) candidates.push({ idx: i, score });
        }
        candidates.sort((a, b) => b.score - a.score);

        // Assign candidates to empty light slots
        let ci = 0;
        for (let li = 0; li < SMOKE_LIGHT_COUNT; li++) {
          if (_slTracked[li] >= 0) continue;
          if (ci >= candidates.length) break;
          const pi = candidates[ci++].idx;
          _slTracked[li] = pi;
          _slPosX[li] = _sx[pi];
          _slPosY[li] = _sy[pi];
          _slPosZ[li] = _sz[pi];
          // Initial hue from particle hash
          const hash = Math.abs(Math.sin(_sx[pi] * 127.1 + _sz[pi] * 311.7) * 43758.5453) % 1;
          _slHue[li] = hash > 0.88 ? 0.28 + (hash - 0.88) * 1.5 : 0.58 + (hash / 0.88) * 0.30;
        }

        // Smooth update: interpolate position, pulsate color/intensity
        const t = performance.now() * 0.001;
        for (let li = 0; li < SMOKE_LIGHT_COUNT; li++) {
          const pl = smokeLights[li];
          const pi = _slTracked[li];
          if (pi < 0) {
            // Fade out smoothly
            _slIntensity[li] *= 0.92;
            if (_slIntensity[li] < 0.01) { pl.visible = false; continue; }
            pl.intensity = _slIntensity[li];
            pl.visible = true;
            continue;
          }

          pl.visible = true;
          // Smooth position lerp toward tracked particle
          const lerpRate = 3.0 * dt;
          _slPosX[li] += (_sx[pi] - _slPosX[li]) * lerpRate;
          _slPosY[li] += (_sy[pi] - _slPosY[li]) * lerpRate;
          _slPosZ[li] += (_sz[pi] - _slPosZ[li]) * lerpRate;
          pl.position.set(_slPosX[li], _slPosY[li], _slPosZ[li]);

          // Pulsating hue: slowly shift through neighboring hues
          const pulseCycle = Math.sin(t * 0.8 + li * 1.7) * 0.08; // gentle hue shift
          const hue = (_slHue[li] + pulseCycle + 1) % 1;
          const pulseBright = 0.85 + Math.sin(t * 1.5 + li * 2.3) * 0.15; // intensity pulse
          pl.color.copy(hsvToColor(hue, 0.9, pulseBright));

          // Target intensity based on particle brightness
          const targetInt = nightGlow * _gAlph[pi] * 100.0;
          _slIntensity[li] += (targetInt - _slIntensity[li]) * 2.0 * dt;
          pl.intensity = _slIntensity[li];
          pl.distance = 220 + _slIntensity[li] * 100;
        }
      }
    }

    // ─────────────────────────────────────────
    //  NPC SYSTEM — villager simulation
    //  One NPC per home.  Gather wood → build new home → reproduce.
    //  States: IDLE → WALK_TREE → CHOP → WALK_SITE → BUILD → (spawn) → IDLE
    // ─────────────────────────────────────────
    const NPC_SPEED      = 7;
    const NPC_CHOP_TIME  = 5.0;
    const NPC_BUILD_TIME = 10.0;
    const NPC_GATHER_TIME = 2.0; // time to pick up a rock
    function createNPCMesh(palette) {
      const g = new THREE.Group();
      // Body
      const body = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.5, 1.2, 3, 5),
        new THREE.MeshStandardMaterial({ color: palette.building, flatShading: true })
      );
      body.position.y = 1.2; body.castShadow = true;
      g.add(body);
      // Head
      const head = new THREE.Mesh(
        new THREE.IcosahedronGeometry(0.35, 1),
        new THREE.MeshStandardMaterial({ color: 0xd4a574, flatShading: true })
      );
      head.position.y = 2.3; g.add(head);
      // Cloak
      const cloak = new THREE.Mesh(
        new THREE.ConeGeometry(0.7, 0.7, 5),
        new THREE.MeshStandardMaterial({ color: palette.roof, flatShading: true })
      );
      cloak.position.y = 2.0; cloak.rotation.x = Math.PI; cloak.castShadow = true;
      g.add(cloak);
      // Legs
      const lMat = new THREE.MeshStandardMaterial({ color: palette.wall || 0x5a3a2a, flatShading: true });
      const legL = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.18, 0.7, 4), lMat);
      const legR = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.18, 0.7, 4), lMat);
      legL.position.set(-0.2, 0.35, 0); legR.position.set(0.2, 0.35, 0);
      legL.castShadow = true; legR.castShadow = true;
      g.add(legL, legR);
      g.userData.legL = legL; g.userData.legR = legR;
      // Wood bundle (hidden until carrying)
      const wood = new THREE.Mesh(
        new THREE.BoxGeometry(0.8, 0.3, 0.5),
        new THREE.MeshStandardMaterial({ color: 0x8B6914, flatShading: true })
      );
      wood.position.set(0, 2.1, -0.35); wood.visible = false;
      g.add(wood);
      g.userData.woodBundle = wood;
      return g;
    }

    function spawnNPC(homeX, homeZ, palette, kingdomIdx) {
      const count = npcs.filter(n => n.kingdomIdx === kingdomIdx).length;
      if (count >= NPC_MAX_PER_KINGDOM) return;
      const mesh = createNPCMesh(palette);
      mesh.position.set(homeX, getTerrainY(homeX, homeZ), homeZ);
      scene.add(mesh);
      npcs.push({
        mesh, palette, kingdomIdx,
        homeX, homeZ,
        x: homeX, z: homeZ,
        state: NPC_IDLE,
        timer: 5 + Math.random() * 30,
        treeIdx: -1,
        rockIdx: -1,
        targetX: 0, targetZ: 0,
        siteX: 0, siteZ: 0,
        rocksCarried: 0,
        woodTrips: 0,    // trips to current tree (resets per tree)
        buildMesh: null,
        walkPhase: Math.random() * Math.PI * 2,
        carrying: false,
        isBuilder: Math.random() < NPC_BUILDER_RATIO,
        isFarmer: false, // set below after isBuilder check
        farmIdx: -1,     // index into farms[] once built
        farmWoodTrips: 0,
        farmMesh: null,  // placeholder during construction
        // Rock-seeking state
        seekRadius: 0,      // current search radius (grows on failure)
        seekAttempts: 0,     // how many waypoints tried this seek
        // Memory: last-used resource indices (persists across days)
        lastRockIdx: -1,
        lastTreeIdx: -1,
      });
      // Assign farmer role to some non-builders
      const newNpc = npcs[npcs.length - 1];
      if (!newNpc.isBuilder && Math.random() < NPC_FARMER_RATIO) {
        newNpc.isFarmer = true;
      }
    }

    function findNearestTree(fromX, fromZ, maxDist) {
      let best = -1, bestD2 = maxDist * maxDist;
      for (let i = 0; i < treePositions.length; i++) {
        if (claimedTrees.has(i)) continue;
        if (windTrees[i] && windTrees[i].chopped) continue;
        const t = treePositions[i];
        const d2 = (t.x - fromX) ** 2 + (t.z - fromZ) ** 2;
        if (d2 < bestD2) { bestD2 = d2; best = i; }
      }
      return best;
    }

    // Per-tree max chop trips: small trees (height ~8) = 2, large (height ~45) = 10
    function getTreeMaxTrips(treeIdx) {
      if (treeIdx < 0 || !windTrees[treeIdx]) return 3;
      const h = windTrees[treeIdx].height || 20;
      return Math.max(2, Math.round(2 + (h - 8) / 37 * 8));
    }

    function findNearestRock(fromX, fromZ, maxDist) {
      let best = -1, bestD2 = maxDist * maxDist;
      for (let i = 0; i < rockPositions.length; i++) {
        if (depletedRocks.has(i)) continue;
        const r = rockPositions[i];
        const d2 = (r.x - fromX) ** 2 + (r.z - fromZ) ** 2;
        if (d2 < bestD2) { bestD2 = d2; best = i; }
      }
      return best;
    }

    // ── Farm mesh — fenced crop plot ──
    function createFarmMesh(x, z) {
      const g = new THREE.Group();
      const gy = getTerrainY(x, z);
      // Tilled soil — flat brown rectangle
      const soilGeo = new THREE.BoxGeometry(8, 0.15, 6);
      const soilMat = new THREE.MeshStandardMaterial({ color: 0x5a4020, flatShading: true, roughness: 1 });
      const soil = new THREE.Mesh(soilGeo, soilMat);
      soil.position.y = 0.08;
      soil.receiveShadow = true;
      g.add(soil);
      // Furrows — thin ridges
      for (let r = -2; r <= 2; r++) {
        const furrow = new THREE.Mesh(
          new THREE.BoxGeometry(7.2, 0.12, 0.3),
          new THREE.MeshStandardMaterial({ color: 0x3d2a10, flatShading: true })
        );
        furrow.position.set(0, 0.2, r * 1.2);
        g.add(furrow);
      }
      // Fence posts — simple wooden stakes at corners
      const postMat = new THREE.MeshStandardMaterial({ color: 0x8B6914, flatShading: true });
      for (const fx of [-4.2, 4.2]) {
        for (const fz of [-3.2, 3.2]) {
          const post = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 1.2, 4), postMat);
          post.position.set(fx, 0.6, fz);
          post.castShadow = true;
          g.add(post);
        }
      }
      // Fence rails
      const railMat = new THREE.MeshStandardMaterial({ color: 0x9a7a30, flatShading: true });
      for (const fz of [-3.2, 3.2]) {
        const rail = new THREE.Mesh(new THREE.BoxGeometry(8.4, 0.08, 0.06), railMat);
        rail.position.set(0, 0.8, fz);
        g.add(rail);
      }
      for (const fx of [-4.2, 4.2]) {
        const rail = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.08, 6.4), railMat);
        rail.position.set(fx, 0.8, 0);
        g.add(rail);
      }
      // Crops — start hidden, revealed as growth stages
      const cropGroup = new THREE.Group();
      const cropMat = new THREE.MeshStandardMaterial({ color: 0x44882a, flatShading: true });
      for (let r = -2; r <= 2; r++) {
        for (let c = -3; c <= 3; c++) {
          const crop = new THREE.Mesh(
            new THREE.ConeGeometry(0.15, 0.5 + Math.random() * 0.3, 3),
            cropMat.clone()
          );
          crop.position.set(c * 0.95 + (Math.random() - 0.5) * 0.2, 0.4, r * 1.2 + (Math.random() - 0.5) * 0.2);
          crop.castShadow = true;
          cropGroup.add(crop);
        }
      }
      cropGroup.visible = false; // hidden until tended
      g.add(cropGroup);
      g.userData.cropGroup = cropGroup;
      g.userData.soilMat = soilMat;
      g.position.set(x, gy, z);
      return g;
    }

    function pickFarmSite(npc) {
      const MIN_FARM_GAP = 14;
      const MAX_ELEVATION_DELTA = 0.8; // max height diff across farm footprint
      for (let a = 0; a < 30; a++) {
        const ang = Math.random() * Math.PI * 2;
        const d = 30 + Math.random() * 35; // further from home
        const sx = npc.homeX + Math.cos(ang) * d;
        const sz = npc.homeZ + Math.sin(ang) * d;
        const sy = getTerrainY(sx, sz);
        if (sy < 2.5 || sy > 10) continue; // not water, not mountain
        // Flatness check — sample corners of the 8x6 farm footprint
        const corners = [
          getTerrainY(sx - 4, sz - 3), getTerrainY(sx + 4, sz - 3),
          getTerrainY(sx - 4, sz + 3), getTerrainY(sx + 4, sz + 3),
          getTerrainY(sx, sz)
        ];
        const minH = Math.min(...corners);
        const maxH = Math.max(...corners);
        if (maxH - minH > MAX_ELEVATION_DELTA) continue; // too hilly
        // Check distance from buildings
        let tooClose = false;
        for (let bi = 0; bi < buildingAttractors.length; bi++) {
          const ba = buildingAttractors[bi];
          if ((sx - ba.x) ** 2 + (sz - ba.z) ** 2 < MIN_FARM_GAP * MIN_FARM_GAP) { tooClose = true; break; }
        }
        if (tooClose) continue;
        // Check distance from other farms
        for (let fi = 0; fi < farms.length; fi++) {
          if ((sx - farms[fi].x) ** 2 + (sz - farms[fi].z) ** 2 < MIN_FARM_GAP * MIN_FARM_GAP) { tooClose = true; break; }
        }
        if (!tooClose) return { x: sx, z: sz, y: sy };
      }
      return null;
    }

    function pickBuildSite(npc) {
      const siteRotation = Math.random() * Math.PI * 2;
      const MIN_BLDG_GAP = 5.5; // minimum distance between building centers
      const BLD_SITE_RADIUS = 15; // 5x5x5 build site footprint
      for (let a = 0; a < 20; a++) {
        const ang = Math.random() * Math.PI * 2;
        const d = 10 + Math.random() * 14;
        const sx = npc.homeX + Math.cos(ang) * d;
        const sz = npc.homeZ + Math.sin(ang) * d;
        const sy = getTerrainY(sx, sz);
        if (sy < 2.0 || sy > 14) continue;
        // Check against all existing buildings
        let tooClose = false;
        for (let other = 0; other < npcs.length; other++) {
          const bm = npcs[other].buildMesh;
          if (!bm) continue; // not all npcs have a buildmesh
          const ddx = sx - bm.x, ddz = sz - bm.z;
          if (ddx * ddx + ddz * ddz < (MIN_BLDG_GAP + BLD_SITE_RADIUS) ** 2) { tooClose = true; break; }
        }
        for (let bi = 0; bi < buildingAttractors.length; bi++) {
          const ba = buildingAttractors[bi];
          const ddx = sx - ba.x, ddz = sz - ba.z;
          if (ddx * ddx + ddz * ddz < (MIN_BLDG_GAP + ba.r) ** 2) { tooClose = true; break; }
        }
        if (!tooClose) return { x: sx, z: sz, y: sy, rot: siteRotation };
      }
      // Fallback: try further from home
      for (let a = 0; a < 10; a++) {
        const ang = Math.random() * Math.PI * 2;
        const d = 20 + Math.random() * 15;
        const sx = npc.homeX + Math.cos(ang) * d;
        const sz = npc.homeZ + Math.sin(ang) * d;
        const sy = getTerrainY(sx, sz);
        if (sy < 2.0 || sy > 14) continue;
        let tooClose = false;
        for (let other = 0; other < npcs.length; other++) {
          const bm = npcs[other].buildMesh;
          if (!bm) continue; // not all npcs have a buildmesh
          const ddx = sx - bm.x, ddz = sz - bm.z;
          if (ddx * ddx + ddz * ddz < (MIN_BLDG_GAP + BLD_SITE_RADIUS) ** 2) { tooClose = true; break; }
        }
        for (let bi = 0; bi < buildingAttractors.length; bi++) {
          const ba = buildingAttractors[bi];
          const ddx = sx - ba.x, ddz = sz - ba.z;
          if (ddx * ddx + ddz * ddz < (MIN_BLDG_GAP + ba.r) ** 2) { tooClose = true; break; }
        }
        if (!tooClose) return { x: sx, z: sz, y: sy, rot: siteRotation };
      }
      return null; // no valid site found
    }

    // Pick a waypoint biased toward higher terrain (gradient ascent).
    // Samples several candidate directions and favours the one that
    // climbs the most, with some randomness so NPCs meander naturally.
    function pickUphillWaypoint(fromX, fromZ, radius) {
      const SAMPLES = 6;
      const stepDist = 12 + Math.random() * 10; // how far each waypoint step is
      let bestX = fromX, bestZ = fromZ, bestScore = -Infinity;
      for (let s = 0; s < SAMPLES; s++) {
        const ang = Math.random() * Math.PI * 2;
        const d = stepDist * (0.6 + Math.random() * 0.4);
        const cx = fromX + Math.cos(ang) * d;
        const cz = fromZ + Math.sin(ang) * d;
        // Stay in world bounds
        const bound = WORLD_SIZE * 0.45;
        if (Math.abs(cx) > bound || Math.abs(cz) > bound) continue;
        const cy = getTerrainY(cx, cz);
        if (cy < 2.0) continue; // skip water
        // Score: height gain + small random jitter for meandering
        const score = cy + Math.random() * 3.0;
        if (score > bestScore) { bestScore = score; bestX = cx; bestZ = cz; }
      }
      return { x: bestX, z: bestZ };
    }

    // Find the building attractor nearest to a world position
    function findHomeBuildingIdx(hx, hz) {
      let best = -1, bestD2 = 100 * 100;
      for (let bi = 0; bi < buildingAttractors.length; bi++) {
        const ba = buildingAttractors[bi];
        const d2 = (ba.x - hx) ** 2 + (ba.z - hz) ** 2;
        if (d2 < bestD2) { bestD2 = d2; best = bi; }
      }
      return best;
    }

    function isNpcHomeContaminated(npc) {
      if (npc._homeBldgIdx === undefined) {
        npc._homeBldgIdx = findHomeBuildingIdx(npc.homeX, npc.homeZ);
      }
      const idx = npc._homeBldgIdx;
      return idx >= 0 && buildingAttractors[idx].contaminated;
    }

    function moveNPC(npc, tx, tz, dt) {
      const dx = tx - npc.x, dz = tz - npc.z;
      const dist = Math.sqrt(dx * dx + dz * dz);
      if (dist < 1.5) return 0;
      // Contaminated home debuff: NPCs move at 30% speed
      const contamSlow = isNpcHomeContaminated(npc) ? 0.3 : 1.0;
      const baseStep = Math.min(NPC_SPEED * contamSlow * dt, dist);
      const straightNx = dx / dist, straightNz = dz / dist;

      // ── Path-aware steering: sample candidate directions, pick best ──
      // Direct path is one candidate; also try offsets biased toward paths
      let bestNx = straightNx, bestNz = straightNz, bestScore = -1e9;
      const STEER_SAMPLES = 5;
      for (let s = 0; s < STEER_SAMPLES; s++) {
        let cnx, cnz;
        if (s === 0) {
          // First candidate: straight toward target
          cnx = straightNx; cnz = straightNz;
        } else {
          // Offset candidates: ±15°, ±35° from direct heading
          const offset = (s <= 2 ? 0.26 : 0.61) * (s % 2 === 1 ? 1 : -1);
          const ca = Math.atan2(straightNx, straightNz) + offset;
          cnx = Math.sin(ca); cnz = Math.cos(ca);
        }
        const probeX = npc.x + cnx * baseStep * 3;
        const probeZ = npc.z + cnz * baseStep * 3;
        const probeY = getTerrainY(probeX, probeZ);

        // Hard water penalty — never walk into water
        if (probeY < 1.9) { continue; }

        // Path preference: enormous bonus for established paths
        const pc = worldToCell(probeX, probeZ);
        const pathLevel = getTrampLevel(pc.ix, pc.iz);
        // level 0 = 0, level 1 = 3, level 2 = 8, level 3 = 20
        const pathBonus = pathLevel === 3 ? 20 : pathLevel === 2 ? 8 : pathLevel === 1 ? 3 : 0;

        // Closeness to target (normalized 0-1)
        const tdx = tx - probeX, tdz = tz - probeZ;
        const newDist = Math.sqrt(tdx * tdx + tdz * tdz);
        const progress = (dist - newDist) / (baseStep * 3 + 0.01);

        const score = progress * 5.0 + pathBonus;
        if (score > bestScore) { bestScore = score; bestNx = cnx; bestNz = cnz; }
      }

      // Check immediate next position for water — absolute block
      const nextX = npc.x + bestNx * baseStep;
      const nextZ = npc.z + bestNz * baseStep;
      if (getTerrainY(nextX, nextZ) < 1.9) {
        // Can't move at all — stuck near water. Try turning 90° away
        const emergX = npc.x - bestNz * baseStep;
        const emergZ = npc.z + bestNx * baseStep;
        if (getTerrainY(emergX, emergZ) >= 1.9) {
          npc.x = emergX; npc.z = emergZ;
        } else {
          return dist; // truly stuck, don't move
        }
      } else {
        const speedMult = getPathSpeedAt(npc.x, npc.z);
        const step = Math.min(NPC_SPEED * contamSlow * speedMult * dt, dist);
        npc.x += bestNx * step; npc.z += bestNz * step;
      }

      // Trample the ground — throttle to ~every 2 world units walked
      npc._trampAccum = (npc._trampAccum || 0) + baseStep;
      if (npc._trampAccum > 2.0) {
        npc._trampAccum = 0;
        trampleAt(npc.x, npc.z);
      }
      npc.mesh.position.x = npc.x;
      npc.mesh.position.z = npc.z;
      npc.mesh.position.y = getTerrainY(npc.x, npc.z);
      npc.mesh.rotation.y = Math.atan2(bestNx, bestNz);
      npc.walkPhase += dt * 8;
      npc.mesh.userData.legL.rotation.x = Math.sin(npc.walkPhase) * 0.45;
      npc.mesh.userData.legR.rotation.x = Math.sin(npc.walkPhase + Math.PI) * 0.45;
      return dist;
    }

    const _bldCol = new THREE.Color();
    function updateNPCs(dt) {
      // Freeze when time is paused
      if (!autoCycle) return;

      // Dusk check — send active NPCs home (dusk ≈ timeOfDay 0.70–0.80)
      const isDusk = timeOfDay >= 0.70 && timeOfDay <= 0.80;

      for (let i = 0; i < npcs.length; i++) {
        const npc = npcs[i];
        npc.mesh.userData.woodBundle.visible = npc.carrying;

        // At dusk, interrupt active NPCs and send them home
        if (isDusk && npc.state !== NPC_IDLE && npc.state !== NPC_GOING_HOME && npc.state !== NPC_BUILD && npc.state !== NPC_FARM_BUILD) {
          // npc.carrying = false; // do not drop resources at dusk — let them bring it home
          npc.mesh.children[0].rotation.x = 0;
          npc.mesh.children[0].rotation.z = 0;
          npc.state = NPC_GOING_HOME;
        }

        switch (npc.state) {
          case NPC_GOING_HOME: {
            if (moveNPC(npc, npc.homeX, npc.homeZ, dt) === 0) {
              npc.state = NPC_IDLE;
              npc.timer = 5 + Math.random() * 15;
              // Hide NPC inside the house
              npc.mesh.visible = false;
            }
            break;
          }

          case NPC_WANDER: {
            if (moveNPC(npc, npc.targetX, npc.targetZ, dt) === 0) {
              npc.state = NPC_IDLE;
              npc.timer = 2 + Math.random() * 6;
            }
            break;
          }

          case NPC_IDLE: {
            npc.mesh.userData.legL.rotation.x = 0;
            npc.mesh.userData.legR.rotation.x = 0;
            npc.timer -= dt;
            if (npc.timer > 0) break;
            if (!npc.wakeTime) npc.wakeTime = 0.23 + Math.random() * 0.08;
            if (timeOfDay < npc.wakeTime || timeOfDay > 0.65) {
              // Nighttime — stay hidden inside home
              npc.mesh.visible = false;
              npc.timer = 3; break;
            }
            // Wake up — show NPC, snap to home position
            if (!npc.mesh.visible) {
              npc.mesh.visible = true;
              npc.x = npc.homeX; npc.z = npc.homeZ;
              npc.mesh.position.set(npc.homeX, getTerrainY(npc.homeX, npc.homeZ), npc.homeZ);
            }

            // Contaminated home — NPC won't work, just lingers near home
            if (isNpcHomeContaminated(npc)) {
              const _contamHome2 = true;
              let wx2, wz2, wy2;
              for (let tries = 0; tries < 8; tries++) {
                const ang = Math.random() * Math.PI * 2;
                const wd = 2 + Math.random() * 4;
                wx2 = npc.homeX + Math.cos(ang) * wd;
                wz2 = npc.homeZ + Math.sin(ang) * wd;
                wy2 = getTerrainY(wx2, wz2);
                if (wy2 >= 2.0) break;
              }
              if (wy2 >= 2.0) {
                npc.targetX = wx2; npc.targetZ = wz2;
                npc.state = NPC_WANDER;
              } else {
                npc.timer = 3 + Math.random() * 5;
              }
              break;
            }

            if (!npc.isBuilder) {
              // ── Farmer: build a farm then tend it ──
              if (npc.isFarmer) {
                // Already has a farm — tend it
                if (npc.farmIdx >= 0) {
                  const farm = farms[npc.farmIdx];
                  if (farm) {
                    npc.targetX = farm.x;
                    npc.targetZ = farm.z;
                    npc.state = NPC_FARM_TEND;
                  } else {
                    npc.farmIdx = -1;
                    npc.timer = 5;
                  }
                  break;
                }
                // Resume farm construction — still gathering wood
                if (npc.farmMesh) {
                  if (npc.farmWoodTrips < FARM_WOOD_NEEDED) {
                    // Find a tree to chop
                    let ti = -1;
                    if (npc.lastTreeIdx >= 0 && windTrees[npc.lastTreeIdx]
                        && !windTrees[npc.lastTreeIdx].chopped && !claimedTrees.has(npc.lastTreeIdx)) {
                      ti = npc.lastTreeIdx;
                    }
                    if (ti < 0) ti = findNearestTree(npc.x, npc.z, 80);
                    if (ti < 0) { npc.timer = 15; break; }
                    claimedTrees.add(ti);
                    npc.treeIdx = ti;
                    npc.targetX = treePositions[ti].x;
                    npc.targetZ = treePositions[ti].z;
                    npc.state = NPC_FARM_WALK_TREE;
                  } else {
                    // Enough wood — start building
                    npc.state = NPC_FARM_BUILD;
                    npc.timer = FARM_BUILD_TIME;
                  }
                  break;
                }
                // Start a new farm project
                const site = pickFarmSite(npc);
                if (site) {
                  npc.siteX = site.x; npc.siteZ = site.z;
                  npc.farmWoodTrips = 0;
                  // Create placeholder
                  const pm = new THREE.Mesh(
                    new THREE.BoxGeometry(8, 0.3, 6),
                    new THREE.MeshStandardMaterial({ color: 0x5a4020, flatShading: true, transparent: true, opacity: 0.5 })
                  );
                  pm.position.set(site.x, site.y + 0.15, site.z);
                  pm.rotation.y = Math.random() * Math.PI * 2;
                  scene.add(pm);
                  npc.farmMesh = pm;
                  // Go get wood
                  let ti = findNearestTree(npc.x, npc.z, 80);
                  if (ti < 0) { npc.timer = 15; break; }
                  claimedTrees.add(ti);
                  npc.treeIdx = ti;
                  npc.targetX = treePositions[ti].x;
                  npc.targetZ = treePositions[ti].z;
                  npc.state = NPC_FARM_WALK_TREE;
                } else {
                  npc.timer = 20; // no site — wait
                }
                break;
              }
              // ── Wanderer: stroll to a random point near home (avoid water) ──
              // If home is contaminated, stay very close to it
              const _contamHome = isNpcHomeContaminated(npc);
              let wx, wz, wy;
              for (let tries = 0; tries < 8; tries++) {
                const ang = Math.random() * Math.PI * 2;
                const wd = _contamHome ? (2 + Math.random() * 4) : (8 + Math.random() * 20);
                wx = npc.homeX + Math.cos(ang) * wd;
                wz = npc.homeZ + Math.sin(ang) * wd;
                wy = getTerrainY(wx, wz);
                if (wy >= 2.0) break;
              }
              if (wy < 2.0) { npc.timer = 5; break; } // all candidates in water — wait
              npc.targetX = wx;
              npc.targetZ = wz;
              npc.state = NPC_WANDER;
              break;
            }

            // ── Builder ──
            // Resume existing project if one is in progress
            if (npc.buildMesh) {
              if (npc.rocksCarried < ROCK_TRIPS) {
                // Try remembered rock first (morning return)
                if (npc.lastRockIdx >= 0 && !depletedRocks.has(npc.lastRockIdx)) {
                  npc.rockIdx = npc.lastRockIdx;
                  npc.targetX = rockPositions[npc.lastRockIdx].x;
                  npc.targetZ = rockPositions[npc.lastRockIdx].z;
                  npc.state = NPC_WALK_ROCK;
                } else {
                  // Seek new rocks — gradient ascent with expanding radius
                  npc.seekRadius = 25;
                  npc.seekAttempts = 0;
                  const wp = pickUphillWaypoint(npc.x, npc.z, npc.seekRadius);
                  npc.targetX = wp.x; npc.targetZ = wp.z;
                  npc.state = NPC_SEEK_ROCK;
                }
              } else {
                // Resume wood gathering — try remembered tree first
                if (npc.treeIdx < 0 || (windTrees[npc.treeIdx] && windTrees[npc.treeIdx].chopped)) {
                  let ti = -1;
                  if (npc.lastTreeIdx >= 0 && windTrees[npc.lastTreeIdx]
                      && !windTrees[npc.lastTreeIdx].chopped && !claimedTrees.has(npc.lastTreeIdx)) {
                    ti = npc.lastTreeIdx;
                  }
                  if (ti < 0) ti = findNearestTree(npc.siteX, npc.siteZ, 80);
                  if (ti < 0) { npc.timer = 30; break; }
                  claimedTrees.add(ti);
                  npc.treeIdx = ti;
                  npc.woodTrips = 0;
                }
                npc.targetX = treePositions[npc.treeIdx].x;
                npc.targetZ = treePositions[npc.treeIdx].z;
                npc.state = NPC_WALK_TREE;
              }
              break;
            }
            // Start a new building project
            const site = pickBuildSite(npc);
            if (!site) { npc.state = NPC_IDLE; npc.timer = 10; break; }
            npc.siteX = site.x; npc.siteZ = site.z;
            npc.rocksCarried = 0;
            npc.woodTrips = 0;
            const bm = new THREE.Mesh(
              new THREE.BoxGeometry(5, 5, 5),
              new THREE.MeshStandardMaterial({ color: 0x7a7a7a, flatShading: true, roughness: 0.9 })
            );
            bm.scale.y = 0.03;
            bm.position.set(site.x, site.y + 0.08, site.z);
            bm.rotation.y = site.rot;
            bm.castShadow = true;
            scene.add(bm);
            npc.buildMesh = bm;
            // Start seeking rocks — prefer remembered rock
            if (npc.lastRockIdx >= 0 && !depletedRocks.has(npc.lastRockIdx)) {
              npc.rockIdx = npc.lastRockIdx;
              npc.targetX = rockPositions[npc.lastRockIdx].x;
              npc.targetZ = rockPositions[npc.lastRockIdx].z;
              npc.state = NPC_WALK_ROCK;
            } else {
              npc.seekRadius = 25;
              npc.seekAttempts = 0;
              const wp = pickUphillWaypoint(npc.x, npc.z, npc.seekRadius);
              npc.targetX = wp.x; npc.targetZ = wp.z;
              npc.state = NPC_SEEK_ROCK;
            }
            break;
          }

          case NPC_WALK_ROCK: {
            if (moveNPC(npc, npc.targetX, npc.targetZ, dt) === 0) {
              npc.state = NPC_GATHER_ROCK;
              npc.timer = NPC_GATHER_TIME;
            }
            break;
          }

          case NPC_GATHER_ROCK: {
            npc.timer -= dt;
            npc.mesh.children[0].rotation.x = 0.3;
            if (npc.timer <= 0) {
              npc.mesh.children[0].rotation.x = 0;
              // Decrement rock durability instead of instant depletion
              if (npc.rockIdx >= 0) {
                rockDurability[npc.rockIdx]--;
                npc.lastRockIdx = npc.rockIdx; // remember this rock
                if (rockDurability[npc.rockIdx] <= 0) {
                  depletedRocks.add(npc.rockIdx);
                  if (rockMeshes[npc.rockIdx]) rockMeshes[npc.rockIdx].visible = false;
                } else {
                  // Visually shrink the rock proportionally
                  const origScale = rockScales[npc.rockIdx];
                  const frac = rockDurability[npc.rockIdx] / Math.max(2, Math.round(2 + (origScale - 0.3) / 3.0 * 8));
                  const s = Math.max(0.15, frac);
                  rockMeshes[npc.rockIdx].scale.set(s, s, s);
                }
              }
              npc.carrying = true;
              npc.targetX = npc.siteX; npc.targetZ = npc.siteZ;
              npc.state = NPC_WALK_SITE;
            }
            break;
          }

          case NPC_SEEK_ROCK: {
            // Walk toward current waypoint, scanning for rocks en route
            const seekDist = moveNPC(npc, npc.targetX, npc.targetZ, dt);
            // Check for rocks within expanding search radius
            const ri = findNearestRock(npc.x, npc.z, npc.seekRadius);
            if (ri >= 0) {
              // Found one — go get it
              npc.rockIdx = ri;
              npc.targetX = rockPositions[ri].x;
              npc.targetZ = rockPositions[ri].z;
              npc.state = NPC_WALK_ROCK;
              break;
            }
            if (seekDist === 0) {
              // Reached waypoint without finding a rock — expand and try again
              npc.seekAttempts++;
              npc.seekRadius = Math.min(npc.seekRadius + 10, 200);
              if (npc.seekAttempts > 8) {
                // Give up for now — go home and rest
                npc.state = NPC_GOING_HOME;
                break;
              }
              // Pick next uphill waypoint from current position
              const wp = pickUphillWaypoint(npc.x, npc.z, npc.seekRadius);
              npc.targetX = wp.x;
              npc.targetZ = wp.z;
            }
            break;
          }

          case NPC_WALK_TREE: {
            if (moveNPC(npc, npc.targetX, npc.targetZ, dt) === 0) {
              npc.state = NPC_CHOP;
              npc.timer = NPC_CHOP_TIME;
            }
            break;
          }

          case NPC_CHOP: {
            npc.timer -= dt;
            const chopProg = 1 - npc.timer / NPC_CHOP_TIME;
            const treeMaxTrips = getTreeMaxTrips(npc.treeIdx);
            // Rhythmic chop animation
            npc.mesh.children[0].rotation.z = Math.sin(npc.timer * 8) * 0.2 * (1 - chopProg);
            // Progressive tree shrink: each visit removes 1/treeMaxTrips of the tree
            if (npc.treeIdx >= 0 && windTrees[npc.treeIdx] && !windTrees[npc.treeIdx].chopped) {
              const tg = windTrees[npc.treeIdx].group;
              const baseScale = 1.0 - npc.woodTrips / treeMaxTrips;
              const visitShrink = chopProg / treeMaxTrips;
              const s = Math.max(0.01, baseScale - visitShrink);
              tg.scale.set(s, s, s);
              // Lean only on final trip when nearly done
              const isFinalTrip = npc.woodTrips >= treeMaxTrips - 1;
              if (isFinalTrip && chopProg > 0.7) {
                tg.rotation.z = (chopProg - 0.7) * 4.0;
              }
            }
            if (npc.timer <= 0) {
              npc.woodTrips++;
              npc.mesh.children[0].rotation.z = 0;
              npc.lastTreeIdx = npc.treeIdx; // remember this tree
              // Check if tree is fully felled (all trips used)
              if (npc.woodTrips >= treeMaxTrips) {
                if (npc.treeIdx >= 0 && windTrees[npc.treeIdx]) {
                  windTrees[npc.treeIdx].group.visible = false;
                  windTrees[npc.treeIdx].chopped = true;
                }
              }
              npc.carrying = true;
              npc.targetX = npc.siteX; npc.targetZ = npc.siteZ;
              npc.state = NPC_WALK_SITE;
            }
            break;
          }

          case NPC_WALK_SITE: {
            if (moveNPC(npc, npc.targetX, npc.targetZ, dt) === 0) {
              npc.carrying = false;
              if (npc.rocksCarried < ROCK_TRIPS) {
                // ── Depositing rock ──
                npc.rocksCarried++;
                if (npc.buildMesh) {
                  // Foundation grows during rock phase (scale.y 0.03 → 0.25)
                  npc.buildMesh.scale.y = 0.03 + (npc.rocksCarried / ROCK_TRIPS) * 0.22;
                  const sy = getTerrainY(npc.siteX, npc.siteZ);
                  npc.buildMesh.position.y = sy + (5 * npc.buildMesh.scale.y) * 0.5;
                }
                if (npc.rocksCarried >= ROCK_TRIPS) {
                  // Foundation done — switch to wood phase
                  if (npc.buildMesh) npc.buildMesh.material.color.setHex(0x8B7355);
                  // Prefer remembered tree, fall back to nearest
                  let ti = -1;
                  if (npc.lastTreeIdx >= 0 && windTrees[npc.lastTreeIdx]
                      && !windTrees[npc.lastTreeIdx].chopped && !claimedTrees.has(npc.lastTreeIdx)) {
                    ti = npc.lastTreeIdx;
                  }
                  if (ti < 0) ti = findNearestTree(npc.siteX, npc.siteZ, 80);
                  if (ti < 0) { npc.state = NPC_IDLE; npc.timer = 40; break; }
                  claimedTrees.add(ti);
                  npc.treeIdx = ti;
                  npc.woodTrips = 0;
                  npc.targetX = treePositions[ti].x;
                  npc.targetZ = treePositions[ti].z;
                  npc.state = NPC_WALK_TREE;
                } else {
                  // Get another rock — prefer remembered rock if still available
                  if (npc.lastRockIdx >= 0 && !depletedRocks.has(npc.lastRockIdx)) {
                    npc.rockIdx = npc.lastRockIdx;
                    npc.targetX = rockPositions[npc.lastRockIdx].x;
                    npc.targetZ = rockPositions[npc.lastRockIdx].z;
                    npc.state = NPC_WALK_ROCK;
                  } else {
                    // Seek a new rock
                    npc.seekRadius = 25;
                    npc.seekAttempts = 0;
                    const wp = pickUphillWaypoint(npc.x, npc.z, npc.seekRadius);
                    npc.targetX = wp.x; npc.targetZ = wp.z;
                    npc.state = NPC_SEEK_ROCK;
                  }
                }
              } else {
                // ── Depositing wood ──
                const treeMaxTrips = getTreeMaxTrips(npc.treeIdx);
                if (npc.buildMesh) {
                  // Walls grow during wood phase (scale.y 0.25 → 0.70)
                  const woodFrac = npc.woodTrips / WOOD_TRIPS;
                  npc.buildMesh.scale.y = 0.25 + woodFrac * 0.45;
                  const sy = getTerrainY(npc.siteX, npc.siteZ);
                  npc.buildMesh.position.y = sy + (5 * npc.buildMesh.scale.y) * 0.5;
                }
                if (npc.woodTrips >= WOOD_TRIPS) {
                  // All wood gathered — start building
                  npc.state = NPC_BUILD;
                  npc.timer = NPC_BUILD_TIME;
                } else if (npc.woodTrips >= treeMaxTrips || (windTrees[npc.treeIdx] && windTrees[npc.treeIdx].chopped)) {
                  // Current tree exhausted — find a new one
                  // Prefer remembered tree if available
                  let ti = -1;
                  if (npc.lastTreeIdx >= 0 && npc.lastTreeIdx !== npc.treeIdx
                      && windTrees[npc.lastTreeIdx] && !windTrees[npc.lastTreeIdx].chopped
                      && !claimedTrees.has(npc.lastTreeIdx)) {
                    ti = npc.lastTreeIdx;
                  }
                  if (ti < 0) ti = findNearestTree(npc.siteX, npc.siteZ, 80);
                  if (ti < 0) { npc.state = NPC_IDLE; npc.timer = 40; break; }
                  claimedTrees.add(ti);
                  npc.treeIdx = ti;
                  npc.woodTrips = 0; // reset for new tree
                  npc.targetX = treePositions[ti].x;
                  npc.targetZ = treePositions[ti].z;
                  npc.state = NPC_WALK_TREE;
                } else {
                  // Go back to same tree for another trip
                  npc.targetX = treePositions[npc.treeIdx].x;
                  npc.targetZ = treePositions[npc.treeIdx].z;
                  npc.state = NPC_WALK_TREE;
                }
              }
            }
            break;
          }

          case NPC_BUILD: {
            npc.timer -= dt;
            // NPC circles the construction
            const ba = (NPC_BUILD_TIME - npc.timer) * 1.2;
            npc.x = npc.siteX + Math.cos(ba) * 4;
            npc.z = npc.siteZ + Math.sin(ba) * 4;
            npc.mesh.position.x = npc.x;
            npc.mesh.position.z = npc.z;
            npc.mesh.position.y = getTerrainY(npc.x, npc.z);
            npc.mesh.rotation.y = ba + Math.PI;
            npc.walkPhase += dt * 6;
            npc.mesh.userData.legL.rotation.x = Math.sin(npc.walkPhase) * 0.3;
            npc.mesh.userData.legR.rotation.x = Math.sin(npc.walkPhase + Math.PI) * 0.3;
            // Construction grows to full height
            if (npc.buildMesh) {
              const bp = 1 - npc.timer / NPC_BUILD_TIME;
              npc.buildMesh.scale.y = 0.70 + bp * 0.30;
              const sy = getTerrainY(npc.siteX, npc.siteZ);
              npc.buildMesh.position.y = sy + (5 * npc.buildMesh.scale.y) * 0.5;
              _bldCol.set(npc.palette.building);
              npc.buildMesh.material.color.lerp(_bldCol, dt * 0.5);
            }
            if (npc.timer <= 0) {
              // Remove placeholder
              if (npc.buildMesh) {
                scene.remove(npc.buildMesh);
                npc.buildMesh.geometry.dispose();
                npc.buildMesh.material.dispose();
                npc.buildMesh = null;
              }
              // Create real building
              const ss = 0.8 + Math.random() * 0.4;
              const nb = createBuilding(npc.palette, ss);
              const bgy = getTerrainY(npc.siteX, npc.siteZ);
              nb.position.set(npc.siteX, bgy, npc.siteZ);
              nb.rotation.y = Math.random() * Math.PI * 2;
              scene.add(nb);
              // Register wind faces for new building
              const { w: bw, h: bh, d: bd } = nb.userData.dims;
              const rot = nb.rotation.y, cR = Math.cos(rot), sR = Math.sin(rot);
              windFaces.push(
                { cx: npc.siteX+(bw/2)*cR, cz: npc.siteZ+(bw/2)*sR, nx:cR, nz:sR, halfExtent:bd/2, height:bh, groundY:bgy },
                { cx: npc.siteX-(bw/2)*cR, cz: npc.siteZ-(bw/2)*sR, nx:-cR, nz:-sR, halfExtent:bd/2, height:bh, groundY:bgy },
                { cx: npc.siteX-(bd/2)*sR, cz: npc.siteZ+(bd/2)*cR, nx:-sR, nz:cR, halfExtent:bw/2, height:bh, groundY:bgy },
                { cx: npc.siteX+(bd/2)*sR, cz: npc.siteZ-(bd/2)*cR, nx:sR, nz:-cR, halfExtent:bw/2, height:bh, groundY:bgy }
              );
              // Register smoke attractor
              const winY = bgy + bh * 0.45;
              const nwl = [
                // +Z face — local (0,0,1) → world (sR, 0, cR)
                { x: npc.siteX + (bd/2+0.8)*sR, z: npc.siteZ + (bd/2+0.8)*cR, y: winY,
                  nx: sR, ny: -0.3, nz: cR },
                // +X face — local (1,0,0) → world (cR, 0, -sR)
                { x: npc.siteX + (bw/2+0.8)*cR, z: npc.siteZ - (bw/2+0.8)*sR, y: winY,
                  nx: cR, ny: -0.3, nz: -sR },
                // -X face — local (-1,0,0) → world (-cR, 0, sR)
                { x: npc.siteX - (bw/2+0.8)*cR, z: npc.siteZ + (bw/2+0.8)*sR, y: winY,
                  nx: -cR, ny: -0.3, nz: sR },
              ];
              buildingAttractors.push({
                x: npc.siteX, y: bgy + bh * 0.5, z: npc.siteZ,
                r: Math.max(bw, bd) * 0.6,
                windowMats: nb.userData.windowMats || [],
                windowLights: nwl,
                glowIntensity: 0, glowColor: new THREE.Color(0, 0, 0),
                charge: 0, chargeMax: 1.0,
                roofY: bgy + bh + bh * 0.5 * 0.4,
                settlementX: npc.siteX, settlementZ: npc.siteZ,
                contaminated: false, vineGroup: null,
                dims: { w: bw, h: bh, d: bd },
                groundY: bgy, rotation: nb.rotation.y,
              });
              // Spawn new NPC at the new home
              spawnNPC(npc.siteX, npc.siteZ, npc.palette, npc.kingdomIdx);
              // Original NPC goes home
              npc.x = npc.homeX; npc.z = npc.homeZ;
              npc.mesh.position.set(npc.homeX, getTerrainY(npc.homeX, npc.homeZ), npc.homeZ);
              npc.state = NPC_IDLE;
              npc.timer = 10 + Math.random() * 20;
            }
            break;
          }

          // ── Farmer states ──
          case NPC_FARM_WALK_TREE: {
            if (moveNPC(npc, npc.targetX, npc.targetZ, dt) === 0) {
              npc.state = NPC_FARM_CHOP;
              npc.timer = NPC_CHOP_TIME;
              npc.lastTreeIdx = npc.treeIdx;
            }
            break;
          }

          case NPC_FARM_CHOP: {
            npc.timer -= dt;
            npc.mesh.children[0].rotation.x = Math.sin(performance.now() * 0.01) * 0.3;
            if (npc.timer <= 0) {
              npc.mesh.children[0].rotation.x = 0;
              npc.carrying = true;
              npc.farmWoodTrips++;
              claimedTrees.delete(npc.treeIdx);
              // Walk wood back to farm site
              npc.targetX = npc.siteX;
              npc.targetZ = npc.siteZ;
              npc.state = NPC_FARM_WALK_SITE;
            }
            break;
          }

          case NPC_FARM_WALK_SITE: {
            if (moveNPC(npc, npc.targetX, npc.targetZ, dt) === 0) {
              npc.carrying = false;
              // Update placeholder opacity to show progress
              if (npc.farmMesh) {
                npc.farmMesh.material.opacity = 0.5 + (npc.farmWoodTrips / FARM_WOOD_NEEDED) * 0.5;
              }
              if (npc.farmWoodTrips >= FARM_WOOD_NEEDED) {
                npc.state = NPC_FARM_BUILD;
                npc.timer = FARM_BUILD_TIME;
              } else {
                npc.state = NPC_IDLE;
                npc.timer = 2 + Math.random() * 3;
              }
            }
            break;
          }

          case NPC_FARM_BUILD: {
            npc.timer -= dt;
            // Circle the farm during construction
            const fa = (FARM_BUILD_TIME - npc.timer) * 1.0;
            npc.x = npc.siteX + Math.cos(fa) * 5;
            npc.z = npc.siteZ + Math.sin(fa) * 5;
            npc.mesh.position.x = npc.x;
            npc.mesh.position.z = npc.z;
            npc.mesh.position.y = getTerrainY(npc.x, npc.z);
            npc.mesh.rotation.y = fa + Math.PI;
            npc.walkPhase += dt * 6;
            npc.mesh.userData.legL.rotation.x = Math.sin(npc.walkPhase) * 0.3;
            npc.mesh.userData.legR.rotation.x = Math.sin(npc.walkPhase + Math.PI) * 0.3;
            if (npc.timer <= 0) {
              // Remove placeholder
              if (npc.farmMesh) {
                scene.remove(npc.farmMesh);
                npc.farmMesh.geometry.dispose();
                npc.farmMesh.material.dispose();
                npc.farmMesh = null;
              }
              // Create real farm
              const farmMesh = createFarmMesh(npc.siteX, npc.siteZ);
              scene.add(farmMesh);
              const farmIdx = farms.length;
              farms.push({
                mesh: farmMesh,
                x: npc.siteX, z: npc.siteZ,
                tenderIdx: npcs.indexOf(npc),
                growthStage: 0,
                destroyed: false,
              });
              npc.farmIdx = farmIdx;
              npc.state = NPC_FARM_TEND;
              npc.targetX = npc.siteX;
              npc.targetZ = npc.siteZ;
            }
            break;
          }

          case NPC_FARM_TEND: {
            const farm = npc.farmIdx >= 0 ? farms[npc.farmIdx] : null;
            if (!farm || farm.destroyed) {
              npc.farmIdx = -1;
              npc.state = NPC_IDLE;
              npc.timer = 10;
              break;
            }
            // Walk to farm if not there (ignore path speed boost)
            const dxF = farm.x - npc.x, dzF = farm.z - npc.z;
            const distToFarm = Math.sqrt(dxF * dxF + dzF * dzF);
            if (distToFarm > 3.0) {
              // Walk toward farm at slow fixed speed (no path boost)
              const walkSpd = 3.5;
              const step = Math.min(walkSpd * dt, distToFarm);
              npc.x += (dxF / distToFarm) * step;
              npc.z += (dzF / distToFarm) * step;
              npc.mesh.position.x = npc.x;
              npc.mesh.position.z = npc.z;
              npc.mesh.position.y = getTerrainY(npc.x, npc.z);
              npc.mesh.rotation.y = Math.atan2(dxF, dzF);
              npc.walkPhase += dt * 4;
              npc.mesh.userData.legL.rotation.x = Math.sin(npc.walkPhase) * 0.25;
              npc.mesh.userData.legR.rotation.x = Math.sin(npc.walkPhase + Math.PI) * 0.25;
            } else {
              // Slowly amble around the farm
              npc.timer -= dt;
              npc.walkPhase += dt * 0.3; // very slow rotation
              const tendAng = npc.walkPhase;
              npc.x = farm.x + Math.cos(tendAng) * 3;
              npc.z = farm.z + Math.sin(tendAng) * 3;
              npc.mesh.position.x = npc.x;
              npc.mesh.position.z = npc.z;
              npc.mesh.position.y = getTerrainY(npc.x, npc.z);
              npc.mesh.rotation.y = tendAng + Math.PI * 0.5;
              // Gentle leg movement
              npc.mesh.userData.legL.rotation.x = Math.sin(tendAng * 3) * 0.15;
              npc.mesh.userData.legR.rotation.x = Math.sin(tendAng * 3 + Math.PI) * 0.15;
              // Grow crops over time
              if (farm.growthStage < 3 && npc.timer <= 0) {
                farm.growthStage++;
                npc.timer = FARM_TEND_INTERVAL;
                const crops = farm.mesh.userData.cropGroup;
                crops.visible = true;
                // Scale crops with growth
                const s = farm.growthStage / 3;
                crops.children.forEach(c => {
                  c.scale.setScalar(s);
                  c.material.color.setHex(
                    farm.growthStage === 1 ? 0x55993a :
                    farm.growthStage === 2 ? 0x66aa40 : 0x88cc44
                  );
                });
              }
            }
            break;
          }
        }
      }
    }

    // ─────────────────────────────────────────
    //  SQUIRREL MOB SYSTEM
    // ─────────────────────────────────────────
    const squirrels = [];
    const SQ_IDLE = 0, SQ_RUN_TREE = 1, SQ_GATHER = 2,
          SQ_PLANT_WALK = 3, SQ_PLANTING = 4, SQ_GO_HOME = 5,
          SQ_SLEEPING = 6, SQ_ATTACK = 7, SQ_FLEE = 8, SQ_NURSING = 9,
          SQ_CLIMB_UP = 10, SQ_CLIMB_DOWN = 11;

    const SQ_MAX          = 60;    // max squirrels in the world
    const SQ_SPEED        = 12;    // faster than NPCs
    const SQ_FLEE_SPEED   = 18;
    const SQ_GATHER_TIME  = 3.0;
    const SQ_PLANT_TIME   = 5.0;
    const SQ_PLANT_CHANCE = 0.3;  // only 30% chance a gathered nut gets planted
    const SQ_ATTACK_TIME  = 8.0;   // time to destroy a building
    const SQ_TREE_SEARCH  = 80;    // max search radius for trees
    const SQ_BUILD_AVOID  = 25;    // min distance from buildings when planting
    const SQ_TREE_MIN_DIST = 8;    // min distance between planted trees
    const SQ_REPRO_MOONS  = 2;     // full moons between reproductions
    const SQ_NURSE_PHASES = 8;     // moon phases of nursing (= 1 full cycle)

    // Configurable death behavior when no tree found at night
    // 'die' = squirrel dies, 'eaten' = squirrel gets eaten (same effect, different flavor)
    let SQ_NIGHT_FATE = 'die';

    // Building HP tracking (index into buildingAttractors → remaining HP)
    const buildingHP = new Map();
    const SQ_BUILDING_MAX_HP = 100;

    function createSquirrelMesh() {
      const g = new THREE.Group();
      const furColor = 0x8B6914 + ((Math.random() * 0x202020) | 0);

      // Body
      const body = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.35, 0.7, 2, 4),
        new THREE.MeshStandardMaterial({ color: furColor, flatShading: true })
      );
      body.position.y = 0.6;
      body.rotation.x = Math.PI * 0.15;
      body.castShadow = true;
      g.add(body);

      // Head
      const head = new THREE.Mesh(
        new THREE.IcosahedronGeometry(0.28, 0),
        new THREE.MeshStandardMaterial({ color: furColor, flatShading: true })
      );
      head.position.set(0, 0.85, -0.45);
      g.add(head);

      // Tail: upward curving cone
      const tail = new THREE.Mesh(
        new THREE.ConeGeometry(0.18, 0.8, 3),
        new THREE.MeshStandardMaterial({ color: furColor, flatShading: true })
      );
      tail.position.set(0, 0.95, 0.55);
      tail.rotation.x = -0.6;
      g.add(tail);

      // Legs: 4 cylinders
      const legMat = new THREE.MeshStandardMaterial({ color: 0x6a4a10, flatShading: true });
      const legGeo = new THREE.CylinderGeometry(0.08, 0.09, 0.35, 3);
      const fl = new THREE.Mesh(legGeo, legMat);
      const fr = new THREE.Mesh(legGeo, legMat);
      const bl = new THREE.Mesh(legGeo, legMat);
      const br = new THREE.Mesh(legGeo, legMat);
      fl.position.set(-0.18, 0.18, -0.28);
      fr.position.set(0.18, 0.18, -0.28);
      bl.position.set(-0.18, 0.18, 0.28);
      br.position.set(0.18, 0.18, 0.28);
      g.add(fl, fr, bl, br);
      g.userData.legFL = fl; g.userData.legFR = fr;
      g.userData.legBL = bl; g.userData.legBR = br;

      // Nut (hidden until carrying)
      const nut = new THREE.Mesh(
        new THREE.IcosahedronGeometry(0.14, 0),
        new THREE.MeshStandardMaterial({ color: 0x5a3a10, flatShading: true })
      );
      nut.position.set(0, 0.7, -0.6);
      nut.visible = false;
      g.add(nut);
      g.userData.nut = nut;

      return g;
    }

    function spawnSquirrel(x, z) {
      if (squirrels.length >= SQ_MAX) return;
      const mesh = createSquirrelMesh();
      mesh.position.set(x, getTerrainY(x, z), z);
      scene.add(mesh);
      squirrels.push({
        mesh,
        x, z,
        homeTreeIdx: -1,
        targetTreeIdx: -1,
        state: SQ_IDLE,
        timer: 1 + Math.random() * 3,
        targetX: 0, targetZ: 0,
        hasNut: false,
        walkPhase: Math.random() * Math.PI * 2,
        alive: true,
        // Reproduction
        fullMoonsSeen: 0,
        lastMoonPhase: moonPhaseIndex,
        nursingPhasesLeft: 0,
        // Attack
        attackTargetIdx: -1,
        attackingFarm: false,
        attackProgress: 0,
        // Flee
        fleeAngle: 0,
        fleeChangeTimer: 0,
        // Climbing
        inCanopy: false,
        climbProgress: 0,   // 0 = ground, 1 = canopy top
        nextState: SQ_IDLE, // state to enter after climbing finishes
      });
    }

    function findSquirrelTree(fromX, fromZ, maxDist, excludeIdx) {
      let best = -1, bestD2 = maxDist * maxDist;
      for (let i = 0; i < treePositions.length; i++) {
        if (i === excludeIdx) continue;
        if (windTrees[i] && windTrees[i].chopped) continue;
        if (windTrees[i] && windTrees[i].group.scale.x < 0.5) continue;
        const t = treePositions[i];
        const d2 = (t.x - fromX) ** 2 + (t.z - fromZ) ** 2;
        if (d2 < bestD2) { bestD2 = d2; best = i; }
      }
      return best;
    }

    function findPlantSpot(fromX, fromZ) {
      // Try random spots, pick one far from buildings and other trees
      for (let attempt = 0; attempt < 12; attempt++) {
        const ang = Math.random() * Math.PI * 2;
        const dist = 10 + Math.random() * 25;
        const px = fromX + Math.cos(ang) * dist;
        const pz = fromZ + Math.sin(ang) * dist;
        const bound = WORLD_SIZE * 0.42;
        if (Math.abs(px) > bound || Math.abs(pz) > bound) continue;
        const py = getTerrainY(px, pz);
        if (py < 2.5) continue; // not in water

        // Check distance from buildings
        let tooClose = false;
        for (const b of buildingAttractors) {
          if ((b.x - px) ** 2 + (b.z - pz) ** 2 < SQ_BUILD_AVOID * SQ_BUILD_AVOID) {
            tooClose = true; break;
          }
        }
        if (tooClose) continue;

        // Check distance from existing trees
        for (let i = 0; i < treePositions.length; i++) {
          if (windTrees[i] && windTrees[i].chopped) continue;
          const t = treePositions[i];
          if ((t.x - px) ** 2 + (t.z - pz) ** 2 < SQ_TREE_MIN_DIST * SQ_TREE_MIN_DIST) {
            tooClose = true; break;
          }
        }
        if (tooClose) continue;
        return { x: px, z: pz };
      }
      return null;
    }

    // Growing trees — planted as tiny saplings, grow to full size over several day cycles
    const growingTrees = []; // { idx, targetScale, currentScale, growRate }
    const TREE_SAPLING_SCALE = 0.08; // start very small
    const TREE_GROW_RATE = 0.012;    // scale units per second (~80s to full size)

    function plantTreeAt(wx, wz) {
      const inf = getKingdomInfluence(wx, wz);
      const pal = inf.b > inf.a ? PALETTE.B : PALETTE.A;
      const height = 6 + Math.random() * 6;
      const types = [createPineTree, createCypressTree, createBroadleafTree, createOakTree];
      const tree = types[(Math.random() * types.length) | 0](height, pal);
      const wy = getTerrainY(wx, wz);
      tree.position.set(wx, wy, wz);
      tree.scale.setScalar(TREE_SAPLING_SCALE); // start tiny
      treeGroup.add(tree);
      const idx = treePositions.length;
      treePositions.push(new THREE.Vector3(wx, wy, wz));
      windTrees.push({
        group: tree,
        phase: Math.random() * Math.PI * 2,
        flex: (0.6 + Math.random() * 0.8) / Math.max(height, 12),
        wx, wz, height, chopped: false
      });
      growingTrees.push({
        idx,
        targetScale: 1.0,
        currentScale: TREE_SAPLING_SCALE,
        growRate: TREE_GROW_RATE * (0.8 + Math.random() * 0.4), // slight variation
      });
      return idx;
    }

    function updateGrowingTrees(dt) {
      if (!autoCycle) return;
      for (let i = growingTrees.length - 1; i >= 0; i--) {
        const gt = growingTrees[i];
        gt.currentScale += gt.growRate * dt;
        if (gt.currentScale >= gt.targetScale) {
          gt.currentScale = gt.targetScale;
          windTrees[gt.idx].group.scale.setScalar(1.0);
          growingTrees.splice(i, 1); // done growing
        } else {
          windTrees[gt.idx].group.scale.setScalar(gt.currentScale);
        }
      }
    }

    const SQ_CLIMB_SPEED = 2.5; // climb progress per second (0→1 in ~0.4s)

    function getCanopyY(treeIdx) {
      const wt = windTrees[treeIdx];
      if (!wt) return 0;
      const scale = wt.group.scale.x; // handles growing saplings
      return treePositions[treeIdx].y + wt.height * scale * 0.7;
    }

    function moveSquirrel(sq, tx, tz, dt, speed) {
      const dx = tx - sq.x, dz = tz - sq.z;
      const dist = Math.sqrt(dx * dx + dz * dz);
      if (dist < 0.8) return 0;
      const step = Math.min(speed * dt, dist);
      const nx = dx / dist, nz = dz / dist;
      sq.x += nx * step; sq.z += nz * step;
      sq.mesh.position.x = sq.x;
      sq.mesh.position.z = sq.z;
      sq.mesh.position.y = getTerrainY(sq.x, sq.z);
      sq.mesh.rotation.y = Math.atan2(nx, nz);
      // Scurrying leg animation (faster than NPC)
      sq.walkPhase += dt * 20;
      const ud = sq.mesh.userData;
      const legSwing = Math.sin(sq.walkPhase) * 0.5;
      ud.legFL.rotation.x = legSwing;
      ud.legBR.rotation.x = legSwing;
      ud.legFR.rotation.x = -legSwing;
      ud.legBL.rotation.x = -legSwing;
      // Squirrels walk gently on the ground, so no trample effect for now — but could add if desired
      // sq._trampAccum = (sq._trampAccum || 0) + step;
      // if (sq._trampAccum > 3.0) { sq._trampAccum = 0; trampleAt(sq.x, sq.z); }
      return dist;
    }

    function updateSquirrels(dt) {
      if (!autoCycle) return;

      const isDay = timeOfDay > 0.30 && timeOfDay < 0.70;
      const isDusk = timeOfDay >= 0.70 && timeOfDay <= 0.80;
      const isNight = timeOfDay > 0.80 || timeOfDay < 0.25;

      for (let i = squirrels.length - 1; i >= 0; i--) {
        const sq = squirrels[i];
        if (!sq.alive) continue;

        // Track full moons for reproduction
        if (moonPhaseIndex === 4 && sq.lastMoonPhase !== 4) {
          sq.fullMoonsSeen++;
          if (sq.nursingPhasesLeft > 0) sq.nursingPhasesLeft--;
        }
        // Track nursing countdown by phase changes
        if (moonPhaseIndex !== sq.lastMoonPhase) {
          if (sq.nursingPhasesLeft > 0) sq.nursingPhasesLeft--;
        }
        sq.lastMoonPhase = moonPhaseIndex;

        // Show/hide nut
        sq.mesh.userData.nut.visible = sq.hasNut;

        // ── Dusk: head home ──
        if (isDusk && sq.state !== SQ_GO_HOME && sq.state !== SQ_SLEEPING
            && sq.state !== SQ_FLEE) {
          const homeTree = findSquirrelTree(sq.x, sq.z, SQ_TREE_SEARCH, -1);
          if (homeTree >= 0) {
            sq.homeTreeIdx = homeTree;
            sq.targetX = treePositions[homeTree].x;
            sq.targetZ = treePositions[homeTree].z;
            sq.state = SQ_GO_HOME;
            sq.hasNut = false;
          }
        }

        // ── Night without tree: die ──
        if (isNight && sq.state !== SQ_SLEEPING) {
          // Squirrel couldn't find a tree — fate is configurable
          sq.alive = false;
          sq.mesh.visible = false;
          squirrels.splice(i, 1);
          continue;
        }

        switch (sq.state) {
          case SQ_SLEEPING: {
            // Sit in canopy
            if (sq.homeTreeIdx >= 0) {
              sq.mesh.position.x = treePositions[sq.homeTreeIdx].x;
              sq.mesh.position.z = treePositions[sq.homeTreeIdx].z;
              sq.mesh.position.y = getCanopyY(sq.homeTreeIdx);
            }
            // Wake up after dawn — climb down first
            if (isDay) {
              sq.climbProgress = 1.0;
              sq.nextState = SQ_IDLE;
              sq.timer = 3 + Math.random() * 8;
              sq.state = SQ_CLIMB_DOWN;
              sq.inCanopy = false;
            }
            break;
          }

          case SQ_IDLE: {
            // Keep position in canopy if resting in tree
            if (sq.inCanopy && sq.homeTreeIdx >= 0) {
              sq.mesh.position.x = treePositions[sq.homeTreeIdx].x;
              sq.mesh.position.z = treePositions[sq.homeTreeIdx].z;
              sq.mesh.position.y = getCanopyY(sq.homeTreeIdx);
              sq.x = treePositions[sq.homeTreeIdx].x;
              sq.z = treePositions[sq.homeTreeIdx].z;
            }
            sq.timer -= dt;
            if (sq.timer > 0) break;

            // Check reproduction
            if (sq.fullMoonsSeen >= SQ_REPRO_MOONS && sq.nursingPhasesLeft <= 0) {
              sq.fullMoonsSeen = 0;
              sq.nursingPhasesLeft = SQ_NURSE_PHASES;
              spawnSquirrel(sq.x + (Math.random() - 0.5) * 3,
                            sq.z + (Math.random() - 0.5) * 3);
            }

            // Find a tree to run to
            const nearTree = findSquirrelTree(sq.x, sq.z, SQ_TREE_SEARCH,
                                              sq.homeTreeIdx);
            if (nearTree >= 0) {
              sq.targetTreeIdx = nearTree;
              sq.targetX = treePositions[nearTree].x;
              sq.targetZ = treePositions[nearTree].z;
              // If in canopy, climb down first
              if (sq.inCanopy) {
                sq.climbProgress = 1.0;
                sq.nextState = SQ_RUN_TREE;
                sq.state = SQ_CLIMB_DOWN;
                sq.inCanopy = false;
              } else {
                sq.state = SQ_RUN_TREE;
              }
            } else {
              // No trees nearby → prioritize attacking farms, then buildings
              let targetedFarm = false;
              // Check farms first
              let bestF = -1, bestFD = Infinity;
              for (let f = 0; f < farms.length; f++) {
                if (farms[f].destroyed) continue;
                const d2 = (farms[f].x - sq.x) ** 2 + (farms[f].z - sq.z) ** 2;
                if (d2 < bestFD) { bestFD = d2; bestF = f; }
              }
              if (bestF >= 0) {
                sq.attackTargetIdx = bestF;
                sq.attackProgress = 0;
                sq.attackingFarm = true;
                sq.targetX = farms[bestF].x;
                sq.targetZ = farms[bestF].z;
                sq.state = SQ_ATTACK;
                targetedFarm = true;
              }
              if (!targetedFarm) {
                // Fall back to buildings
                let bestB = -1, bestBD = Infinity;
                for (let b = 0; b < buildingAttractors.length; b++) {
                  const ba = buildingAttractors[b];
                  if (ba.destroyed) continue;
                  const d2 = (ba.x - sq.x) ** 2 + (ba.z - sq.z) ** 2;
                  if (d2 < bestBD) { bestBD = d2; bestB = b; }
                }
