      rockGroup.add(rock);
      rockPositions.push(new THREE.Vector3(x, y, z));
      rockMeshes.push(rock);
      rockScales.push(rockScale);
      // Durability: small rocks (scale ~0.3) = 2 trips, large (scale ~3.3) = 10 trips
      rockDurability.push(Math.max(2, Math.round(2 + (rockScale - 0.3) / 3.0 * 8)));
    }
    scene.add(rockGroup);

    // Water plane
    const waterGeo = new THREE.PlaneGeometry(WORLD_SIZE * 1.5, WORLD_SIZE * 1.5);
    waterGeo.rotateX(-Math.PI / 2);
    const waterMat = new THREE.MeshStandardMaterial({
      color: 0x2a5a7a,
      transparent: true,
      opacity: 0.6,
      roughness: 0.2,
      metalness: 0.1,
      polygonOffset: true,
      polygonOffsetFactor: 1,
      polygonOffsetUnits: 1,
    });
    const water = new THREE.Mesh(waterGeo, waterMat);
    water.position.y = 1.5;
    water.renderOrder = 1; // render after terrain to avoid z-fighting
    scene.add(water);

    // Moon sphere — visible in the sky at night, with procedural crater texture
    const moonCanvas = document.createElement('canvas');
    moonCanvas.width = 128;
    moonCanvas.height = 128;
    const mCtx = moonCanvas.getContext('2d');
    // Transparent background — draw moon as a circle
    mCtx.clearRect(0, 0, 128, 128);
    // Moon disc — warm grey base, not pure white
    mCtx.save();
    mCtx.beginPath();
    mCtx.arc(64, 64, 60, 0, Math.PI * 2);
    mCtx.clip();
    mCtx.fillStyle = '#c8c0b4';
    mCtx.fillRect(0, 0, 128, 128);

    // Maria (dark seas) — large dark patches like the real moon
    const maria = [
      [45, 40, 22, 'rgba(45,40,35,0.7)'],     // Mare Imbrium
      [70, 55, 18, 'rgba(50,45,38,0.65)'],     // Mare Serenitatis
      [58, 72, 16, 'rgba(40,36,30,0.6)'],      // Mare Tranquillitatis
      [35, 65, 12, 'rgba(48,42,36,0.55)'],     // Mare Nubium
      [80, 35, 10, 'rgba(55,48,40,0.55)'],     // Mare Crisium
    ];
    for (const [mx, my, mr, col] of maria) {
      const grad = mCtx.createRadialGradient(mx, my, 0, mx, my, mr);
      grad.addColorStop(0, col);
      grad.addColorStop(0.5, col.replace(/[\d.]+\)$/, '0.35)'));
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      mCtx.fillStyle = grad;
      mCtx.beginPath();
      mCtx.arc(mx, my, mr, 0, Math.PI * 2);
      mCtx.fill();
    }

    // Surface texture — scattered noise-like speckles
    for (let i = 0; i < 300; i++) {
      const sx = 10 + Math.random() * 108;
      const sy = 10 + Math.random() * 108;
      const dx = sx - 64, dy = sy - 64;
      if (dx * dx + dy * dy > 58 * 58) continue;
      const bright = Math.random() > 0.5;
      mCtx.fillStyle = bright
        ? `rgba(210,205,195,${0.1 + Math.random() * 0.15})`
        : `rgba(110,105,95,${0.08 + Math.random() * 0.12})`;
      mCtx.fillRect(sx, sy, 1 + Math.random() * 1.5, 1 + Math.random() * 1.5);
    }

    // Craters — subtle darker circles
    const craters = [
      [40, 35, 12], [75, 50, 8], [55, 80, 10], [90, 30, 6], [25, 70, 7],
      [60, 45, 5], [30, 50, 4], [85, 75, 9], [50, 25, 6], [70, 85, 5],
      [45, 60, 3], [15, 40, 5], [100, 60, 7], [65, 15, 4], [35, 95, 6],
    ];
    for (const [cx, cy, cr] of craters) {
      const grad = mCtx.createRadialGradient(cx, cy, 0, cx, cy, cr);
      grad.addColorStop(0, 'rgba(90,85,78,0.4)');
      grad.addColorStop(0.5, 'rgba(110,105,98,0.25)');
      grad.addColorStop(0.85, 'rgba(140,135,125,0.1)');
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      mCtx.fillStyle = grad;
      mCtx.beginPath();
      mCtx.arc(cx, cy, cr, 0, Math.PI * 2);
      mCtx.fill();
      // Bright rim on one side
      mCtx.beginPath();
      mCtx.arc(cx - cr * 0.2, cy - cr * 0.2, cr * 0.9, 0, Math.PI * 2);
      mCtx.strokeStyle = `rgba(190,185,175,${0.15 + Math.random() * 0.1})`;
      mCtx.lineWidth = 0.8;
      mCtx.stroke();
    }

    // Subtle edge darkening (limb darkening)
    const limbGrad = mCtx.createRadialGradient(64, 64, 30, 64, 64, 60);
    limbGrad.addColorStop(0, 'rgba(0,0,0,0)');
    limbGrad.addColorStop(0.7, 'rgba(0,0,0,0)');
    limbGrad.addColorStop(1, 'rgba(40,35,30,0.3)');
    mCtx.fillStyle = limbGrad;
    mCtx.beginPath();
    mCtx.arc(64, 64, 60, 0, Math.PI * 2);
    mCtx.fill();

    // Slight warm tint overlay
    const warmGrad = mCtx.createRadialGradient(50, 50, 0, 64, 64, 60);
    warmGrad.addColorStop(0, 'rgba(200,180,140,0.08)');
    warmGrad.addColorStop(1, 'rgba(180,170,150,0.04)');
    mCtx.fillStyle = warmGrad;
    mCtx.beginPath();
    mCtx.arc(64, 64, 60, 0, Math.PI * 2);
    mCtx.fill();

    // Highland patches — slightly lighter areas
    for (let i = 0; i < 6; i++) {
      const hx = 20 + Math.random() * 88;
      const hy = 20 + Math.random() * 88;
      const hr = 5 + Math.random() * 10;
      const grad = mCtx.createRadialGradient(hx, hy, 0, hx, hy, hr);
      grad.addColorStop(0, 'rgba(200,195,185,0.2)');
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      mCtx.fillStyle = grad;
      mCtx.beginPath();
      mCtx.arc(hx, hy, hr, 0, Math.PI * 2);
      mCtx.fill();
    }
    mCtx.restore();
    const moonTexture = new THREE.CanvasTexture(moonCanvas);

    // Moon as a Sprite — always faces camera, no angle distortion
    const moonSpriteMat = new THREE.SpriteMaterial({
      map: moonTexture,
      transparent: true,
      opacity: 0,
      fog: false,
      depthWrite: false,
      sizeAttenuation: false,
    });
    const moonSprite = new THREE.Sprite(moonSpriteMat);
    moonSprite.scale.set(0.06, 0.06, 1);
    moonSprite.visible = false;
    moonSprite.frustumCulled = false;
    scene.add(moonSprite);

    // Phase shadow canvas — drawn dynamically per phase, overlaid on moon
    const moonShadowCanvas = document.createElement('canvas');
    moonShadowCanvas.width = 128;
    moonShadowCanvas.height = 128;
    const msCtx = moonShadowCanvas.getContext('2d');
    const moonShadowTex = new THREE.CanvasTexture(moonShadowCanvas);
    const moonShadowSpriteMat = new THREE.SpriteMaterial({
      map: moonShadowTex,
      transparent: true,
      opacity: 0,
      fog: false,
      depthWrite: false,
      sizeAttenuation: false,
    });
    const moonShadowSprite = new THREE.Sprite(moonShadowSpriteMat);
    moonShadowSprite.scale.set(0.06, 0.06, 1);
    moonShadowSprite.visible = false;
    moonShadowSprite.frustumCulled = false;
    scene.add(moonShadowSprite);

    // Draw phase shadow into canvas (called when phase changes)
    let lastDrawnPhase = -1;
    function updateMoonShadowCanvas(phaseLight, waxing) {
      msCtx.clearRect(0, 0, 128, 128);
      if (phaseLight >= 0.95) return;
      const coverAmount = 1.0 - phaseLight;
      const dir = waxing ? -1 : 1;
      // Clip to circle, then draw offset dark circle
      msCtx.save();
      msCtx.beginPath();
      msCtx.arc(64, 64, 63, 0, Math.PI * 2);
      msCtx.clip();
      msCtx.fillStyle = `rgba(5,5,15,${Math.min(coverAmount * 1.15, 0.9)})`;
      msCtx.beginPath();
      msCtx.arc(64 + dir * coverAmount * 70, 64, 65, 0, Math.PI * 2);
      msCtx.fill();
      msCtx.restore();
      moonShadowTex.needsUpdate = true;
    }

    // Settlements — Kingdom A
    const settlementsA = [
      createSettlement(new THREE.Vector2(KINGDOM_A_CENTER.x, KINGDOM_A_CENTER.y), PALETTE.A, 8),
      createSettlement(new THREE.Vector2(KINGDOM_A_CENTER.x - 30, KINGDOM_A_CENTER.y + 25), PALETTE.A, 5),
      createSettlement(new THREE.Vector2(KINGDOM_A_CENTER.x + 20, KINGDOM_A_CENTER.y - 35), PALETTE.A, 4),
    ];
    settlementsA.forEach(s => scene.add(s));

    // Settlements — Kingdom B
    const settlementsB = [
      createSettlement(new THREE.Vector2(KINGDOM_B_CENTER.x, KINGDOM_B_CENTER.y), PALETTE.B, 8),
      createSettlement(new THREE.Vector2(KINGDOM_B_CENTER.x + 25, KINGDOM_B_CENTER.y - 30), PALETTE.B, 5),
      createSettlement(new THREE.Vector2(KINGDOM_B_CENTER.x - 20, KINGDOM_B_CENTER.y + 25), PALETTE.B, 4),

    // Spawn one NPC per existing building
    for (const b of buildingAttractors) {
      const dA = Math.hypot(b.x - KINGDOM_A_CENTER.x, b.z - KINGDOM_A_CENTER.y);
      const dB = Math.hypot(b.x - KINGDOM_B_CENTER.x, b.z - KINGDOM_B_CENTER.y);
      const isB = dB < dA;
      spawnNPC(b.x, b.z, isB ? PALETTE.B : PALETTE.A, isB ? 1 : 0);
    }

    // Building lights now handled by deferred light accumulation pass.
    // Every lit building gets its own deferred point light — no pool limit.

    // Eclipse point — subtle stone circle at world center
    const eclipseGroup = new THREE.Group();
    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI * 2;
      const r = 8;
      const rock = createRock(1.0 + Math.random() * 0.5);

      eclipseGroup.add(rock);

    scene.add(eclipseGroup);

    // ─────────────────────────────────────────
    //  PLAYER CHARACTER (scaled up ~2.5x)
    // ─────────────────────────────────────────
    const playerGroup = new THREE.Group();
    const PLAYER_HEIGHT = 3.6;
    // Body
    const bodyGeo = new THREE.CapsuleGeometry(0.7, 2.0, 4, 6);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xb08060, flatShading: true });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 1.7;
    body.castShadow = true;
    playerGroup.add(body);
    // Head
    const headGeo = new THREE.IcosahedronGeometry(0.6, 1);
    const headMat = new THREE.MeshStandardMaterial({ color: 0xd4a574, flatShading: true });
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.y = 3.6;

    // Cloak/shoulders
    const shoulderGeo = new THREE.ConeGeometry(1.1, 1.0, 6);
    const shoulderMat = new THREE.MeshStandardMaterial({ color: 0x6a4a3a, flatShading: true });
    const shoulders = new THREE.Mesh(shoulderGeo, shoulderMat);
    shoulders.position.y = 2.85;
    shoulders.rotation.x = Math.PI;
    shoulders.castShadow = true;
    playerGroup.add(shoulders);
    // Legs (two cylinders for visual grounding)
    const legMat = new THREE.MeshStandardMaterial({ color: 0x5a3a2a, flatShading: true });
    const legs = [];
    for (const side of [-0.3, 0.3]) {

    // Sword — held in right hand, visible during daytime
    const swordGroup = new THREE.Group();
    // Blade — large luminous blue
    const bladeGeo = new THREE.BoxGeometry(0.18, 3.2, 0.05);
    const bladeMat = new THREE.MeshStandardMaterial({
      color: 0x4488ff, emissive: 0x2266ee, emissiveIntensity: 1.2,
      metalness: 0.9, roughness: 0.15, flatShading: true,

    });
    const blade = new THREE.Mesh(bladeGeo, bladeMat);
    blade.position.y = 1.7;
    swordGroup.add(blade);
    // Blade edge glow
    const edgeGeo = new THREE.BoxGeometry(0.04, 3.0, 0.08);
    const edgeMat = new THREE.MeshStandardMaterial({
      color: 0x88ccff, emissive: 0x55aaff, emissiveIntensity: 2.0,

    });

    edgeGlow.position.y = 1.7;
    swordGroup.add(edgeGlow);
    // Guard
    const guardGeo = new THREE.BoxGeometry(0.7, 0.14, 0.14);
    const guardMat = new THREE.MeshStandardMaterial({
      color: 0x3355aa, emissive: 0x1133aa, emissiveIntensity: 0.6,

    });

    swordGroup.add(guard);
    // Grip
    const gripGeo = new THREE.CylinderGeometry(0.07, 0.08, 0.6, 5);
    const gripMat = new THREE.MeshStandardMaterial({ color: 0x2a1a08, flatShading: true });
    const grip = new THREE.Mesh(gripGeo, gripMat);
    grip.position.y = -0.25;
    swordGroup.add(grip);
    swordGroup.position.set(0.8, 1.6, 0.3); // right side of body
    swordGroup.rotation.z = 0.2; // slight outward angle at rest
    swordGroup.visible = false;
    playerGroup.add(swordGroup);
    let swordSwingPhase = 0;
    let isAttacking = false;

    // Raycaster for exact terrain surface Y
    const terrainRay = new THREE.Raycaster();
    const rayOrigin = new THREE.Vector3();
    const rayDown = new THREE.Vector3(0, -1, 0);

    function getExactTerrainY(x, z) {
      rayOrigin.set(x, 200, z); // start well above terrain
      terrainRay.set(rayOrigin, rayDown);
      const hits = terrainRay.intersectObject(terrain.mesh);
      if (hits.length > 0) return hits[0].point.y;
      return terrainHeight(x, z) * HEIGHT_SCALE; // fallback
    }

    // Start position
    const startX = 0, startZ = 0;
    playerGroup.position.set(startX, getExactTerrainY(startX, startZ), startZ);
    scene.add(playerGroup);

    // (player night light removed — ghost lights handle all night illumination)

    // ─────────────────────────────────────────
    //  CAMERA CONTROLLER — 65° top-down, third person
    // ─────────────────────────────────────────
    const CAMERA_ANGLE   = 65 * (Math.PI / 180);
    const CAMERA_DIST    = 30;
    const CAMERA_MIN_HEIGHT = 1.5; // minimum height above terrain
    let   cameraYaw      = 0;
    let   cameraPitch     = CAMERA_ANGLE;

    function updateCamera() {
      const offset = new THREE.Vector3(
        Math.sin(cameraYaw) * Math.cos(cameraPitch) * CAMERA_DIST,
        Math.sin(cameraPitch) * CAMERA_DIST,
        Math.cos(cameraYaw) * Math.cos(cameraPitch) * CAMERA_DIST
      );
      const target = playerGroup.position.clone().add(new THREE.Vector3(0, 2.5, 0));
      const desiredPos = target.clone().add(offset);

      // Prevent camera from going below terrain + minimum clearance
      const groundAtCam = getExactTerrainY(desiredPos.x, desiredPos.z);
      if (desiredPos.y < groundAtCam + CAMERA_MIN_HEIGHT) {
        desiredPos.y = groundAtCam + CAMERA_MIN_HEIGHT;
      }

      camera.position.copy(desiredPos);
      camera.lookAt(target);
    }

    // ─────────────────────────────────────────
    //  AXIS DEBUG HUD (toggle X)
    //  Shows XYZ gizmo + camera yaw/pitch readout
    // ─────────────────────────────────────────
    let axisDebugActive = false;
    const _axisCanvas = document.getElementById('axis-hud');
    const _axisCtx = _axisCanvas.getContext('2d');
    const _axisInfo = document.getElementById('axis-info');

    function drawAxisHud() {
      if (!axisDebugActive) return;
      const s = 80, cx = s / 2, cy = s / 2, len = 30;
      _axisCtx.clearRect(0, 0, s, s);

      // Camera rotation matrix (yaw + pitch) projected to 2D
      const sy = Math.sin(cameraYaw), cy_ = Math.cos(cameraYaw);
      const sp = Math.sin(cameraPitch), cp = Math.cos(cameraPitch);

      // Project 3D axis unit vectors to screen 2D
      // Screen: right = +u, down = +v
      function project(ax, ay, az) {
        // View-space: right = cross(forward, up), up adjusted for pitch
        const u = -ax * cy_ + az * sy;              // screen right
        const v = -(ax * sy * sp + ay * cp + az * cy_ * sp); // screen up (inverted for canvas)
        return [cx + u * len, cy + v * len];
      }

      // Draw each axis
      const axes = [
        { dir: [1,0,0], color: '#ff4444', label: '+X' },
        { dir: [0,1,0], color: '#44ff44', label: '+Y' },
        { dir: [0,0,1], color: '#4488ff', label: '+Z' },
      ];
      for (const a of axes) {
        const [ex, ey] = project(...a.dir);
        _axisCtx.beginPath();
        _axisCtx.moveTo(cx, cy);
        _axisCtx.lineTo(ex, ey);
        _axisCtx.strokeStyle = a.color;
        _axisCtx.lineWidth = 2.5;
        _axisCtx.stroke();
        // Label
        _axisCtx.font = 'bold 10px monospace';
        _axisCtx.fillStyle = a.color;
        const dx = ex - cx, dy = ey - cy;
        const d = Math.sqrt(dx*dx + dy*dy) || 1;
        _axisCtx.fillText(a.label, ex + dx/d*6 - 8, ey + dy/d*6 + 3);
      }

      // Circle outline
      _axisCtx.beginPath();
      _axisCtx.arc(cx, cy, len + 4, 0, Math.PI * 2);
      _axisCtx.strokeStyle = 'rgba(255,255,255,0.15)';
      _axisCtx.lineWidth = 1;
      _axisCtx.stroke();

      // Camera info text
      const yawDeg = ((cameraYaw * 180 / Math.PI) % 360 + 360) % 360;
      const pitchDeg = cameraPitch * 180 / Math.PI;
      const fwd = camera.getWorldDirection(new THREE.Vector3());
      _axisInfo.textContent =
        `Yaw: ${yawDeg.toFixed(1)}°  Pitch: ${pitchDeg.toFixed(1)}°\n` +
        `Forward: (${fwd.x.toFixed(2)}, ${fwd.y.toFixed(2)}, ${fwd.z.toFixed(2)})`;
    }

    // ─────────────────────────────────────────
    //  INPUT
    // ─────────────────────────────────────────
    const keys = {};
    window.addEventListener('keydown', e => {
      keys[e.key.toLowerCase()] = true;
      if (e.key === ' ') e.preventDefault(); // prevent scroll on space
    });
    window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

    // Mouse look
    let pointerLocked = false;
    renderer.domElement.addEventListener('click', () => {
      renderer.domElement.requestPointerLock();
    });
    document.addEventListener('pointerlockchange', () => {
      pointerLocked = document.pointerLockElement === renderer.domElement;
    });
    document.addEventListener('mousemove', e => {
      if (!pointerLocked) return;
      cameraYaw   -= e.movementX * 0.003;
      cameraPitch  = Math.max(-0.3, Math.min(Math.PI / 2 - 0.05, cameraPitch + e.movementY * 0.003));
    });

    // Mouse button tracking (for attack hold)
    let mouseDown = false;
    document.addEventListener('mousedown', e => { if (e.button === 0 && pointerLocked) mouseDown = true; });
    document.addEventListener('mouseup', e => { if (e.button === 0) mouseDown = false; });

    // ─────────────────────────────────────────
    //  DAY/NIGHT CYCLE + LIGHTING PRESETS
    // ─────────────────────────────────────────
    let timeOfDay = 0.25; // 0 = midnight, 0.25 = sunrise, 0.5 = noon, 0.75 = sunset
    let autoCycle = true;
    const CYCLE_SPEED = 0.007; // full cycle per ~70 seconds

    const LIGHTING_PRESETS = {
      day: {
        dirColor:      new THREE.Color(0xffeedd),
        dirIntensity:  1.4,
        ambColor:      new THREE.Color(0x8899bb),
        ambIntensity:  0.45,
        hemiSky:       new THREE.Color(0x87ceeb),
        hemiGround:    new THREE.Color(0x5a7a4a),
        hemiIntensity: 0.3,
        fogColor:      new THREE.Color(0xa8c4d8),
        fogDensity:    0.0015,
        exposure:      1.1,
        bgColor:       new THREE.Color(0x78b0d4),
      },
      dusk: {
        dirColor:      new THREE.Color(0xff8844),
        dirIntensity:  0.9,
        ambColor:      new THREE.Color(0x554466),
        ambIntensity:  0.3,
        hemiSky:       new THREE.Color(0xdd6644),
        hemiGround:    new THREE.Color(0x3a4a2a),
        hemiIntensity: 0.2,
        fogColor:      new THREE.Color(0x886655),
        fogDensity:    0.002,
        exposure:      0.85,
        bgColor:       new THREE.Color(0x664433),
      },
      night: {
        dirColor:      new THREE.Color(0x4466aa),
        dirIntensity:  0.2,
        ambColor:      new THREE.Color(0x222244),
        ambIntensity:  0.25,
        hemiSky:       new THREE.Color(0x1a2a55),
        hemiGround:    new THREE.Color(0x101a18),
        hemiIntensity: 0.2,
        fogColor:      new THREE.Color(0x111a2a),
        fogDensity:    0.0022,
        exposure:      0.65,
        bgColor:       new THREE.Color(0x0c1220),
      }
    };

    function lerpColor(a, b, t) { return a.clone().lerp(b, t); }
    const _bgColor = new THREE.Color();

    function applyLighting(t) {
      // t: 0 = midnight, 0.5 = noon
      // Map to presets: night(0-0.2), dawn/dusk(0.2-0.3,0.7-0.8), day(0.3-0.7)
      let presetA, presetB, blend;
      if (t < 0.2 || t > 0.8) {
        // Night
        presetA = LIGHTING_PRESETS.night;
        presetB = LIGHTING_PRESETS.night;
        blend = 0;
      } else if (t < 0.3) {
        // Dawn transition (night → day)
        presetA = LIGHTING_PRESETS.night;
        presetB = LIGHTING_PRESETS.dusk;
        blend = (t - 0.2) / 0.1;
      } else if (t < 0.35) {
        // Dawn → Day
        presetA = LIGHTING_PRESETS.dusk;
        presetB = LIGHTING_PRESETS.day;
        blend = (t - 0.3) / 0.05;
      } else if (t < 0.65) {
        // Day
        presetA = LIGHTING_PRESETS.day;
        presetB = LIGHTING_PRESETS.day;
        blend = 0;
      } else if (t < 0.7) {
        // Day → Dusk
        presetA = LIGHTING_PRESETS.day;
        presetB = LIGHTING_PRESETS.dusk;
        blend = (t - 0.65) / 0.05;
      } else {
        // Dusk → Night
        presetA = LIGHTING_PRESETS.dusk;
        presetB = LIGHTING_PRESETS.night;
        blend = (t - 0.7) / 0.1;
      }

      dirLight.color.copy(lerpColor(presetA.dirColor, presetB.dirColor, blend));
      dirLight.intensity = THREE.MathUtils.lerp(presetA.dirIntensity, presetB.dirIntensity, blend);

      ambientLight.color.copy(lerpColor(presetA.ambColor, presetB.ambColor, blend));
      ambientLight.intensity = THREE.MathUtils.lerp(presetA.ambIntensity, presetB.ambIntensity, blend);

      hemisphereLight.color.copy(lerpColor(presetA.hemiSky, presetB.hemiSky, blend));
      hemisphereLight.groundColor.copy(lerpColor(presetA.hemiGround, presetB.hemiGround, blend));
      hemisphereLight.intensity = THREE.MathUtils.lerp(presetA.hemiIntensity, presetB.hemiIntensity, blend);

      scene.fog.color.copy(lerpColor(presetA.fogColor, presetB.fogColor, blend));
      scene.fog.density = THREE.MathUtils.lerp(presetA.fogDensity, presetB.fogDensity, blend);

      renderer.toneMappingExposure = THREE.MathUtils.lerp(presetA.exposure, presetB.exposure, blend);
      _bgColor.copy(presetA.bgColor).lerp(presetB.bgColor, blend);
      scene.background = _bgColor;

      // Sun direction follows time — full sinusoidal arc
      // t=0.25 sunrise (angle=0), t=0.5 noon (angle=π/2), t=0.75 sunset (angle=π)
      const sunAngle = (t - 0.25) * Math.PI * 2;
      const sunY = Math.sin(sunAngle) * 100;
      dirLight.position.set(
        Math.cos(sunAngle) * 120,
        Math.max(sunY, -10), // don't let the sun go far below the horizon
        60
      );
      // Disable directional light entirely when sun is below horizon
      const sunShouldCastShadow = sunY >= 0;
      if (!sunShouldCastShadow) {
        dirLight.intensity = 0;
      }
      if (dirLight.castShadow !== sunShouldCastShadow) {
        dirLight.castShadow = sunShouldCastShadow;
      }
      dirLight.target.position.copy(playerGroup.position);
      dirLight.target.updateMatrixWorld();

      // Moonlight — opposite the sun, intensity from moon phase
      const moonPhase = getCurrentMoonPhase();
      const moonAngle = sunAngle + Math.PI;
      moonLight.position.set(
        Math.cos(moonAngle) * 100,
        Math.abs(Math.sin(moonAngle)) * 80 + 30,
        -50
      );

      // ── Moon visibility & arc ──
      // The moon is ALWAYS visible when above the horizon. No opacity fade for day/night
      // — its brightness naturally changes because the sky is brighter during day.
      // The arc itself handles rising from / setting below the horizon.
      const MOON_SCHEDULE = [
        // index 0: New Moon — not visible
        { rise: 0.25, set: 0.75 },
        // index 1: Waxing Crescent
        { rise: 0.30, set: 0.85 },
        // index 2: First Quarter
        { rise: 0.40, set: 0.0 },
        // index 3: Waxing Gibbous
        { rise: 0.50, set: 0.12 },
        // index 4: Full Moon — rises 6pm, sets ~7am
        { rise: 0.75, set: 0.30 },
        // index 5: Waning Gibbous
        { rise: 0.82, set: 0.40 },
        // index 6: Last Quarter
        { rise: 0.0,  set: 0.50 },
        // index 7: Waning Crescent
        { rise: 0.12, set: 0.58 },
      ];

      const schedule = MOON_SCHEDULE[moonPhaseIndex];

      // Is the moon above the horizon right now?
      let moonAbove = false;
      let moonProgress = 0; // 0 = just risen, 1 = about to set
      const rise = schedule.rise;
      const set = schedule.set;
      if (set > rise) {
        // Simple case: rise and set in same day
        moonAbove = t >= rise && t <= set;
        if (moonAbove) moonProgress = (t - rise) / (set - rise);
      } else {
        // Wraps around midnight
        moonAbove = t >= rise || t <= set;
        if (moonAbove) {
          if (t >= rise) moonProgress = (t - rise) / (1 - rise + set);
          else moonProgress = (1 - rise + t) / (1 - rise + set);
        }
      }

      // Moonlight contribution (only when above horizon)
      const isNight = t < 0.25 || t > 0.75;
      const isDusk = t >= 0.7 && t <= 0.8;
      const isDawn = t >= 0.2 && t <= 0.3;
      const nightFactor = isNight ? 1.0 :
                          (isDawn ? 1.0 - (t - 0.2) / 0.1 :
                          (isDusk ? (t - 0.7) / 0.1 : 0.0));
      if (moonAbove) {
        moonLight.intensity = moonPhase.light * 0.8 * nightFactor;
      } else {
        moonLight.intensity = 0;
      }
      moonLight.color.set(0x8899cc);

      // ── Moon sprite positioning (world-space arc, far in the distance) ──
      // Bring moon closer so the arc is visually dramatic
      const moonDist = 400;
      const moonPeakHeight = 150;
      const moonHorizonDip = -20; // starts/ends below horizon line
      // moonProgress: 0 = just risen, 1 = about to set
      const moonArcAngle = moonProgress * Math.PI;
      const moonArcHeight = moonHorizonDip + Math.sin(moonArcAngle) * (moonPeakHeight - moonHorizonDip);
      const moonArcX = Math.cos(moonArcAngle) * moonDist;
      const moonArcZ = -moonDist * 0.8;

      // Moon is visible whenever it's above horizon, opacity = 1 at night, slightly faded in day
      const isDay = t > 0.3 && t < 0.7;
      const moonIsNewMoon = moonPhaseIndex === 0;
      let moonOpacity = 0;
      if (moonAbove && !moonIsNewMoon) {
        moonOpacity = isDay ? 0.4 : (isNight ? 1.0 :
          (isDawn ? THREE.MathUtils.lerp(1.0, 0.4, (t - 0.2) / 0.1) :
                   THREE.MathUtils.lerp(0.4, 1.0, (t - 0.7) / 0.1)));
      }

      moonSprite.visible = moonAbove && moonOpacity > 0.02;
      if (moonSprite.visible) {
        // Absolute world position — moon is far away, not relative to player
        const moonPos = new THREE.Vector3(
          moonArcX,
          moonArcHeight,
          moonArcZ
        );
        moonSprite.position.copy(moonPos);
        moonSpriteMat.opacity = moonOpacity;

        // Phase shadow — update canvas only when phase changes
        const phaseRatio = moonPhase.light;
        const waxing = moonPhaseIndex >= 1 && moonPhaseIndex <= 4;
        if (lastDrawnPhase !== moonPhaseIndex) {
          updateMoonShadowCanvas(phaseRatio, waxing);
          lastDrawnPhase = moonPhaseIndex;
        }
        moonShadowSprite.visible = phaseRatio < 0.95;
        if (moonShadowSprite.visible) {
          // Offset slightly toward camera to prevent z-fighting with moon sprite
          const toCamera = new THREE.Vector3().subVectors(camera.position, moonPos).normalize();
          moonShadowSprite.position.copy(moonPos).addScaledVector(toCamera, 0.5);
          moonShadowSpriteMat.opacity = moonOpacity * Math.min((1 - phaseRatio) * 1.2, 0.92);
        }
      } else {
        moonShadowSprite.visible = false;
      }

      // Water color shift
      const waterDay = new THREE.Color(0x3a7aaa);
      const waterNight = new THREE.Color(0x0a2a3a);
      if (t < 0.3 || t > 0.7) waterMat.color.copy(waterNight);
      else waterMat.color.copy(waterDay);
    }

    // Key overrides for lighting
    window.addEventListener('keydown', e => {
      if (e.key === '1') { autoCycle = false; timeOfDay = 0.5;  lastDayState = true; }
      if (e.key === '2') { autoCycle = false; timeOfDay = 0.72; lastDayState = false; }
      if (e.key === '3') { autoCycle = false; timeOfDay = 0.0;  lastDayState = false; }
      if (e.key === '4') { autoCycle = false; timeOfDay = 0.25; lastDayState = false; }
      if (e.key.toLowerCase() === 't') { autoCycle = !autoCycle; }
      if (e.key.toLowerCase() === 'm') {
        moonPhaseIndex = (moonPhaseIndex + 1) % MOON_PHASES.length;
        lastDrawnPhase = -1; // force shadow redraw
      }
      if (e.key.toLowerCase() === 'v') {
        windDebugLevel = (windDebugLevel + 1) % 4;
        if (windDebugLevel === 0) {
          // Turning off — hide all arrows
          for (const a of windDebugArrows) a.visible = false;
        } else {
          _windDbgTimer = 99; // force immediate redraw at new density
        }
      }
      if (e.key === 'ArrowUp' && windDebugLevel > 0) {
        windDbgLayerCount = Math.min(windDbgLayerCount + 1, WIND_DBG_MAX_LAYERS);
        _windDbgTimer = 99; // force redraw
      }
      if (e.key === 'ArrowDown' && windDebugLevel > 0) {
        windDbgLayerCount = Math.max(1, windDbgLayerCount - 1);
        // Hide arrows that may now be beyond active set
        for (const a of windDebugArrows) a.visible = false;
        _windDbgTimer = 99;
      }
      if (e.key.toLowerCase() === 'g') {
        smokeVisible = !smokeVisible;
        smokePoints.visible = smokeVisible;
        chimPoints.visible = smokeVisible;
      }
      if (e.key.toLowerCase() === 'f') {
        faceDebugVisible = !faceDebugVisible;
        buildFaceDebugArrows();
      }
      if (e.key.toLowerCase() === 'b') {
        collisionDebugVisible = !collisionDebugVisible;
        buildCollisionDebugBoxes();
      }
      if (e.key.toLowerCase() === 'p') {
        pathDebugActive = !pathDebugActive;
        applyPathDebugOverlay();
      }
      if (e.key.toLowerCase() === 'x') {
        axisDebugActive = !axisDebugActive;
        document.getElementById('axis-hud').style.display = axisDebugActive ? 'block' : 'none';
        document.getElementById('axis-info').style.display = axisDebugActive ? 'block' : 'none';
      }
    });

    // ─────────────────────────────────────────
    //  PLAYER MOVEMENT — smooth terrain following
    // ─────────────────────────────────────────
    const MOVE_SPEED = 25;
    const playerVelocity = new THREE.Vector3();
    let smoothedY = getTerrainY(0, 0); // smoothed ground height
    let _playerTrampAccum = 0;
    let playerFacingAngle = 0;

    // Resolve player vs tree trunk collision — circular push-out
    function resolvePlayerTrunkCollisions() {
      const px = playerGroup.position.x, pz = playerGroup.position.z;
      for (let i = 0, len = trunkColliders.length; i < len; i++) {
        const tc = trunkColliders[i];
        const dx = px - tc.x, dz = pz - tc.z;
        const d2 = dx * dx + dz * dz;
        const minDist = tc.r + 0.4; // player radius ~0.4
        if (d2 >= minDist * minDist || d2 < 0.0001) continue;
        const d = Math.sqrt(d2);
        const nx = dx / d, nz = dz / d;
        const pen = minDist - d;
        playerGroup.position.x += nx * pen;
        playerGroup.position.z += nz * pen;
        // Kill velocity into trunk
        const vDot = playerVelocity.x * nx + playerVelocity.z * nz;
        if (vDot < 0) {
          playerVelocity.x -= vDot * nx;
          playerVelocity.z -= vDot * nz;
        }
      }
    }

    // Resolve player vs OBB collision — push player out of overlapping boxes
    function resolvePlayerBuildingCollisions() {
      for (let i = 0, len = collisionBoxes.length; i < len; i++) {
        const b = collisionBoxes[i];
        // Transform player into box local space (inverse rotation = transpose)
        const dx = playerGroup.position.x - b.cx;
        const dz = playerGroup.position.z - b.cz;
        const localX =  dx * b.cosR - dz * b.sinR;
        const localZ =  dx * b.sinR + dz * b.cosR;
        // Check overlap
        const overlapX = b.hw - Math.abs(localX);
        const overlapZ = b.hd - Math.abs(localZ);
        if (overlapX <= 0 || overlapZ <= 0) continue;
        // Push out along the axis with smallest overlap
        if (overlapX < overlapZ) {
          const sign = localX > 0 ? 1 : -1;
          const pushLocal = sign * overlapX;
          // Local X axis in world: (cosR, -sinR)
          playerGroup.position.x += pushLocal * b.cosR;
          playerGroup.position.z -= pushLocal * b.sinR;
          // Kill velocity component along push direction
          const vDot = playerVelocity.x * b.cosR - playerVelocity.z * b.sinR;
          if (vDot * sign < 0) {
            playerVelocity.x -= vDot * b.cosR;
            playerVelocity.z += vDot * b.sinR;
          }
        } else {
          const sign = localZ > 0 ? 1 : -1;
          const pushLocal = sign * overlapZ;
          // Local Z axis in world: (sinR, cosR)
          playerGroup.position.x += pushLocal * b.sinR;
          playerGroup.position.z += pushLocal * b.cosR;
          const vDot = playerVelocity.x * b.sinR + playerVelocity.z * b.cosR;
          if (vDot * sign < 0) {
            playerVelocity.x -= vDot * b.sinR;
            playerVelocity.z -= vDot * b.cosR;
          }
        }
      }
    }

    function updatePlayer(dt) {
      const forward = new THREE.Vector3(-Math.sin(cameraYaw), 0, -Math.cos(cameraYaw));
      const right   = new THREE.Vector3(-forward.z, 0, forward.x);

      const input = new THREE.Vector3();
      if (keys['w']) input.add(forward);
      if (keys['s']) input.sub(forward);
      if (keys['a']) input.sub(right);
      if (keys['d']) input.add(right);

      // Frame-rate independent smoothing factor
      const accelSmooth = 1 - Math.pow(0.001, dt);
      const decelSmooth = 1 - Math.pow(0.01, dt);

      if (input.lengthSq() > 0) {
        input.normalize();

        if (playerAirborne) {
          // Airborne control scales with ghost power (New Moon=strong, Full Moon=weak)
          const gp = typeof getGhostPower === 'function' ? getGhostPower() : 0.5;
          // gp 1.0 (New Moon): ~50% move speed — can overpower the wind
          // gp 0.25 (Full Moon): ~15% — gentle guidance, wind dominates
          const airControl = 0.10 + gp * 0.40;
          const nudge = input.clone().multiplyScalar(MOVE_SPEED * airControl);
          playerVelocity.x += nudge.x * dt;
          playerVelocity.z += nudge.z * dt;
        } else {
          const speedMult = getPathSpeedAt(playerGroup.position.x, playerGroup.position.z);
          const target = input.clone().multiplyScalar(MOVE_SPEED * speedMult);
          playerVelocity.lerp(target, accelSmooth);
        }
        // Smooth rotation toward movement direction
        const targetAngle = Math.atan2(playerVelocity.x, playerVelocity.z);
        let angleDiff = targetAngle - playerFacingAngle;
        while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
        while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
        playerFacingAngle += angleDiff * Math.min(1, 10 * dt);
        playerGroup.rotation.y = playerFacingAngle;
      } else {
        if (!playerAirborne) {
          playerVelocity.lerp(new THREE.Vector3(0, 0, 0), decelSmooth);
        }
        // Airborne with no input: velocity persists (no drag toward zero)
      }

      playerGroup.position.x += playerVelocity.x * dt;
      playerGroup.position.z += playerVelocity.z * dt;

      // Daytime building/wall collision — player is solid during the day
      if (timeOfDay > 0.25 && timeOfDay < 0.75) {
        resolvePlayerBuildingCollisions();
        // Tree trunk collision — always active (trunks are always solid)
        resolvePlayerTrunkCollisions();
      }

      // Player trampling
      const _pSpeed = playerVelocity.length();
      if (_pSpeed > 1.5) {
        _playerTrampAccum += _pSpeed * dt;
        if (_playerTrampAccum > 2.0) {
          _playerTrampAccum = 0;
          trampleAt(playerGroup.position.x, playerGroup.position.z);
        }
      }

      // Clamp to world bounds
      const bound = WORLD_SIZE * 0.45;
      playerGroup.position.x = Math.max(-bound, Math.min(bound, playerGroup.position.x));
      playerGroup.position.z = Math.max(-bound, Math.min(bound, playerGroup.position.z));

      // Exact terrain following — raycast onto actual mesh surface
      // Skip Y override when ghost cloud moon-jump is active
      if (!playerAirborne) {
        const targetY = getExactTerrainY(playerGroup.position.x, playerGroup.position.z);
        const ySmooth = 1 - Math.pow(0.0001, dt);
        smoothedY += (targetY - smoothedY) * ySmooth;
        playerGroup.position.y = smoothedY;
      }

      // Walking animation
      const speed = playerVelocity.length();
      const now = performance.now();
      if (speed > 1.5) {
        const walkCycle = now * 0.008 * Math.min(speed / MOVE_SPEED, 1);
        const bobAmount = Math.min(speed / MOVE_SPEED, 1);

        // Leg stride — alternating forward/back rotation
        legs[0].rotation.x = Math.sin(walkCycle) * 0.4 * bobAmount;
        legs[1].rotation.x = Math.sin(walkCycle + Math.PI) * 0.4 * bobAmount;
        // Offset legs forward/back for stride
        legs[0].position.z = Math.sin(walkCycle) * 0.3 * bobAmount;
        legs[1].position.z = Math.sin(walkCycle + Math.PI) * 0.3 * bobAmount;

        // Body bob — slight vertical bounce synced to footfalls (double frequency)
        body.position.y = 1.7 + Math.abs(Math.sin(walkCycle * 2)) * 0.06 * bobAmount;
        head.position.y = 3.6 + Math.abs(Math.sin(walkCycle * 2 + 0.3)) * 0.04 * bobAmount;

        // Subtle body lean forward when moving
        body.rotation.x = 0.05 * bobAmount;
      } else {
        // Return to idle pose
        legs[0].rotation.x *= 0.85;
        legs[1].rotation.x *= 0.85;
        legs[0].position.z *= 0.85;
        legs[1].position.z *= 0.85;
        body.position.y = 1.7;
        head.position.y = 3.6;
        body.rotation.x *= 0.85;
      }
    }

    // ─────────────────────────────────────────
    //  TIME INDICATOR
    // ─────────────────────────────────────────
    const timeEl = document.getElementById('time-indicator');
    const moonEl = document.getElementById('moon-text');
    const moonHudCanvas = document.getElementById('moon-hud');
    const moonHudCtx = moonHudCanvas.getContext('2d');

    function drawMoonHud(phaseLight, waxing) {
      const s = 24, r = 10, cx = s / 2, cy = s / 2;
      moonHudCtx.clearRect(0, 0, s, s);
      // Draw cratered moon disc (matches sky moon)
      moonHudCtx.fillStyle = '#dddde8';
      moonHudCtx.beginPath();
      moonHudCtx.arc(cx, cy, r, 0, Math.PI * 2);
      moonHudCtx.fill();
      // Craters
      const hudCraters = [[cx-3, cy-2, 2.5], [cx+3, cy+1, 1.8], [cx+1, cy+4, 2], [cx+5, cy-2, 1.2], [cx-4, cy+3, 1.5]];
      for (const [hx, hy, hr] of hudCraters) {
        const grad = moonHudCtx.createRadialGradient(hx, hy, 0, hx, hy, hr);
        grad.addColorStop(0, 'rgba(140,140,155,0.5)');
        grad.addColorStop(1, 'rgba(200,200,210,0)');
        moonHudCtx.fillStyle = grad;
        moonHudCtx.beginPath();
        moonHudCtx.arc(hx, hy, hr, 0, Math.PI * 2);
        moonHudCtx.fill();
      }
      // Phase shadow overlay
      if (phaseLight < 0.95) {
        const coverAmount = 1.0 - phaseLight;
        moonHudCtx.save();
        moonHudCtx.beginPath();
        moonHudCtx.arc(cx, cy, r + 0.5, 0, Math.PI * 2);
        moonHudCtx.clip();
        const shadowDir = waxing ? -1 : 1;
        moonHudCtx.fillStyle = `rgba(10,10,20,${Math.min(coverAmount * 1.1, 0.88)})`;
        moonHudCtx.beginPath();
        moonHudCtx.arc(cx + shadowDir * coverAmount * r * 1.1, cy, r + 1, 0, Math.PI * 2);
        moonHudCtx.fill();
        moonHudCtx.restore();
      }
    }
    function updateTimeDisplay() {
      const hours = Math.floor(timeOfDay * 24);
      const mins = Math.floor((timeOfDay * 24 - hours) * 60);
      const hStr = String(hours).padStart(2, '0');
      const mStr = String(mins).padStart(2, '0');
      let period = '';
      if (timeOfDay > 0.3 && timeOfDay < 0.7) period = 'DAY';
      else if (timeOfDay >= 0.2 && timeOfDay <= 0.3) period = 'DAWN';
      else if (timeOfDay >= 0.7 && timeOfDay <= 0.8) period = 'DUSK';
      else period = 'NIGHT';
      timeEl.textContent = `${hStr}:${mStr}  ${period}${autoCycle ? '' : '  [paused]'}`;

      // Moon phase display — draw matching cratered disc
      const phase = getCurrentMoonPhase();
      const isNightForDisplay = period === 'NIGHT' || period === 'DUSK';
      const waxing = moonPhaseIndex >= 1 && moonPhaseIndex <= 4;
      drawMoonHud(phase.light, waxing);
      moonEl.textContent = `${phase.name}`;
      if (isNightForDisplay) {
        const effAshen = typeof getEffectiveAshenPower === 'function' ? getEffectiveAshenPower() : phase.ashenPower;
        const ashenStr = effAshen < phase.ashenPower
          ? `Ashen ×${effAshen.toFixed(2)} (−${(phase.ashenPower - effAshen).toFixed(2)})`
          : `Ashen ×${effAshen.toFixed(2)}`;
        const ghostStr = ghostActive ? `  Cloud ${ghostBlobCount}/${ghostMaxBlobs}` : '';
        moonEl.textContent += `  |  Dawnkeeper ×${phase.dawnPower.toFixed(2)}  ${ashenStr}${ghostStr}`;
      }
    }

    // ─────────────────────────────────────────
    //  GAME LOOP
    // ─────────────────────────────────────────
    //  WIND VECTOR FIELD
    // ─────────────────────────────────────────
    // Returns wind direction + strength at a world position and time.
    // Uses layered noise for gusts, prevailing direction, local turbulence,
    // and Coriolis-like rotational drift.
    const _windOut = { dx: 0, dy: 0, dz: 0, strength: 0 };
    function getWind(wx, wz, t) {
      // Prevailing wind — very slowly drifting direction (~30 s per shift)
      const prevAngle = simplex2(t * 0.03, 0) * Math.PI;
      const prevStr = 0.8 + simplex2(t * 0.05 + 100, 0) * 0.5;
      // Gust layer — spatial variation with slow temporal drift (~15 s per gust cycle)
      const gustX = simplex2(wx * 0.008 + t * 0.07, wz * 0.008) * 0.6;
      const gustZ = simplex2(wx * 0.008, wz * 0.008 + t * 0.07 + 50) * 0.6;
      // Turbulence — gentle local swirls (~5 s variation, barely perceptible)
      const turbX = simplex2(wx * 0.03 + t * 0.22, wz * 0.03 + 300) * 0.14;
      const turbZ = simplex2(wx * 0.03 + 400, wz * 0.03 + t * 0.22) * 0.14;

      let bx = Math.cos(prevAngle) * prevStr + gustX + turbX;
      let bz = Math.sin(prevAngle) * prevStr + gustZ + turbZ;

      // Coriolis-like drift: slowly rotates the whole field, ~60s period
      const corAngle = t * 0.017; // ~0.06 rad/s ≈ full rotation in ~105s
      const corStr = 0.06;
      const cosC = Math.cos(corAngle), sinC = Math.sin(corAngle);
      bx += (-bz * sinC) * corStr;
      bz += ( bx * sinC) * corStr;

      _windOut.dx = bx;
      _windOut.dz = bz;
      _windOut.dy = 0; // base getWind stays 2D for tree sway
      _windOut.strength = Math.sqrt(bx * bx + bz * bz);
      return _windOut;
    }

    // ─────────────────────────────────────────
    //  3D DEBUG WIND — fully volumetric
    //  Called with a world-space (wx, wy, wz) sample point.
    //  Models:
    //   • Logarithmic boundary layer  — wind near-zero at ground, full speed aloft
    //   • Terrain-slope updrafts/downdrafts — wind flows OVER terrain, not along it
    //   • Hard structures (walls/buildings) — 3D blocking + updraft windward,
    //       downdraft leeward, vortex shedding at wake edges
    //   • Soft structures (trees) — canopy fade above tree top, updraft at canopy
    //       crown, boundary turbulence, forest-edge channeling
    // ─────────────────────────────────────────
    const _wdbgOut = { dx: 0, dy: 0, dz: 0, strength: 0 };
    function getWindDebug(wx, wy, wz, t) {
      // ── 1. Height above local ground ────────────────────────────────────
      const groundY = getTerrainY(wx, wz);
      const hag = Math.max(0.05, wy - groundY); // height above ground (world units)

      // ── 2. Logarithmic wind-speed profile ───────────────────────────────
      // Modeled after the atmospheric surface layer:  U(z) ∝ ln(z/z0)
      // z0 ≈ 1.5 — aerodynamic roughness for mixed terrain/forest
      // Normalised so hf ≈ 1 at 20 units above ground, ≈ 0 at surface.
      const z0  = 1.5;
      const href = 20;
      const hf  = Math.min(Math.log(1 + hag / z0) / Math.log(1 + href / z0), 1.8);

      // ── 3. Base horizontal wind (same noise as getWind, height-scaled) ──
      const prevAngle = simplex2(t * 0.03, 0) * Math.PI;
      const prevStr   = (0.5 + simplex2(t * 0.05 + 100, 0) * 0.3) * hf;
      const gustX = simplex2(wx * 0.008 + t * 0.07, wz * 0.008) * 0.38 * hf;
      const gustZ = simplex2(wx * 0.008, wz * 0.008 + t * 0.07 + 50) * 0.38 * hf;
      const turbX = simplex2(wx * 0.03 + t * 0.22, wz * 0.03 + 300) * 0.14;
      const turbZ = simplex2(wx * 0.03 + 400, wz * 0.03 + t * 0.22) * 0.14;
      let dx = Math.cos(prevAngle) * prevStr + gustX + turbX;
      let dz = Math.sin(prevAngle) * prevStr + gustZ + turbZ;

      // ── 4. Terrain-induced vertical component ───────────────────────────
      // Wind hitting an upslope creates an updraft; downslope creates a downdraft.
      // Effect decays exponentially with altitude (strong near surface).
      const eps  = 1.5;
      const slopeX = (getTerrainY(wx + eps, wz) - groundY) / eps; // dh/dx
      const slopeZ = (getTerrainY(wx, wz + eps) - groundY) / eps; // dh/dz
      const upliftDecay = Math.exp(-hag * 0.18);
      let dy = -(dx * slopeX + dz * slopeZ) * 0.4 * upliftDecay;

      // Weak atmospheric background vertical motion (thermals / subsidence)
      dy += simplex2(wx * 0.006 + t * 0.04, wz * 0.006 + 500) * 0.10;

      // ── 5. Object influencers ────────────────────────────────────────────
      let blocked = false, turbulent = false;

      for (let i = 0; i < windInfluencers.length; i++) {
        const inf = windInfluencers[i];

        // Fast 2D horizontal reject
        const ddx = wx - inf.x, ddz = wz - inf.z;
        const distSq = ddx * ddx + ddz * ddz;
        const effectR = inf.radius * 2.5;
        if (distSq > effectR * effectR) continue;
        const dist  = Math.sqrt(distSq);
        const f2d = Math.max(0, 1 - dist / effectR);

        // Vertical zone: how far above the structure top are we?
        const infTop = inf.groundY + inf.height;
        const relY   = wy - infTop; // < 0 = inside/below structure height

        {
          // ── Tree canopy — acts as a turbulent barrier ──────────────────
          // Inside canopy: heavy damping + outward repulsion from trunk.
          // Canopy edge: strong turbulent deflection around the tree.
          // Above canopy: rapid falloff so open sky is unaffected.
          const canopyF = relY < 0
            ? 1.0
            : Math.exp(-relY / (inf.height * 0.2 + 0.3));
          if (canopyF < 0.03) continue;

          const invD = 1 / (dist + 0.0001);
          // Outward direction from trunk
          const outX = ddx * invD, outZ = ddz * invD;
          // Perpendicular (tangential around trunk)
          const perpX = -ddz * invD, perpZ = ddx * invD;

          // Inside canopy radius: heavy wind kill + outward push (barrier)
          const blockStr = f2d * f2d * inf.strength * canopyF;
          // Kill 90% of incoming wind deep inside canopy
          const damp = 1 - blockStr * 0.90;
          dx *= damp;
          dz *= damp;

          // Repel wind outward from trunk — makes arrows push away from tree
          const repulse = blockStr * 1.8;
          dx += outX * repulse;
          dz += outZ * repulse;

          // Boundary turbulence peaks at canopy edge (f2d ≈ 0.5)
          const edgeFalloff = f2d * (1 - f2d) * 4;
          const tSwirl = simplex2(wx * 0.22 + t * 0.4 + 77, wz * 0.22) * 0.6;
          dx += perpX * edgeFalloff * 0.5 * inf.strength * canopyF;
          dz += perpZ * edgeFalloff * 0.5 * inf.strength * canopyF;
          dx += tSwirl * edgeFalloff * 0.35 * canopyF;
          dz += tSwirl * edgeFalloff * 0.35 * canopyF;

          // Updraft at canopy crown — wind forced up and over
          if (relY > -inf.height * 0.5 && relY < inf.height * 0.5) {
            dy += f2d * inf.strength * 0.6 * canopyF;
          }

          if (edgeFalloff > 0.35 || blockStr > 0.3) turbulent = true;
        }
      }

      // ── 6. Wall inward pull + building attractor ─────────────────────
      // Near wall faces, wind is drawn inward (through the wall toward building
      // center).  Further out, a radial pull toward the building center dominates.
      // Both effects use the same "attracted" flag for debug coloring.
      let attracted = false;

      // 6a. Face-based inward pull — strongest right at the wall surface
      const FACE_PULL_DIST = 10.0;
      for (let fi = 0; fi < windFaces.length; fi++) {
        const face = windFaces[fi];
        const fdx = wx - face.cx, fdz = wz - face.cz;
        // Perpendicular distance from face plane (positive = outside)
        const perpDist = fdx * face.nx + fdz * face.nz;
        if (perpDist < -2 || perpDist > FACE_PULL_DIST) continue;

        // Lateral extent check
        const tanX = -face.nz, tanZ = face.nx;
        const lateralDist = Math.abs(fdx * tanX + fdz * tanZ);
        const lateralF = Math.max(0, 1 - Math.max(0, lateralDist - face.halfExtent) / 4.0);
        if (lateralF < 0.01) continue;

        // Vertical extent
        const fRelY = wy - (face.groundY + face.height);
        const vf = fRelY < 0 ? 1.0 : Math.exp(-fRelY * fRelY / (face.height * face.height * 0.5 + 1));
        if (vf < 0.03) continue;

        // Pull strength: strong close to wall, fading with distance
        const distNorm = Math.max(0, perpDist) / FACE_PULL_DIST;
        const pullF = (1 - distNorm) * (1 - distNorm) * lateralF * vf;
        // Pull INTO the wall (opposite to outward normal)
        const pullMag = pullF * 3.0;
        dx -= face.nx * pullMag;
        dz -= face.nz * pullMag;
        if (pullF > 0.15) attracted = true;
      }

      // 6b. Building center attractor — radial pull from further out
      // Effect decays with height above building so upper layers see prevailing wind.
      // Buildings also create a strong downward suction above their roofline,
      // pulling smoke from the sky down into the building (chimney effect).
      const BLDG_ATTRACT_RANGE = 25.0;
      const BLDG_CHIMNEY_HEIGHT = 50.0; // suction zone extends ~1 building height above roof
      const BLDG_CHIMNEY_PULL = 18.0;    // downward pull strength
      const BLDG_CHIMNEY_HORIZ = 6.0;   // horizontal radius of chimney suction
      for (let bi = 0; bi < buildingAttractors.length; bi++) {
        const ba = buildingAttractors[bi];
        const adx = ba.x - wx, adz = ba.z - wz;
        const ad2 = adx * adx + adz * adz;
        if (ad2 > BLDG_ATTRACT_RANGE * BLDG_ATTRACT_RANGE) continue;
        const ad = Math.sqrt(ad2);
        if (ad < 0.5) continue;
        // Height above building top — attractor fades out above roofline
        const roofTop = ba.y + ba.r;
        const aboveRoof = Math.max(0, wy - roofTop);
        const heightFade = 1.0 / (1.0 + aboveRoof * aboveRoof * 0.08);
        if (heightFade < 0.03) continue;
        const proximity = 1.0 - ad / BLDG_ATTRACT_RANGE;
        // Cubic ramp — gentle far out, very strong close, scaled by height
        const pullStr = proximity * proximity * proximity * 3.5 * heightFade;
        const invAd = 1.0 / ad;
        dx += adx * invAd * pullStr;
        dz += adz * invAd * pullStr;
        // Updraft near building (only near roofline)
        const vertDist = Math.abs(wy - ba.y);
        if (vertDist < 8) dy += proximity * 0.5 * heightFade;

        // ── Chimney suction: strong downward pull above roofline ──
        // Pulls smoke from the sky down into the building.
        // Active within a narrow column above the roof, fading with horizontal distance
        // and with height above the chimney zone ceiling.
        if (aboveRoof > 0 && ad < BLDG_CHIMNEY_HORIZ) {
          const horizF = 1.0 - ad / BLDG_CHIMNEY_HORIZ; // 1 at center, 0 at edge
          // Vertical envelope: strongest just above roof, fades at chimney top
          const chimneyF = aboveRoof < BLDG_CHIMNEY_HEIGHT
            ? 1.0 - (aboveRoof / BLDG_CHIMNEY_HEIGHT) * 0.5 // gentle fade within zone
            : Math.exp(-(aboveRoof - BLDG_CHIMNEY_HEIGHT) * 0.3); // rapid falloff above
          const suctionStr = horizF * horizF * chimneyF * BLDG_CHIMNEY_PULL;
          dy -= suctionStr; // pull DOWN
          // Also pull horizontally toward building center within chimney zone
          dx += adx * invAd * suctionStr * 0.4;
          dz += adz * invAd * suctionStr * 0.4;
        }

        if (proximity > 0.25 && heightFade > 0.2) attracted = true;
      }

      const strength = Math.sqrt(dx * dx + dy * dy + dz * dz);
      _wdbgOut.dx = dx; _wdbgOut.dy = dy; _wdbgOut.dz = dz;
      _wdbgOut.strength = strength;
      return _wdbgOut;
    }

    let windTime = 0;
    let _windBatch = 0;
    const WIND_BATCH_SIZE = 200; // update ~200 trees per frame, cycle through all
    function updateWind(dt) {
      windTime += dt;
      const len = windTrees.length;
      if (len === 0) return;
      const end = Math.min(_windBatch + WIND_BATCH_SIZE, len);
      for (let i = _windBatch; i < end; i++) {
        const wt = windTrees[i];
        const w = getWind(wt.wx, wt.wz, windTime + wt.phase);
        const lean = w.strength * wt.flex * 2.0;
        const sway = Math.sin(windTime * 1.8 + wt.phase) * 0.3 * wt.flex;
        wt.group.rotation.x = w.dz * lean + sway;
        wt.group.rotation.z = -w.dx * lean;
      }
      _windBatch = end >= len ? 0 : end;
    }

    // ─────────────────────────────────────────
    //  3D WIND DEBUG FIELD (toggle V)
    //  All arrows are the same fixed size.  Color encodes wind magnitude:
    //    dim blue   — calm / near-zero
    //    cyan       — light breeze
    //    green      — moderate
    //    yellow     — strong
    //    red        — very strong / attractor zone
    //  3 dynamic layers track the player height.
    // ─────────────────────────────────────────

    // V cycles: off → local → medium → wide → off.
    // Level 1: tight local grid, small arrows — see nearby wall/building effects
    // Level 2: medium range
    // Level 3: wide overview
    const WIND_DBG_MAX_LAYERS = 10;
    let windDbgLayerCount = 1; // current layer count, adjustable with up/down arrows
    const WIND_DBG_LEVELS = [
      null,
      { grid: 18, spacing: 1.6, arrowLen: 0.8 },
      { grid: 18, spacing: 5, arrowLen: 1.5 },
      { grid: 18, spacing: 9, arrowLen: 3 },
    ];
    // Max total arrows = 18×18×10 = 3240
    const WIND_DBG_MAX_ARROWS = 18 * 18 * WIND_DBG_MAX_LAYERS;

    let windDebugLevel = 0;

    const windDebugGroup = new THREE.Group();
    scene.add(windDebugGroup);

    // Pre-allocate all arrows at maximum count; hide unused ones each update.
    const windDebugArrows = [];
    const _dbgDir0 = new THREE.Vector3(1, 0, 0);
    for (let i = 0; i < WIND_DBG_MAX_ARROWS; i++) {
      const arrow = new THREE.ArrowHelper(
        _dbgDir0.clone(), new THREE.Vector3(), 2.5, 0x44ffee, 0.7, 0.35
      );
      arrow.line.material.transparent = true;
      arrow.cone.material.transparent = true;
      arrow.visible = false;
      windDebugGroup.add(arrow);
      windDebugArrows.push(arrow);
    }

    let _windDbgTimer = 0;
    const _dbgDirV = new THREE.Vector3();
    const _dbgCol  = new THREE.Color();

    function updateWindDebug(dt) {
      if (windDebugLevel === 0) return;
      _windDbgTimer += dt;
      // Refresh budget scales with arrow count (more layers = less frequent updates)
      const baseRate = windDebugLevel === 3 ? 0.5 : windDebugLevel === 2 ? 0.35 : 0.25;
      const refreshRate = baseRate + (windDbgLayerCount - 1) * 0.05;
      if (_windDbgTimer < refreshRate) return;
      _windDbgTimer = 0;

      const lvl = WIND_DBG_LEVELS[windDebugLevel];
      const grid = lvl.grid, spacing = lvl.spacing, arrowLen = lvl.arrowLen;
      const px = playerGroup.position.x;
      const py = playerGroup.position.y;
      const pz = playerGroup.position.z;
      const half = (grid - 1) * spacing * 0.5;
      const perLayer = grid * grid;
      const layerCount = windDbgLayerCount;
      const activeCount = perLayer * layerCount;

      // Player height above terrain
      const playerGndY = getTerrainY(px, pz);
      const playerHAG = Math.max(0, py - playerGndY);

      // Layer 0 = terrain level (+0.5)
      // Layer 1..N = stacked above the player's head, each +5 units apart
      const LAYER_SPACING = 5;
      const layerOffsets = [0.5];
      for (let li = 1; li < layerCount; li++) {
        layerOffsets.push(playerHAG + 2.0 + (li - 1) * LAYER_SPACING);
      }

      // Fixed arrow dimensions
      const headLen = arrowLen * 0.28;
      const headW   = arrowLen * 0.14;

      for (let li = 0; li < layerCount; li++) {
        const heightOffset = layerOffsets[li];
        // Higher layers progressively more transparent
        const opacity = Math.max(0.25, 0.90 - li * 0.07);

        for (let gi = 0; gi < grid; gi++) {
          for (let gj = 0; gj < grid; gj++) {
            const wx  = px + gi * spacing - half;
            const wz  = pz + gj * spacing - half;
            const wy  = getTerrainY(wx, wz) + heightOffset;

            const w   = getWindDebug(wx, wy, wz, windTime);
            const str = w.strength;

            const arrow = windDebugArrows[li * perLayer + gi * grid + gj];
            arrow.visible = true;
            arrow.position.set(wx, wy, wz);

            arrow.line.material.opacity = opacity;
            arrow.cone.material.opacity = opacity;

            // Direction — straight up as calm sentinel
            if (str > 0.01) {
              _dbgDirV.set(w.dx / str, w.dy / str, w.dz / str);
            } else {
              _dbgDirV.set(0, 1, 0);
            }
            arrow.setDirection(_dbgDirV);

            // Fixed arrow size — color carries magnitude info
            arrow.setLength(arrowLen, headLen, headW);

            // Color: magnitude gradient  dim blue → cyan → green → yellow → red
            // str typically 0..2+, clamp to 0..2 for color mapping
            const t01 = Math.min(str / 2.0, 1.0);
            let r, g, b;
            if (t01 < 0.25) {
              // dim blue → cyan
              const f = t01 / 0.25;
              r = 0.10; g = 0.15 + f * 0.65; b = 0.45 + f * 0.55;
            } else if (t01 < 0.5) {
              // cyan → green
              const f = (t01 - 0.25) / 0.25;
              r = 0.05; g = 0.80 + f * 0.20; b = 1.0 - f * 0.85;
            } else if (t01 < 0.75) {
              // green → yellow
              const f = (t01 - 0.5) / 0.25;
              r = f * 1.0; g = 1.0; b = 0.15 - f * 0.10;
            } else {
              // yellow → red
              const f = (t01 - 0.75) / 0.25;
              r = 1.0; g = 1.0 - f * 0.85; b = 0.05;
            }
            _dbgCol.setRGB(r, g, b);
            arrow.setColor(_dbgCol);
          }
        }
      }

      // Hide arrows beyond the active set (level changed or just turned on)
      for (let i = activeCount; i < WIND_DBG_MAX_ARROWS; i++) {
        windDebugArrows[i].visible = false;
      }
    }

    // ─────────────────────────────────────────
    //  FACE-NORMAL DEBUG (toggle F)
    //  Shows one cyan arrow per registered windFace, pointing outward from
    //  the face centroid at mid-height.  Lets you see exactly what geometry
    //  the wind physics is operating on.
    // ─────────────────────────────────────────
    let faceDebugVisible = false;
    const windFaceGroup = new THREE.Group();
    scene.add(windFaceGroup);

    // ─────────────────────────────────────────
    //  COLLISION BOX DEBUG (toggle B)
    //  Draws wireframe oriented bounding boxes for every collision box.
    // ─────────────────────────────────────────
    let collisionDebugVisible = false;
    const collisionDebugGroup = new THREE.Group();
    scene.add(collisionDebugGroup);

    function buildCollisionDebugBoxes() {
      // Clear previous
      while (collisionDebugGroup.children.length > 0) {
        const child = collisionDebugGroup.children[0];
        child.geometry?.dispose();
        child.material?.dispose();
        collisionDebugGroup.remove(child);
      }
      if (!collisionDebugVisible) return;

      const mat = new THREE.LineBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.8, depthTest: false });

      for (const b of collisionBoxes) {
        // Full-width and full-depth (hw/hd are half extents)
        const geo = new THREE.BoxGeometry(b.hw * 2, 6, b.hd * 2);
        const wireframe = new THREE.LineSegments(
          new THREE.EdgesGeometry(geo),
          mat
        );
        geo.dispose();
        const gy = getTerrainY(b.cx, b.cz);
        wireframe.position.set(b.cx, gy + 3, b.cz);
        wireframe.rotation.y = Math.atan2(b.sinR, b.cosR);
        collisionDebugGroup.add(wireframe);
      }
    }

    function buildFaceDebugArrows() {
      // Dispose and remove previous arrows
      while (windFaceGroup.children.length > 0) {
        const child = windFaceGroup.children[0];
        child.line?.geometry.dispose();
        child.cone?.geometry.dispose();
        windFaceGroup.remove(child);
      }
      if (!faceDebugVisible) return;
      const dir = new THREE.Vector3();
      for (const face of windFaces) {
        dir.set(face.nx, 0, face.nz);
        const origin = new THREE.Vector3(face.cx, face.groundY + face.height * 0.5, face.cz);
        const arrow = new THREE.ArrowHelper(dir, origin, 3.5, 0x00ffff, 0.9, 0.45);
        arrow.line.material.transparent = true;
        arrow.line.material.opacity = 0.85;
        arrow.cone.material.transparent = true;
        arrow.cone.material.opacity = 0.85;
        windFaceGroup.add(arrow);
      }
    }

    // ─────────────────────────────────────────
    //  SMOKE PARTICLE SYSTEM
    //  CPU-simulated particles that rise with thermal buoyancy, then
    //  get progressively carried by the 3D wind field.
    //  Uses a struct-of-arrays layout for cache-friendly iteration.
    // ─────────────────────────────────────────
    const SMOKE_MAX = 1600;
    const INITIAL_SMOKE_SPREAD_DISTANCE = 6;

    // CPU state — one typed array per property
    const _sx  = new Float32Array(SMOKE_MAX); // world position
    const _sy  = new Float32Array(SMOKE_MAX);
    const _sz  = new Float32Array(SMOKE_MAX);
    const _svx = new Float32Array(SMOKE_MAX); // velocity
    const _svy = new Float32Array(SMOKE_MAX);
    const _svz = new Float32Array(SMOKE_MAX);
    const _sli = new Float32Array(SMOKE_MAX); // normalised life [0=fresh, 1=dead]
    const _sml = new Float32Array(SMOKE_MAX); // max lifetime (seconds)
    const _ssi = new Float32Array(SMOKE_MAX); // spawn size scale
    const _sac = new Uint8Array(SMOKE_MAX);   // active flag

    // GPU buffers (written each frame for active particles)
    const _gPos  = new Float32Array(SMOKE_MAX * 3);
    const _gSz   = new Float32Array(SMOKE_MAX);
    const _gAlph = new Float32Array(SMOKE_MAX);
    const _gLife = new Float32Array(SMOKE_MAX);

    const smokeGeo = new THREE.BufferGeometry();
    smokeGeo.setAttribute('position', new THREE.BufferAttribute(_gPos,  3).setUsage(THREE.DynamicDrawUsage));
    smokeGeo.setAttribute('pSize',    new THREE.BufferAttribute(_gSz,   1).setUsage(THREE.DynamicDrawUsage));
    smokeGeo.setAttribute('pAlpha',   new THREE.BufferAttribute(_gAlph, 1).setUsage(THREE.DynamicDrawUsage));
    smokeGeo.setAttribute('pLife',    new THREE.BufferAttribute(_gLife, 1).setUsage(THREE.DynamicDrawUsage));

    const smokeMat = new THREE.ShaderMaterial({
      uniforms: {
        uNightGlow: { value: 0.0 }
      },
      vertexShader: `
        attribute float pSize;
        attribute float pAlpha;
        attribute float pLife;
        varying float vAlpha;
        varying float vLife;
        varying float vHash;
        void main() {
          vAlpha = pAlpha;
          vLife  = pLife;
          // Derive a stable per-particle hash from world position
          vHash  = fract(sin(dot(position.xz, vec2(127.1, 311.7))) * 43758.5453);
          vec4 mv = modelViewMatrix * vec4(position, 1.0);
          gl_PointSize = pSize * projectionMatrix[1][1] * 380.0 / (-mv.z);
          gl_Position  = projectionMatrix * mv;
        }
      `,
      fragmentShader: `
        uniform float uNightGlow;
        varying float vAlpha;
        varying float vLife;
        varying float vHash;

        vec3 hsv2rgb(vec3 c) {
          vec4 K = vec4(1.0, 2.0/3.0, 1.0/3.0, 3.0);
          vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
          return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
        }

        void main() {
          vec2 c = gl_PointCoord - 0.5;
          float r = length(c) * 2.0;
          if (r > 1.0) discard;

          // --- Day: standard smoke ---
          float dayA = vAlpha * (1.0 - smoothstep(0.20, 1.0, r));
          vec3 dayCol = mix(vec3(0.94, 0.90, 0.84), vec3(0.66, 0.67, 0.72), vLife);

          // --- Night: neon ethereal magic ---
          // Hue distribution: mostly deep blue/violet, rare green
          // vHash 0-0.88 → blue-violet-magenta range, 0.88-1.0 → rare green
          float hue;
          if (vHash > 0.88) {
            hue = 0.28 + (vHash - 0.88) * 1.5; // 0.28-0.46 green-teal range
          } else {
            hue = 0.58 + (vHash / 0.88) * 0.30; // 0.58-0.88 blue→violet→magenta
          }
          // High saturation that pops early, stays vivid
          float sat = 1.0 - vLife * 0.12; // 1.0 → 0.88 — stays punchy
          float val = 1.0;
          vec3 neonBase = hsv2rgb(vec3(hue, sat, val));

          // Core: tinted, not white — saturated color all the way through
          float coreFade = smoothstep(0.0, 0.4, r);
          vec3 tintedCore = neonBase * 1.3; // brighter version of same hue
          tintedCore = min(tintedCore, vec3(1.0)); // clamp
          vec3 neonCol = mix(tintedCore, neonBase, coreFade);

          // Glow: bright core + soft outer halo
          float innerA = 1.0 - smoothstep(0.0, 0.5, r);
          float outerA = (1.0 - smoothstep(0.3, 1.0, r)) * 0.6;
          float neonA  = (innerA + outerA) * (0.6 + vAlpha * 0.6);
          neonA *= (1.0 - vLife * 0.3);

          // --- Blend ---
          vec3  col = mix(dayCol, neonCol, uNightGlow);
          float a   = mix(dayA, neonA, uNightGlow);
          gl_FragColor = vec4(col, a);
        }
      `,
      transparent: true,
      depthWrite:  false,
      blending:    THREE.NormalBlending,
    });

    const smokePoints = new THREE.Points(smokeGeo, smokeMat);
    smokePoints.frustumCulled = false;
    smokePoints.renderOrder = 2; // terrain(0) → water(1) → smoke(2)
    scene.add(smokePoints);

    // ─────────────────────────────────────────
    //  CHIMNEY SMOKE — white wisps from bakeries / hearths during daytime
    // ─────────────────────────────────────────
    const CHIM_MAX = 200;
    const _cx = new Float32Array(CHIM_MAX);
    const _cy = new Float32Array(CHIM_MAX);
    const _cz = new Float32Array(CHIM_MAX);
    const _cvx = new Float32Array(CHIM_MAX);
    const _cvy = new Float32Array(CHIM_MAX);
    const _cvz = new Float32Array(CHIM_MAX);
    const _cli = new Float32Array(CHIM_MAX); // life 0→1
    const _cml = new Float32Array(CHIM_MAX); // max life
    const _cac = new Uint8Array(CHIM_MAX);
    const _cgP = new Float32Array(CHIM_MAX * 3);
    const _cgS = new Float32Array(CHIM_MAX);
    const _cgA = new Float32Array(CHIM_MAX);
    let _chimHead = 0;

    const chimGeo = new THREE.BufferGeometry();
    chimGeo.setAttribute('position', new THREE.BufferAttribute(_cgP, 3).setUsage(THREE.DynamicDrawUsage));
    chimGeo.setAttribute('pSize',    new THREE.BufferAttribute(_cgS, 1).setUsage(THREE.DynamicDrawUsage));
    chimGeo.setAttribute('pAlpha',   new THREE.BufferAttribute(_cgA, 1).setUsage(THREE.DynamicDrawUsage));

    const chimMat = new THREE.ShaderMaterial({
      vertexShader: `
        attribute float pSize;
        attribute float pAlpha;
        varying float vAlpha;
        void main() {
          vAlpha = pAlpha;
          vec4 mv = modelViewMatrix * vec4(position, 1.0);
          gl_PointSize = pSize * projectionMatrix[1][1] * 380.0 / (-mv.z);
          gl_Position  = projectionMatrix * mv;
        }
      `,
      fragmentShader: `
        uniform float uDimFactor;
        varying float vAlpha;
        void main() {
          vec2 c = gl_PointCoord - 0.5;
          float r = length(c) * 2.0;
          if (r > 1.0) discard;
          float a = vAlpha * (1.0 - smoothstep(0.15, 1.0, r)) * uDimFactor;
          // Darken color at night so it blends with dark sky
          float grey = mix(0.35, 0.92, uDimFactor);
          gl_FragColor = vec4(grey, grey * 0.98, grey * 0.96, a);
        }
      `,
      uniforms: {
        uDimFactor: { value: 1.0 },
      },
      transparent: true,
      depthWrite: false,
      blending: THREE.NormalBlending,
    });

    const chimPoints = new THREE.Points(chimGeo, chimMat);
    chimPoints.frustumCulled = false;
    chimPoints.renderOrder = 2;
    scene.add(chimPoints);

    let _chimSpawnT = 0;
    function updateChimneySmoke(dt) {
      if (!smokeVisible) return;
      // Only emit during daytime (dawn through dusk)
      const dayActive = timeOfDay > 0.28 && timeOfDay < 0.72;

      // Dim chimney smoke at night — smoothly fade opacity and darken color
      // Day (0.3-0.7) = full, transitions (0.2-0.3, 0.7-0.8) = fade, night = very dim
      let chimDim;
      if (timeOfDay > 0.3 && timeOfDay < 0.7) chimDim = 1.0;
      else if (timeOfDay >= 0.25 && timeOfDay <= 0.3) chimDim = (timeOfDay - 0.25) / 0.05;
      else if (timeOfDay >= 0.7 && timeOfDay <= 0.75) chimDim = 1.0 - (timeOfDay - 0.7) / 0.05;
      else chimDim = 0.12; // very faint at night
      chimMat.uniforms.uDimFactor.value = chimDim;

      // Spawn — all non-contaminated homes emit chimney smoke.
      // Emission rate scales with charge: uncharged = gentle wisps, fully charged = thick plumes.
      // Hearth score adds a bonus on top.
      _chimSpawnT += dt;
      if (dayActive && _chimSpawnT >= 0.10) {
        _chimSpawnT = 0;
        for (let bi = 0; bi < buildingAttractors.length; bi++) {
          const b = buildingAttractors[bi];
          if (b.contaminated || b.destroyed) continue;
          // Base emission from charge (0..1), plus hearth bonus
          const emitStr = 0.15 + b.charge * 0.65 + (b.hearth || 0) * 0.2;
          // Emission probability scales with emit strength
          if (Math.random() > emitStr * 0.4) continue;
          const ci = _chimHead;
          _chimHead = (_chimHead + 1) % CHIM_MAX;
          _cx[ci] = b.x + (Math.random() - 0.5) * 0.6;
          _cy[ci] = b.roofY + 0.5 + Math.random() * 0.3;
          _cz[ci] = b.z + (Math.random() - 0.5) * 0.6;
          _cvx[ci] = (Math.random() - 0.5) * 0.3;
          _cvy[ci] = (0.3 + emitStr * 0.7) + Math.random() * 0.4;
          _cvz[ci] = (Math.random() - 0.5) * 0.3;
          _cli[ci] = 0;
          _cml[ci] = 3.0 + emitStr * 4.0 + Math.random() * 3.0;
          _cac[ci] = 1;
          _cgS[ci] = (0.2 + emitStr * 0.5); // start size scales with emission
        }
      }

      // Update particles
      const groundRef = getTerrainY(playerGroup.position.x, playerGroup.position.z);
      for (let i = 0; i < CHIM_MAX; i++) {
        const pi3 = i * 3;
        if (!_cac[i]) { _cgS[i] = 0; _cgA[i] = 0; continue; }
        _cli[i] += dt / _cml[i];
        if (_cli[i] >= 1.0) { _cac[i] = 0; _cgS[i] = 0; _cgA[i] = 0; continue; }
        const life = _cli[i];
        // Wind
        const w = windForSmoke(_cx[i], _cz[i], _cy[i], groundRef, windTime);
        const drag = Math.min(life * 1.5, 1.0);
        _cvx[i] += (w.dx * 3.5 - _cvx[i]) * drag * dt * 1.5;
        _cvz[i] += (w.dz * 3.5 - _cvz[i]) * drag * dt * 1.5;
        // Gentle rise that fades
        const buoy = Math.max(0, 1.0 - life * 2.0) * 0.4;
        _cvy[i] += (buoy - _cvy[i]) * 2.0 * dt;
        _cvy[i] = Math.max(_cvy[i], -0.02);
        _cx[i] += _cvx[i] * dt;
        _cy[i] += _cvy[i] * dt;
        _cz[i] += _cvz[i] * dt;
        // Opacity — hotter hearths produce denser, more visible plumes
        const fadeIn  = Math.min(life * 10.0, 1.0);
        const fadeOut = 1.0 - Math.pow(Math.max(0, (life - 0.4) / 0.6), 1.5);
        _cgA[i] = fadeIn * fadeOut * 0.40;
        // Size grows as it disperses (initial size was set at spawn based on hearth)
        _cgS[i] += dt * 0.35;
        _cgP[pi3]   = _cx[i];
        _cgP[pi3+1] = _cy[i];
        _cgP[pi3+2] = _cz[i];
      }
      chimGeo.attributes.position.needsUpdate = true;
      chimGeo.attributes.pSize.needsUpdate    = true;
      chimGeo.attributes.pAlpha.needsUpdate   = true;
    }

    // ─────────────────────────────────────────
    //  SMOKE TRAILS — static glowing dots left behind moving smoke
    // ─────────────────────────────────────────
    const TRAIL_MAX = 4000;
    const _tPos  = new Float32Array(TRAIL_MAX * 3);
    const _tSz   = new Float32Array(TRAIL_MAX);
    const _tAlph = new Float32Array(TRAIL_MAX);
    const _tLife = new Float32Array(TRAIL_MAX); // 0=fresh, 1=dead
    const _tMaxL = new Float32Array(TRAIL_MAX); // max lifetime
    const _tAc   = new Uint8Array(TRAIL_MAX);
    let _trailHead = 0;

    const trailGeo = new THREE.BufferGeometry();
    trailGeo.setAttribute('position', new THREE.BufferAttribute(_tPos,  3).setUsage(THREE.DynamicDrawUsage));
    trailGeo.setAttribute('pSize',    new THREE.BufferAttribute(_tSz,   1).setUsage(THREE.DynamicDrawUsage));
    trailGeo.setAttribute('pAlpha',   new THREE.BufferAttribute(_tAlph, 1).setUsage(THREE.DynamicDrawUsage));
    trailGeo.setAttribute('pLife',    new THREE.BufferAttribute(_tLife, 1).setUsage(THREE.DynamicDrawUsage));

    const trailMat = new THREE.ShaderMaterial({
      uniforms: {
        uNightGlow: smokeMat.uniforms.uNightGlow // share the same uniform object
      },
      vertexShader: `
        attribute float pSize;
        attribute float pAlpha;
        attribute float pLife;
        varying float vAlpha;
        varying float vLife;
        varying float vHash;
        void main() {
          vAlpha = pAlpha;
          vLife  = pLife;
          vHash  = fract(sin(dot(position.xz, vec2(127.1, 311.7))) * 43758.5453);
          vec4 mv = modelViewMatrix * vec4(position, 1.0);
          gl_PointSize = pSize * projectionMatrix[1][1] * 380.0 / (-mv.z);
          gl_Position  = projectionMatrix * mv;
        }
      `,
      fragmentShader: `
        uniform float uNightGlow;
        varying float vAlpha;
        varying float vLife;
        varying float vHash;

        vec3 hsv2rgb(vec3 c) {
          vec4 K = vec4(1.0, 2.0/3.0, 1.0/3.0, 3.0);
          vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
          return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
        }

        void main() {
          vec2 c = gl_PointCoord - 0.5;
          float r = length(c) * 2.0;
          if (r > 1.0) discard;

          // Day: faint wispy grey
          float dayA = vAlpha * (1.0 - smoothstep(0.1, 0.8, r)) * 0.3;
          vec3 dayCol = vec3(0.75, 0.74, 0.72);

          // Night: soft neon glow dot — same hue distribution as smoke
          float hue;
          if (vHash > 0.88) {
            hue = 0.28 + (vHash - 0.88) * 1.5;
          } else {
            hue = 0.58 + (vHash / 0.88) * 0.30;
          }
          vec3 neonCol = hsv2rgb(vec3(hue, 1.0, 1.0));
          // Softer falloff for dreamy trail look
          float neonA = vAlpha * (1.0 - smoothstep(0.0, 0.3, r));
          neonA *= (1.0 - vLife * 0.6);

          vec3  col = mix(dayCol, neonCol, uNightGlow);
          float a   = mix(dayA, neonA, uNightGlow);
          gl_FragColor = vec4(col, a);
        }
      `,
      transparent: true,
      depthWrite: false,
      blending: THREE.NormalBlending,
    });

    const trailPoints = new THREE.Points(trailGeo, trailMat);
    trailPoints.frustumCulled = false;
    trailPoints.renderOrder = 1; // behind main smoke
    scene.add(trailPoints);

    // Smoke glow lights — smoothly track particles, pulsate between colors
    const SMOKE_LIGHT_COUNT = 4;
    const smokeLights = [];
    const _smokeLightHSL = { h: 0, s: 0, l: 0 };
    const _slTracked = new Int32Array(SMOKE_LIGHT_COUNT).fill(-1); // tracked particle index
    const _slHue     = new Float32Array(SMOKE_LIGHT_COUNT); // current hue
    const _slIntensity = new Float32Array(SMOKE_LIGHT_COUNT); // smoothed intensity
    const _slPosX    = new Float32Array(SMOKE_LIGHT_COUNT);
    const _slPosY    = new Float32Array(SMOKE_LIGHT_COUNT);
    const _slPosZ    = new Float32Array(SMOKE_LIGHT_COUNT);
    for (let i = 0; i < SMOKE_LIGHT_COUNT; i++) {
      const pl = new THREE.PointLight(0x6644ff, 0, 25, 2);
      pl.visible = false;
      scene.add(pl);
      smokeLights.push(pl);
    }

    // HSV→RGB helper (CPU side, matching shader palette)
    function hsvToColor(h, s, v) {
      const c = v * s, x = c * (1 - Math.abs((h * 6) % 2 - 1)), m = v - c;
      let r, g, b;
      if (h < 1/6)      { r = c; g = x; b = 0; }
      else if (h < 2/6) { r = x; g = c; b = 0; }
      else if (h < 3/6) { r = 0; g = c; b = x; }
      else if (h < 4/6) { r = 0; g = x; b = c; }
      else if (h < 5/6) { r = x; g = 0; b = c; }
      else              { r = c; g = 0; b = x; }
      return new THREE.Color(r + m, g + m, b + m);
    }

    let _smokeHead = 0; // ring-buffer write index

    function spawnSmoke() {
      const i = _smokeHead;
      _smokeHead = (_smokeHead + 1) % SMOKE_MAX;

      const px = playerGroup.position.x;
      const py = playerGroup.position.y;
      const pz = playerGroup.position.z;

      // Emit just above the character's head with a little jitter
      const dx = (Math.random() - 0.5 * Math.sin(Math.random())) * INITIAL_SMOKE_SPREAD_DISTANCE;
      const dz = (Math.random() - 0.5 * Math.cos(Math.random())) * INITIAL_SMOKE_SPREAD_DISTANCE;
      _sx[i]  = px + dx;
      _sy[i]  = py + Math.random() * INITIAL_SMOKE_SPREAD_DISTANCE;
      _sz[i]  = pz + dz;

      // Initial velocity: upward thermal burst + slight spread
      _svx[i] = (Math.random() - 0.3) * 0.6;
      _svy[i] = 0.9 + Math.random() * 0.8;
      _svz[i] = (Math.random() - 0.3) * 0.6;

      const ashenPower = getEffectiveAshenPower();

      _sli[i] = 0;
      _sml[i] = 3.0 * ashenPower + Math.random() * 9.0; // 3–12 second lifetime
      _ssi[i] = 0.8 + Math.random() * 0.55; // size variety
      _sac[i] = 1;
    }

    // Lightweight wind sampler for smoke — log height profile + vertical turbulence.
    // 4 layers: prevailing, gusts, horizontal turbulence, vertical turbulence.
    // Also estimates object-proximity vertical kick from buildingAttractors +
    // terrain slope for updraft/downdraft, with Coriolis rotational drift.
    const _swBuf = { dx: 0, dy: 0, dz: 0 };
    function windForSmoke(wx, wz, wy, groundRef, t) {
      const hag = Math.max(0.05, wy - groundRef);
      const hf  = Math.min(Math.log(1 + hag / 1.5) / Math.log(1 + 20 / 1.5), 1.8);

      // Layer 1: prevailing
      const ang  = simplex2(t * 0.03, 0) * Math.PI;
      const str  = (0.5 + simplex2(t * 0.05 + 100, 0) * 0.3) * hf;
      // Layer 2: gusts
      const gx   = simplex2(wx * 0.008 + t * 0.07, wz * 0.008) * 0.38 * hf;
      const gz   = simplex2(wx * 0.008, wz * 0.008 + t * 0.07 + 50) * 0.38 * hf;
      // Layer 3: horizontal turbulence
      const tx   = simplex2(wx * 0.03 + t * 0.22, wz * 0.03 + 300) * 0.14;
      const tz   = simplex2(wx * 0.03 + 400, wz * 0.03 + t * 0.22) * 0.14;

      let bx = Math.cos(ang) * str + gx + tx;
      let bz = Math.sin(ang) * str + gz + tz;
      const hSpeed = Math.sqrt(bx * bx + bz * bz);

      // Coriolis-like drift: slowly rotates the whole field
      const corAngle = t * 0.017;
      const sinC = Math.sin(corAngle) * 0.06;
      bx += -bz * sinC;
      bz +=  bx * sinC;

      // ── Layer 4: vertical turbulence ──
      // Base vertical noise — different frequency/phase from horizontal layers
      // Amplitude inversely proportional to horizontal wind strength:
      // strong laminar flow = low vertical turbulence (open plains)
      // weak/gusty flow = more chaotic vertical mixing
      const laminarDamping = 1.0 / (1.0 + hSpeed * 3.0); // ~1 calm, ~0.15 strong winds
      const vTurb = simplex2(wx * 0.018 + t * 0.15 + 700, wz * 0.018 + 800) * 0.35 * laminarDamping;
      // Higher-frequency vertical chop
      const vChop = simplex2(wx * 0.06 + t * 0.3 + 900, wz * 0.06 + 1000) * 0.15 * laminarDamping;

      let dy = vTurb + vChop;
