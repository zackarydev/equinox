                if (bestB >= 0) {
                  sq.attackTargetIdx = bestB;
                  sq.attackProgress = 0;
                  sq.attackingFarm = false;
                  if (!buildingHP.has(bestB)) buildingHP.set(bestB, SQ_BUILDING_MAX_HP);
                  const ba = buildingAttractors[bestB];
                  sq.targetX = ba.x;
                  sq.targetZ = ba.z;
                  sq.state = SQ_ATTACK;
                } else {
                  sq.timer = 3 + Math.random() * 5;
                }
              }
            }
            break;
          }

          case SQ_RUN_TREE: {
            const rem = moveSquirrel(sq, sq.targetX, sq.targetZ, dt, SQ_SPEED);
            if (rem < 1.5) {
              sq.homeTreeIdx = sq.targetTreeIdx;
              // Climb up into the canopy before gathering
              sq.climbProgress = 0;
              sq.nextState = SQ_GATHER;
              sq.timer = SQ_GATHER_TIME;
              sq.state = SQ_CLIMB_UP;
            }
            break;
          }

          case SQ_GATHER: {
            // Stay in canopy while gathering
            if (sq.homeTreeIdx >= 0) {
              sq.mesh.position.x = treePositions[sq.homeTreeIdx].x;
              sq.mesh.position.z = treePositions[sq.homeTreeIdx].z;
              sq.mesh.position.y = getCanopyY(sq.homeTreeIdx);
            }
            sq.timer -= dt;
            if (sq.timer <= 0) {
              sq.hasNut = true;
              // Nursing squirrels don't plant — stay in canopy idle
              if (sq.nursingPhasesLeft > 0) {
                sq.hasNut = false;
                sq.state = SQ_IDLE;
                sq.inCanopy = true;
                sq.timer = 8 + Math.random() * 15;
                break;
              }
              // Only a fraction of gathered nuts get planted
              if (Math.random() > SQ_PLANT_CHANCE) {
                sq.hasNut = false; // ate it
                sq.state = SQ_IDLE;
                sq.inCanopy = true;
                sq.timer = 8 + Math.random() * 15;
                break;
              }
              // Find a planting spot — climb down with the nut
              const spot = findPlantSpot(sq.x, sq.z);
              if (spot) {
                sq.targetX = spot.x;
                sq.targetZ = spot.z;
                sq.climbProgress = 1.0;
                sq.nextState = SQ_PLANT_WALK;
                sq.state = SQ_CLIMB_DOWN;
                sq.inCanopy = false;
              } else {
                sq.hasNut = false;
                sq.state = SQ_IDLE;
                sq.inCanopy = true;
                sq.timer = 10 + Math.random() * 15;
              }
            }
            break;
          }

          case SQ_PLANT_WALK: {
            const rem = moveSquirrel(sq, sq.targetX, sq.targetZ, dt, SQ_SPEED);
            if (rem < 1.5) {
              sq.state = SQ_PLANTING;
              sq.timer = SQ_PLANT_TIME;
            }
            break;
          }

          case SQ_PLANTING: {
            sq.timer -= dt;
            if (sq.timer <= 0) {
              sq.hasNut = false;
              plantTreeAt(sq.targetX, sq.targetZ);
              sq.state = SQ_IDLE;
              sq.timer = 15 + Math.random() * 20;
            }
            break;
          }

          case SQ_GO_HOME: {
            const rem = moveSquirrel(sq, sq.targetX, sq.targetZ, dt, SQ_SPEED);
            if (rem < 2.0) {
              // Climb up into canopy to sleep
              sq.climbProgress = 0;
              sq.nextState = SQ_SLEEPING;
              sq.state = SQ_CLIMB_UP;
            }
            break;
          }

          case SQ_ATTACK: {
            if (sq.attackingFarm) {
              // ── Attacking a farm ──
              const farm = farms[sq.attackTargetIdx];
              if (!farm || farm.destroyed) { sq.state = SQ_IDLE; sq.timer = 2; break; }
              const rem = moveSquirrel(sq, sq.targetX, sq.targetZ, dt, SQ_SPEED);
              if (rem < 3.0) {
                sq.attackProgress += dt;
                const circleAng = sq.attackProgress * 2.5;
                sq.mesh.position.x = farm.x + Math.cos(circleAng) * 3;
                sq.mesh.position.z = farm.z + Math.sin(circleAng) * 3;
                sq.mesh.position.y = getTerrainY(sq.mesh.position.x, sq.mesh.position.z);
                sq.x = sq.mesh.position.x;
                sq.z = sq.mesh.position.z;
                // Damage farm — destroy crops first, then fence
                let fhp = buildingHP.get('farm_' + sq.attackTargetIdx) || 60;
                fhp -= dt * (60 / SQ_ATTACK_TIME);
                buildingHP.set('farm_' + sq.attackTargetIdx, fhp);
                // Visual: crops wilt
                if (farm.mesh.userData.cropGroup.visible) {
                  const wilt = Math.max(0, fhp / 60);
                  farm.mesh.userData.cropGroup.children.forEach(c => {
                    c.scale.y = wilt;
                    c.material.color.lerpColors(
                      new THREE.Color(0x553311), new THREE.Color(0x88cc44), wilt
                    );
                  });
                }
                if (fhp <= 0) {
                  farm.destroyed = true;
                  farm.mesh.visible = false;
                  // Notify farmer
                  for (const npc of npcs) {
                    if (npc.farmIdx === sq.attackTargetIdx) {
                      npc.farmIdx = -1;
                      npc.state = NPC_IDLE;
                      npc.timer = 5;
                    }
                  }
                  sq.state = SQ_FLEE;
                  sq.fleeAngle = Math.random() * Math.PI * 2;
                  sq.fleeChangeTimer = 1 + Math.random() * 2;
                }
              }
            } else {
              // ── Attacking a building ──
              const ba = buildingAttractors[sq.attackTargetIdx];
              if (!ba || ba.destroyed) { sq.state = SQ_IDLE; sq.timer = 2; break; }
              const rem = moveSquirrel(sq, sq.targetX, sq.targetZ, dt, SQ_SPEED);
              if (rem < 3.0) {
                sq.attackProgress += dt;
                const circleAng = sq.attackProgress * 2;
                sq.mesh.position.x = ba.x + Math.cos(circleAng) * 2.5;
                sq.mesh.position.z = ba.z + Math.sin(circleAng) * 2.5;
                sq.mesh.position.y = getTerrainY(sq.mesh.position.x, sq.mesh.position.z);
                sq.x = sq.mesh.position.x;
                sq.z = sq.mesh.position.z;
                let hp = buildingHP.get(sq.attackTargetIdx) || SQ_BUILDING_MAX_HP;
                hp -= dt * (SQ_BUILDING_MAX_HP / SQ_ATTACK_TIME);
                buildingHP.set(sq.attackTargetIdx, hp);
                if (hp <= 0) {
                  scene.traverse(child => {
                    if (child.isMesh && child.parent && child.parent.isGroup
                        && child.parent !== scene) {
                      const p = child.parent.position || child.position;
                      if (Math.abs(p.x - ba.x) < 1 && Math.abs(p.z - ba.z) < 1) {
                        child.parent.visible = false;
                      }
                    }
                  });
                  ba.destroyed = true;
                  sq.state = SQ_FLEE;
                  sq.fleeAngle = Math.random() * Math.PI * 2;
                  sq.fleeChangeTimer = 1 + Math.random() * 2;
                }
              }
            }
            break;
          }

          case SQ_FLEE: {
            // Run in random changing directions until end of day
            sq.fleeChangeTimer -= dt;
            if (sq.fleeChangeTimer <= 0) {
              sq.fleeAngle += (Math.random() - 0.5) * Math.PI;
              sq.fleeChangeTimer = 0.8 + Math.random() * 1.5;
            }
            const fx = sq.x + Math.cos(sq.fleeAngle) * 20;
            const fz = sq.z + Math.sin(sq.fleeAngle) * 20;
            moveSquirrel(sq, fx, fz, dt, SQ_FLEE_SPEED);
            // Clamp to world
            const bound = WORLD_SIZE * 0.44;
            if (Math.abs(sq.x) > bound || Math.abs(sq.z) > bound) {
              sq.fleeAngle += Math.PI; // turn around
            }
            // Stop fleeing at dusk (will transition to GO_HOME)
            if (isDusk) {
              sq.state = SQ_IDLE;
              sq.timer = 0;
            }
            break;
          }

          case SQ_NURSING: {
            sq.state = SQ_IDLE;
            sq.timer = 2 + Math.random() * 4;
            break;
          }

          case SQ_CLIMB_UP: {
            if (sq.homeTreeIdx < 0) { sq.state = sq.nextState; break; }
            sq.climbProgress += SQ_CLIMB_SPEED * dt;
            const groundY = getTerrainY(sq.x, sq.z);
            const canopyY = getCanopyY(sq.homeTreeIdx);
            // Hug the tree trunk position
            const tp = treePositions[sq.homeTreeIdx];
            sq.mesh.position.x = tp.x;
            sq.mesh.position.z = tp.z;
            sq.x = tp.x; sq.z = tp.z;
            sq.mesh.position.y = groundY + (canopyY - groundY) * Math.min(sq.climbProgress, 1);
            if (sq.climbProgress >= 1.0) {
              sq.inCanopy = true;
              sq.climbProgress = 1.0;
              sq.state = sq.nextState;
            }
            break;
          }

          case SQ_CLIMB_DOWN: {
            if (sq.homeTreeIdx < 0) { sq.state = sq.nextState; break; }
            sq.climbProgress -= SQ_CLIMB_SPEED * dt;
            const groundYd = getTerrainY(sq.x, sq.z);
            const canopyYd = getCanopyY(sq.homeTreeIdx);
            const tp2 = treePositions[sq.homeTreeIdx];
            sq.mesh.position.x = tp2.x;
            sq.mesh.position.z = tp2.z;
            sq.x = tp2.x; sq.z = tp2.z;
            sq.mesh.position.y = groundYd + (canopyYd - groundYd) * Math.max(sq.climbProgress, 0);
            if (sq.climbProgress <= 0) {
              sq.inCanopy = false;
              sq.climbProgress = 0;
              sq.state = sq.nextState;
            }
            break;
          }
        }
      }
    }

    // Spawn initial squirrels — one per ~40 trees, near random trees
    {
      const sqCount = Math.max(4, Math.floor(treePositions.length / 40));
      for (let i = 0; i < sqCount; i++) {
        const tIdx = (Math.random() * treePositions.length) | 0;
        if (windTrees[tIdx] && !windTrees[tIdx].chopped) {
          const t = treePositions[tIdx];
          spawnSquirrel(t.x + (Math.random() - 0.5) * 3,
                        t.z + (Math.random() - 0.5) * 3);
        }
      }
    }

    // ─────────────────────────────────────────
    //  NIGHT MOBS — Shadow Wraiths
    // ─────────────────────────────────────────
    const NM_MAX = 15;
    const NM_SPEED = 8;
    const NM_SPAWN_INTERVAL = 3.0;   // seconds between spawn attempts
    const NM_ATTACK_RANGE = 4.0;     // distance to deal damage
    const NM_ATTACK_COOLDOWN = 1.2;  // seconds between attacks
    // Wraith attacks drain Ashen power instead of player HP
    const NM_SMOKE_KILL_RANGE = 5.0; // smoke particle kills mob within this range
    const NM_SMOKE_ATTRACT_RANGE = 120; // how far mobs can sense smoke
    const NM_LINGER_RANGE = 30;      // wander radius when no smoke
    const NM_HOME_ATTRACT_RANGE = 80; // how far wraiths can sense lit homes
    const NM_HOME_ATTACK_RANGE = 3.0; // distance to drain home power
    const NM_PLAYER_NEARBY = 30;      // if player is within this range, wraiths target player not homes
    const NM_FADE_SPEED = 2.0;       // alpha fade in/out speed
    const NM_SPAWN_EDGE = WORLD_SIZE * 0.4; // spawn near world edges

    // Ashen power drain — wraith attacks and smoke-filled buildings erode Ashen power
    let ashenDrain = 0; // accumulated drain (0 = no drain, reduces effective ashenPower)
    const ASHEN_DRAIN_PER_HIT = 0.06;      // wraith attack drain
    const ASHEN_DRAIN_PER_CHARGE = 0.02;    // per-second drain from charged buildings
    const ASHEN_REGEN_RATE = 0.015;         // recovery per second during day

    function getEffectiveAshenPower() {
      const base = getCurrentMoonPhase().ashenPower;
      return Math.max(0.05, base - ashenDrain);
    }

    const nightMobs = [];

    function createWraithMesh() {
      const g = new THREE.Group();
      // Wispy body — dark tapered shape
      const bodyGeo = new THREE.ConeGeometry(0.6, 2.8, 5);
      const bodyMat = new THREE.MeshStandardMaterial({
        color: 0x1a0a2e, emissive: 0x220833, emissiveIntensity: 0.4,
        flatShading: true, transparent: true, opacity: 0.85
      });
      const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
      bodyMesh.position.y = 1.8;
      g.add(bodyMesh);
      // Head — glowing orb
      const headGeo = new THREE.IcosahedronGeometry(0.4, 1);
      const headMat = new THREE.MeshStandardMaterial({
        color: 0x4400aa, emissive: 0x8833ff, emissiveIntensity: 1.2,
        flatShading: true, transparent: true, opacity: 0.9
      });
      const headMesh = new THREE.Mesh(headGeo, headMat);
      headMesh.position.y = 3.4;
      g.add(headMesh);
      // Eyes — two small glowing spheres
      for (const side of [-0.15, 0.15]) {
        const eyeGeo = new THREE.SphereGeometry(0.08, 4, 4);
        const eyeMat = new THREE.MeshStandardMaterial({
          color: 0xff2200, emissive: 0xff4400, emissiveIntensity: 2.0,
          flatShading: true
        });
        const eye = new THREE.Mesh(eyeGeo, eyeMat);
        eye.position.set(side, 3.5, 0.3);
        g.add(eye);
      }
      // Tendrils — thin trailing cones
      for (let t = 0; t < 3; t++) {
        const tGeo = new THREE.ConeGeometry(0.12, 1.2, 3);
        const tMat = new THREE.MeshStandardMaterial({
          color: 0x0d0520, emissive: 0x150830, emissiveIntensity: 0.3,
          flatShading: true, transparent: true, opacity: 0.6
        });
        const tendril = new THREE.Mesh(tGeo, tMat);
        const ang = (t / 3) * Math.PI * 2 + Math.random();
        tendril.position.set(Math.cos(ang) * 0.4, 0.6, Math.sin(ang) * 0.4);
        tendril.rotation.z = (Math.random() - 0.5) * 0.5;
        g.add(tendril);
      }
      // No per-wraith light — use shared pool for perf
      g.userData = { bodyMat, headMat };
      return g;
    }

    function spawnWraith() {
      if (nightMobs.length >= NM_MAX) return;
      // Spawn at world edges
      const side = (Math.random() * 4) | 0;
      let sx, sz;
      const edge = NM_SPAWN_EDGE;
      const spread = edge * 0.8;
      if (side === 0)      { sx = -edge; sz = (Math.random() - 0.5) * spread * 2; }
      else if (side === 1) { sx =  edge; sz = (Math.random() - 0.5) * spread * 2; }
      else if (side === 2) { sz = -edge; sx = (Math.random() - 0.5) * spread * 2; }
      else                 { sz =  edge; sx = (Math.random() - 0.5) * spread * 2; }
      const sy = getTerrainY(sx, sz);
      const mesh = createWraithMesh();
      mesh.position.set(sx, sy, sz);
      scene.add(mesh);
      nightMobs.push({
        mesh,
        x: sx, z: sz,
        targetX: sx, targetZ: sz,
        state: 'wander', // 'wander', 'chase_smoke', 'attack_player', 'attack_npc', 'attack_squirrel', 'attack_home', 'dying'
        homeTargetIdx: -1, // index into buildingAttractors
        timer: 0,
        attackCooldown: 0,
        alpha: 0, // fade in
        bobPhase: Math.random() * Math.PI * 2,
        wanderTimer: 0,
        hp: 3, // hits from smoke to kill
      });
    }

    // ── Shared wraith light pool (3 lights for nearest wraiths) ──
    const WRAITH_LIGHT_COUNT = 3;
    const _wraithLights = [];
    for (let i = 0; i < WRAITH_LIGHT_COUNT; i++) {
      const wl = new THREE.PointLight(0x6622aa, 0, 15, 2);
      wl.visible = false;
      scene.add(wl);
      _wraithLights.push(wl);
    }

    // ── Smoke spatial grid for fast night-mob queries ──
    const _SMK_CELL = 10; // grid cell size in world units
    const _SMK_GRID_W = Math.ceil(WORLD_SIZE / _SMK_CELL) + 1;
    const _SMK_OFFSET = WORLD_SIZE * 0.5; // shift coords to positive
    const _smkGrid = new Map(); // cellKey → [particle indices]
    let _smkCentroid = null; // global smoke centroid, computed once/frame
    let _smkCentroidX = 0, _smkCentroidZ = 0, _smkCount = 0;

    function _smkCellKey(wx, wz) {
      const cx = ((wx + _SMK_OFFSET) / _SMK_CELL) | 0;
      const cz = ((wz + _SMK_OFFSET) / _SMK_CELL) | 0;
      return cx * 10000 + cz;
    }

    function _rebuildSmokeGrid() {
      _smkGrid.clear();
      _smkCentroidX = 0; _smkCentroidZ = 0; _smkCount = 0;
      for (let i = 0; i < SMOKE_MAX; i++) {
        if (!_sac[i]) continue;
        const key = _smkCellKey(_sx[i], _sz[i]);
        let bucket = _smkGrid.get(key);
        if (!bucket) { bucket = []; _smkGrid.set(key, bucket); }
        bucket.push(i);
        _smkCentroidX += _sx[i]; _smkCentroidZ += _sz[i]; _smkCount++;
      }
      if (_smkCount > 0) {
        _smkCentroid = { x: _smkCentroidX / _smkCount, z: _smkCentroidZ / _smkCount };
      } else {
        _smkCentroid = null;
      }
    }

    // Check if any smoke particle is within range of (x,z) using the grid
    function _smokeNearby(x, z, range) {
      const r2 = range * range;
      const cellRange = Math.ceil(range / _SMK_CELL);
      const baseCx = ((x + _SMK_OFFSET) / _SMK_CELL) | 0;
      const baseCz = ((z + _SMK_OFFSET) / _SMK_CELL) | 0;
      let totalDmg = 0;
      for (let dci = -cellRange; dci <= cellRange; dci++) {
        for (let dcj = -cellRange; dcj <= cellRange; dcj++) {
          const key = (baseCx + dci) * 10000 + (baseCz + dcj);
          const bucket = _smkGrid.get(key);
          if (!bucket) continue;
          for (let bi = 0; bi < bucket.length; bi++) {
            const si = bucket[bi];
            const d2 = (_sx[si] - x) ** 2 + (_sz[si] - z) ** 2;
            if (d2 < r2) totalDmg++;
          }
        }
      }
      return totalDmg;
    }

    let _nmSpawnTimer = 0;

    function updateNightMobs(dt) {
      // 10pm = 22:00 = 22/24 ≈ 0.9167; dawn ≈ 0.25
      const isDeadNight = timeOfDay > 0.9167 || timeOfDay < 0.25;
      const isDawn = timeOfDay >= 0.22 && timeOfDay < 0.30;

      // Rebuild smoke grid once per frame
      if (isDeadNight) _rebuildSmokeGrid();

      // Spawn wraiths during dead of night
      if (isDeadNight && !isDawn) {
        _nmSpawnTimer += dt;
        if (_nmSpawnTimer >= NM_SPAWN_INTERVAL) {
          _nmSpawnTimer = 0;
          spawnWraith();
        }
      }

      const px = playerGroup.position.x;
      const pz = playerGroup.position.z;

      for (let i = nightMobs.length - 1; i >= 0; i--) {
        const nm = nightMobs[i];

        // Dawn — fade out and remove
        if (!isDeadNight || isDawn) {
          nm.alpha -= NM_FADE_SPEED * dt;
          if (nm.alpha <= 0) {
            scene.remove(nm.mesh);
            nightMobs.splice(i, 1);
            continue;
          }
          nm.mesh.userData.bodyMat.opacity = nm.alpha * 0.85;
          nm.mesh.userData.headMat.opacity = nm.alpha * 0.9;
          // glow handled by shared wraith light pool
          continue;
        }

        // Fade in
        if (nm.alpha < 1) {
          nm.alpha = Math.min(1, nm.alpha + NM_FADE_SPEED * dt);
          nm.mesh.userData.bodyMat.opacity = nm.alpha * 0.85;
          nm.mesh.userData.headMat.opacity = nm.alpha * 0.9;
          // glow handled by shared wraith light pool
        }

        nm.attackCooldown = Math.max(0, nm.attackCooldown - dt);

        // ── Dying state ──
        if (nm.state === 'dying') {
          nm.alpha -= NM_FADE_SPEED * 2 * dt;
          nm.mesh.userData.bodyMat.opacity = nm.alpha * 0.85;
          nm.mesh.userData.headMat.opacity = nm.alpha * 0.9;
          // glow handled by shared wraith light pool
          nm.mesh.scale.setScalar(1 + (1 - nm.alpha) * 0.5); // expand as dying
          if (nm.alpha <= 0) {
            scene.remove(nm.mesh);
            nightMobs.splice(i, 1);
          }
          continue;
        }

        // ── Smoke damage — grid-accelerated ──
        const smokeHits = _smokeNearby(nm.x, nm.z, NM_SMOKE_KILL_RANGE);
        if (smokeHits > 0) {
          nm.hp -= dt * 2.0 * Math.min(smokeHits, 5); // more smoke = faster kill
          nm.mesh.userData.headMat.emissiveIntensity = 3.0;
          if (nm.hp <= 0) {
            nm.state = 'dying';
            nm.alpha = 1;
            continue;
          }
        }
        // Reset glow after damage flash
        if (nm.mesh.userData.headMat.emissiveIntensity > 1.2) {
          nm.mesh.userData.headMat.emissiveIntensity = Math.max(1.2,
            nm.mesh.userData.headMat.emissiveIntensity - 4 * dt);
        }

        // ── AI: find target ──
        const distToPlayer2 = (px - nm.x) ** 2 + (pz - nm.z) ** 2;
        const distToPlayer = Math.sqrt(distToPlayer2);
        const playerNearby = distToPlayer < NM_PLAYER_NEARBY;

        // Priority 1: Attack player if close
        if (distToPlayer < NM_ATTACK_RANGE * 3) {
          nm.state = 'attack_player';
          nm.targetX = px;
          nm.targetZ = pz;
        }
        // Priority 2: If player is NOT nearby, hunt homes (prefer lit, skip contaminated)
        else if (!playerNearby) {
          let bestHome = -1, bestHomeD2 = NM_HOME_ATTRACT_RANGE * NM_HOME_ATTRACT_RANGE;
          let bestScore = -1;
          for (let bi = 0; bi < buildingAttractors.length; bi++) {
            const ba = buildingAttractors[bi];
            if (ba.destroyed || ba.contaminated) continue;
            const hd2 = (ba.x - nm.x) ** 2 + (ba.z - nm.z) ** 2;
            if (hd2 > NM_HOME_ATTRACT_RANGE * NM_HOME_ATTRACT_RANGE) continue;
            // Prefer lit homes (charge > 0) over dark ones
            const score = ba.charge > 0.05 ? 1000 : 1;
            const effD2 = hd2 / score; // lower = better target
            if (effD2 < bestHomeD2) { bestHomeD2 = effD2; bestHome = bi; }
          }
          if (bestHome >= 0) {
            nm.state = 'attack_home';
            nm.homeTargetIdx = bestHome;
            nm.targetX = buildingAttractors[bestHome].x;
            nm.targetZ = buildingAttractors[bestHome].z;
          } else {
            // Fallback: follow smoke or wander
            const smokeCentroid = _smkCentroid;
            if (smokeCentroid) {
              nm.state = 'chase_smoke';
              nm.targetX = smokeCentroid.x;
              nm.targetZ = smokeCentroid.z;
            } else {
              nm.wanderTimer -= dt;
              if (nm.wanderTimer <= 0 || nm.state !== 'wander') {
                nm.state = 'wander';
                nm.wanderTimer = 4 + Math.random() * 6;
                const ang = Math.random() * Math.PI * 2;
                nm.targetX = nm.x + Math.cos(ang) * NM_LINGER_RANGE;
                nm.targetZ = nm.z + Math.sin(ang) * NM_LINGER_RANGE;
                const bnd = WORLD_SIZE * 0.42;
                nm.targetX = Math.max(-bnd, Math.min(bnd, nm.targetX));
                nm.targetZ = Math.max(-bnd, Math.min(bnd, nm.targetZ));
              }
            }
          }
        }
        // Priority 3: Follow smoke (use cached centroid)
        else {
          const smokeCentroid = _smkCentroid;
          if (smokeCentroid) {
            nm.state = 'chase_smoke';
            nm.targetX = smokeCentroid.x;
            nm.targetZ = smokeCentroid.z;
          }
          // Priority 4: Attack outdoor NPCs
          else {
            let nearNpc = -1, nearNpcD2 = 40 * 40;
            for (let ni = 0; ni < npcs.length; ni++) {
              if (!npcs[ni].mesh.visible) continue;
              const nd2 = (npcs[ni].x - nm.x) ** 2 + (npcs[ni].z - nm.z) ** 2;
              if (nd2 < nearNpcD2) { nearNpcD2 = nd2; nearNpc = ni; }
            }
            if (nearNpc >= 0) {
              nm.state = 'attack_npc';
              nm.targetX = npcs[nearNpc].x;
              nm.targetZ = npcs[nearNpc].z;
            }
            // Priority 5: Attack outdoor squirrels (not in canopy)
            else {
              let nearSq = -1, nearSqD2 = 30 * 30;
              for (let si = 0; si < squirrels.length; si++) {
                if (squirrels[si].inCanopy || squirrels[si].state === SQ_SLEEPING) continue;
                const sd2 = (squirrels[si].x - nm.x) ** 2 + (squirrels[si].z - nm.z) ** 2;
                if (sd2 < nearSqD2) { nearSqD2 = sd2; nearSq = si; }
              }
              if (nearSq >= 0) {
                nm.state = 'attack_squirrel';
                nm.targetX = squirrels[nearSq].x;
                nm.targetZ = squirrels[nearSq].z;
              }
              // Priority 6: Wander
              else {
                nm.wanderTimer -= dt;
                if (nm.wanderTimer <= 0 || nm.state !== 'wander') {
                  nm.state = 'wander';
                  nm.wanderTimer = 4 + Math.random() * 6;
                  const ang = Math.random() * Math.PI * 2;
                  nm.targetX = nm.x + Math.cos(ang) * NM_LINGER_RANGE;
                  nm.targetZ = nm.z + Math.sin(ang) * NM_LINGER_RANGE;
                  const bnd = WORLD_SIZE * 0.42;
                  nm.targetX = Math.max(-bnd, Math.min(bnd, nm.targetX));
                  nm.targetZ = Math.max(-bnd, Math.min(bnd, nm.targetZ));
                }
              }
            }
          }
        }

        // ── Movement ──
        const dx = nm.targetX - nm.x;
        const dz = nm.targetZ - nm.z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        const speed = nm.state === 'attack_player' ? NM_SPEED * 1.3 : NM_SPEED;
        if (dist > 0.5) {
          const step = Math.min(speed * dt, dist);
          nm.x += (dx / dist) * step;
          nm.z += (dz / dist) * step;
        }
        const groundY = getTerrainY(nm.x, nm.z);
        nm.bobPhase += dt * 3;
        nm.mesh.position.set(nm.x, groundY + 0.3 + Math.sin(nm.bobPhase) * 0.4, nm.z);
        // Face movement direction
        if (dist > 1) nm.mesh.rotation.y = Math.atan2(dx, dz);
        // Sway tendrils
        nm.mesh.children.forEach((c, ci) => {
          if (ci >= 4) c.rotation.z = Math.sin(nm.bobPhase * 1.5 + ci) * 0.3;
        });

        // ── Attacks ──
        if (nm.attackCooldown <= 0) {
          if (nm.state === 'attack_player' && distToPlayer < NM_ATTACK_RANGE) {
            ashenDrain = Math.min(0.9, ashenDrain + ASHEN_DRAIN_PER_HIT);
            nm.attackCooldown = NM_ATTACK_COOLDOWN;
          }
          // Kill outdoor NPC on contact
          if (nm.state === 'attack_npc') {
            for (let ni = npcs.length - 1; ni >= 0; ni--) {
              if (!npcs[ni].mesh.visible) continue;
              const nd = Math.sqrt((npcs[ni].x - nm.x) ** 2 + (npcs[ni].z - nm.z) ** 2);
              if (nd < NM_ATTACK_RANGE) {
                npcs[ni].mesh.visible = false;
                npcs[ni].state = NPC_GOING_HOME;
                nm.attackCooldown = NM_ATTACK_COOLDOWN;
                break;
              }
            }
          }
          // Destroy home power on contact + contaminate
          if (nm.state === 'attack_home' && nm.homeTargetIdx >= 0) {
            const ba = buildingAttractors[nm.homeTargetIdx];
            if (ba && !ba.destroyed) {
              const hd = Math.sqrt((ba.x - nm.x) ** 2 + (ba.z - nm.z) ** 2);
              if (hd < NM_HOME_ATTACK_RANGE) {
                ba.charge = 0;
                ba.glowIntensity = 0;
                for (let mi = 0; mi < ba.windowMats.length; mi++) {
                  ba.windowMats[mi].color.setScalar(0);
                  ba.windowMats[mi].emissive && ba.windowMats[mi].emissive.setScalar(0);
                }
                if (!ba.contaminated) contaminateBuilding(ba);
                nm.attackCooldown = NM_ATTACK_COOLDOWN;
                nm.homeTargetIdx = -1;
              }
            }
          }
          // Kill outdoor squirrel on contact
          if (nm.state === 'attack_squirrel') {
            for (let si = squirrels.length - 1; si >= 0; si--) {
              if (squirrels[si].inCanopy || squirrels[si].state === SQ_SLEEPING) continue;
              const sd = Math.sqrt((squirrels[si].x - nm.x) ** 2 + (squirrels[si].z - nm.z) ** 2);
              if (sd < NM_ATTACK_RANGE) {
                squirrels[si].alive = false;
                squirrels[si].mesh.visible = false;
                squirrels.splice(si, 1);
                nm.attackCooldown = NM_ATTACK_COOLDOWN;
                break;
              }
            }
          }
        }
      }

      // ── Ashen drain from smoke-charged buildings ──
      for (let bi = 0; bi < buildingAttractors.length; bi++) {
        const ba = buildingAttractors[bi];
        if (ba.destroyed) continue;
        if (ba.charge > 0.3) {
          ashenDrain = Math.min(0.9, ashenDrain + ASHEN_DRAIN_PER_CHARGE * ba.charge * dt);
        }
      }

      // ── Ashen regen during day ──
      if (!isDeadNight && ashenDrain > 0) {
        ashenDrain = Math.max(0, ashenDrain - ASHEN_REGEN_RATE * dt);
      }

      // ── Wraith light pool: assign to nearest wraiths to player ──
      if (isDeadNight && nightMobs.length > 0) {
        // Sort by distance to player, pick top N
        const px = playerGroup.position.x, pz = playerGroup.position.z;
        const scored = [];
        for (let i = 0; i < nightMobs.length; i++) {
          const nm = nightMobs[i];
          if (nm.state === 'dying' || nm.alpha < 0.3) continue;
          scored.push({ idx: i, d2: (nm.x - px) ** 2 + (nm.z - pz) ** 2 });
        }
        scored.sort((a, b) => a.d2 - b.d2);
        for (let li = 0; li < WRAITH_LIGHT_COUNT; li++) {
          const wl = _wraithLights[li];
          if (li < scored.length) {
            const nm = nightMobs[scored[li].idx];
            wl.visible = true;
            wl.position.set(nm.x, nm.mesh.position.y + 2, nm.z);
            wl.intensity = nm.alpha * 150;
          } else {
            wl.visible = false;
            wl.intensity = 0;
          }
        }
      } else {
        for (let li = 0; li < WRAITH_LIGHT_COUNT; li++) {
          _wraithLights[li].visible = false;
          _wraithLights[li].intensity = 0;
        }
      }
    }

    // ── Player mesh visibility at night ──
    const playerBodyParts = [body, head, shoulders, ...legs];

    // ─────────────────────────────────────────
    //  GHOST CLOUD SYSTEM — cohesive luminous entity at night
    //  Dense core + wispy outer shell, curl-noise swirling, wind-guided,
    //  coordinated breathing. One organism, not separate particles.
    // ─────────────────────────────────────────
    const GHOST_MAX = 125;
    const GHOST_MIN_SIZE_CORE = 0.5;
    const GHOST_MAX_SIZE_CORE = 0.7;
    const GHOST_MIN_SIZE_OUTER = 0.4;
    const GHOST_MAX_SIZE_OUTER = 0.5;
    const GHOST_CORE_R = 1;        // dense inner core radius
    const GHOST_OUTER_R = 2;       // wispy outer reach
    const GHOST_SPRING = 20.0;       // strong spring snap to formation
    const GHOST_DAMP = 0.05;         // velocity damping (lower = more viscous)
    const GHOST_CURL_STR = 6;      // curl-noise swirl intensity
    const GHOST_CURL_SCALE = 1;    // spatial frequency of swirl
    const GHOST_CURL_SPEED = 0.3;    // swirl time evolution
    const GHOST_WIND_FACTOR = 0.25;   // wind push on cloud
    const GHOST_BREATH_RATE = 0.4;   // breathing frequency (Hz)
    const GHOST_BREATH_AMP = 0.2;   // breathing expansion fraction
    const GHOST_OBS_RANGE = 4.0;     // obstacle avoidance trigger
    const GHOST_OBS_PUSH = 20.0;     // obstacle push + tangential slide
    const GHOST_DRAIN_BLDG = 1.0;
    const GHOST_DRAIN_WRAITH = 4.0; // wraith must be close to the core to drain
    const GHOST_REGEN_RATE = 100;
    const GHOST_DRAIN_RATE_BLDG = 100.0;
    const GHOST_DRAIN_RATE_WRAITH = 40.0; // blobs/sec at point-blank
    const GHOST_ATTACK_RANGE = 5.0;
    const GHOST_ATTACK_DPS = 2.5;
    const GHOST_LIGHT_COUNT = 1;

    // Moon jump
    const MOON_GRAVITY = 7;
    const JUMP_VELOCITY = 50.0;
    let playerYVel = 0;
    let playerAirborne = false;
    let _jumpLaunchFrame = false;
    let ghostActive = false;  // is ghost cloud currently active?

    // Ghost blob data (SoA)
    const _gbx = new Float32Array(GHOST_MAX);
    const _gby = new Float32Array(GHOST_MAX);
    const _gbz = new Float32Array(GHOST_MAX);
    const _gbvx = new Float32Array(GHOST_MAX);
    const _gbvy = new Float32Array(GHOST_MAX);
    const _gbvz = new Float32Array(GHOST_MAX);
    const _gbac = new Uint8Array(GHOST_MAX);
    const _gbhue = new Float32Array(GHOST_MAX);
    const _gbsz = new Float32Array(GHOST_MAX);
    const _gblayer = new Float32Array(GHOST_MAX); // 0=core, 1=outer
    const _gbphase = new Float32Array(GHOST_MAX); // orbit phase offset
    const _gborbit = new Float32Array(GHOST_MAX); // assigned orbit radius
    let ghostBlobCount = 0;
    let ghostMaxBlobs = GHOST_MAX;
    let ghostFade = 0;
    let _ghostRegenAccum = 0;

    const _ghostGeo = new THREE.IcosahedronGeometry(0.1, 1);
    const _ghostMat = new THREE.MeshStandardMaterial({
      color: 0xffffff,
      emissive: 0x222222,
      emissiveIntensity: 1.0,
      flatShading: true,
      transparent: true,
      opacity: 0.9,
    });
    const ghostCloud = new THREE.InstancedMesh(_ghostGeo, _ghostMat, GHOST_MAX);
    ghostCloud.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    // Per-instance color
    const _ghostColors = new Float32Array(GHOST_MAX * 3);
    ghostCloud.instanceColor = new THREE.InstancedBufferAttribute(_ghostColors, 3);
    ghostCloud.instanceColor.setUsage(THREE.DynamicDrawUsage);
    ghostCloud.frustumCulled = false;
    ghostCloud.visible = false;
    ghostCloud.castShadow = false;
    scene.add(ghostCloud);

    // Ghost cloud point lights — deep blues and purples
    const GHOST_LIGHT_HUES = [0.72, 0.62, 0.82];
    const ghostLights = [];
    for (let i = 0; i < GHOST_LIGHT_COUNT; i++) {
      const gl = new THREE.PointLight(0x8844ff, 0, 200, 0.5);
      gl.visible = false;
      scene.add(gl);
      ghostLights.push({ light: gl, blobIdx: -1, baseHue: GHOST_LIGHT_HUES[i] });
    }

    // Dummy matrix for instanced mesh updates
    const _ghostDummy = new THREE.Object3D();

    function getGhostPower() {
      // New Moon (light 0.5) = 1.0, Full Moon (light 3.0) = 0.25
      const ml = getCurrentMoonPhase().light;
      return Math.max(0.25, 1.0 - (ml - 0.5) / 2.5 * 0.75);
    }

    // Curl noise: divergence-free rotational flow via finite differences on simplex2
    function curlNoise3D(x, y, z, t, scale, speed) {
      const eps = 0.15;
      const sx = x * scale, sy = y * scale, sz = z * scale, tt = t * speed;
      const n0  = simplex2(sx + tt, sz + 50);
      const ndy = simplex2(sx + tt, sz + eps + 50);
      const ndz = simplex2(sx + tt + 100, sy + 70);
      const ndz2 = simplex2(sx + tt + 100, sy + eps + 70);
      const nx  = simplex2(sz + tt + 200, sy + 30);
      const ndx = simplex2(sz + tt + 200, sy + eps + 30);
      return {
        x: (ndy - n0) / eps - (ndz2 - ndz) / eps,
        y: (ndz2 - ndz) / eps - (ndx - nx) / eps,
        z: (ndx - nx) / eps - (ndy - n0) / eps
      };
    }

    function initGhostBlob(i, px, py, pz) {
      const layer = Math.random() < 0.6 ? 0 : 1;
      _gblayer[i] = layer;
      const maxR = layer === 0 ? GHOST_CORE_R : GHOST_OUTER_R;
      _gborbit[i] = Math.pow(Math.random(), 0.5) * maxR;
      _gbphase[i] = Math.random() * Math.PI * 2;
      const ang = _gbphase[i], r = _gborbit[i];
      _gbx[i] = px + Math.cos(ang) * r;
      _gby[i] = py + 2.0 + (Math.random() - 0.5) * maxR * 0.6;
      _gbz[i] = pz + Math.sin(ang) * r;
      _gbvx[i] = 0; _gbvy[i] = 0; _gbvz[i] = 0;
      _gbac[i] = 1;
      // Match smoke trail hue distribution: 88% blue-violet-magenta, 12% green-teal
      const _h = Math.random();
      _gbhue[i] = _h < 0.88 ? 0.58 + _h * 0.34 : 0.28 + (_h - 0.88) * 1.5;
      _gbsz[i] = layer === 0
        ? (GHOST_MIN_SIZE_CORE + Math.random() * GHOST_MAX_SIZE_CORE)
        : (GHOST_MIN_SIZE_OUTER + Math.random() * GHOST_MAX_SIZE_OUTER);
    }

    function updateGhostCloud(dt) {
      const _isDeepNight = timeOfDay > 0.82 || timeOfDay < 0.22;
      const _isTransition = (timeOfDay > 0.75 && timeOfDay <= 0.82) ||
                            (timeOfDay >= 0.22 && timeOfDay < 0.30);
      if (_isDeepNight) {
        ghostFade = Math.min(1, ghostFade + dt * 1.5);
      } else if (_isTransition) {
        ghostFade = timeOfDay > 0.75
          ? Math.min(1, (timeOfDay - 0.75) / 0.07)
          : Math.max(0, 1.0 - (timeOfDay - 0.22) / 0.08);
      } else {
        ghostFade = Math.max(0, ghostFade - dt * 2.0);
      }
      ghostActive = ghostFade > 0.01;
      if (!ghostActive) {
        ghostCloud.visible = false; ghostCloud.count = 0;
        for (let i = 0; i < GHOST_LIGHT_COUNT; i++) ghostLights[i].light.visible = false;
        playerAirborne = false; playerYVel = 0; ghostBlobCount = 0;
        for (let i = 0; i < GHOST_MAX; i++) _gbac[i] = 0;
        return;
      }
      ghostCloud.visible = true;

      const px = playerGroup.position.x, py = playerGroup.position.y, pz = playerGroup.position.z;
      const t = performance.now() * 0.001;
      const gp = getGhostPower();
      const ashen = getEffectiveAshenPower();
      // Max blobs based on ghost power (moon phase) and fade-in only
      ghostMaxBlobs = Math.floor(GHOST_MAX * gp * ghostFade);

      // ── Regeneration — fractional accumulator for proper rate control ──
      if (ghostBlobCount < ghostMaxBlobs) {
        const regenMult = 0.15 + ashen * 0.85; // 0.15..1.0
        const rate = GHOST_REGEN_RATE * regenMult; // blobs per second
        _ghostRegenAccum += rate * dt;
        const toSpawn = Math.min(Math.floor(_ghostRegenAccum), ghostMaxBlobs - ghostBlobCount);
        if (toSpawn > 0) {
          _ghostRegenAccum -= toSpawn;
          let spawned = 0;
          for (let i = 0; i < GHOST_MAX && spawned < toSpawn; i++) {
            if (!_gbac[i]) { initGhostBlob(i, px, py, pz); spawned++; }
          }
          ghostBlobCount += spawned;
        }
      } else {
        _ghostRegenAccum = 0;
      }

      // ── Building drain: wind field pulls blobs in, consume on contact ──
      // The wind vector field already has building attractor pull (getWindDebug §6).
      // Here we just consume blobs that reach a building and apply per-blob wind
      // near buildings so they actually feel the pull (shared wind is at player center).
      for (let bi = 0; bi < buildingAttractors.length; bi++) {
        const ba = buildingAttractors[bi];
        if (ba.destroyed) continue;
        const bd2 = (ba.x - px) ** 2 + (ba.z - pz) ** 2;
        if (bd2 > (GHOST_DRAIN_BLDG + 10) ** 2) continue;
        for (let i = 0; i < GHOST_MAX; i++) {
          if (!_gbac[i]) continue;
          const ddx = _gbx[i] - ba.x, ddz = _gbz[i] - ba.z, ddy = _gby[i] - ba.y;
          const d2 = ddx * ddx + ddz * ddz + ddy * ddy;
          // Consume on contact
          if (d2 < (ba.r + 1.0) * (ba.r + 1.0)) {
            _gbac[i] = 0; ghostBlobCount--; continue;
          }
          // Per-blob wind near buildings — getWindDebug includes attractor pull
          if (d2 < GHOST_DRAIN_BLDG * GHOST_DRAIN_BLDG) {
            const bw = getWindDebug(_gbx[i], _gby[i], _gbz[i], windTime);
            _gbvx[i] += bw.dx * SMOKE_WIND_SPEED * 0.8 * dt;
            _gbvy[i] += bw.dy * SMOKE_WIND_SPEED * 0.8 * dt;
            _gbvz[i] += bw.dz * SMOKE_WIND_SPEED * 0.8 * dt;
          }
        }
      }

      // ── Wraith drain + ghost attacks ──
      // Wraiths that reach the core destroy blobs aggressively.
      // Ghost can fight back when enough blobs surround the wraith.
      for (let ni = nightMobs.length - 1; ni >= 0; ni--) {
        const nm = nightMobs[ni];
        if (nm.state === 'dying') continue;
        const wd = Math.sqrt((nm.x - px) ** 2 + (nm.z - pz) ** 2);

        // Wraith close to player core — destroy blobs on contact
        if (wd < GHOST_DRAIN_WRAITH) {
          // Kill rate: massive — scales with how close the wraith is
          const intensity = 1.0 - wd / GHOST_DRAIN_WRAITH; // 0..1
          const killCount = Math.ceil(GHOST_DRAIN_RATE_WRAITH * intensity * dt);
          let killed = 0;
          for (let i = 0; i < GHOST_MAX && killed < killCount; i++) {
            if (!_gbac[i]) continue;
            // Kill any active blob near the wraith OR near the player (core hit)
            const bd2 = (_gbx[i] - nm.x) ** 2 + (_gbz[i] - nm.z) ** 2;
            if (bd2 < 9.0) { // 3-unit radius around wraith
              _gbac[i] = 0; ghostBlobCount--; killed++;
            }
          }
        }

        // Ghost attacks wraith when blobs surround it
        if (wd < GHOST_ATTACK_RANGE) {
          let nearBlobs = 0;
          for (let i = 0; i < GHOST_MAX; i++) {
            if (!_gbac[i]) continue;
            if ((_gbx[i] - nm.x) ** 2 + (_gbz[i] - nm.z) ** 2 < GHOST_ATTACK_RANGE * GHOST_ATTACK_RANGE) nearBlobs++;
            if (nearBlobs >= 10) break;
          }
          if (nearBlobs > 3) {
            nm.hp -= GHOST_ATTACK_DPS * Math.min(nearBlobs / 10, 1.0) * dt;
            nm.mesh.userData.headMat.emissiveIntensity = 3.0;
            if (nm.hp <= 0) { nm.state = 'dying'; nm.alpha = 1; }
          }
        }
      }

      // ── Shared cloud state (computed ONCE, not per blob) ──
      const playerGndY = getTerrainY(px, pz); // one terrain lookup for all blobs
      const cw = windForSmoke(px, pz, py + 2, playerGndY, windTime);
      const windStr = Math.sqrt(cw.dx * cw.dx + cw.dz * cw.dz);
      // Breathing responds to wind — gusts stretch the cloud
      const breathBase = Math.sin(t * GHOST_BREATH_RATE * Math.PI * 2) * GHOST_BREATH_AMP;
      const windBreath = windStr * 0.35; // wind stretches breathing
      const breath = 1.0 + breathBase + windBreath;
      // Formation offset — sphere center shifts downwind so the cloud leans
      const windLeanX = cw.dx * 15.0;
      const windLeanZ = cw.dz * 15.0;

      // Shared curl sample at player center (6 simplex calls total, not per blob)
      const _curlCenter = curlNoise3D(px, py + 2, pz, t, GHOST_CURL_SCALE, GHOST_CURL_SPEED);
      // Pre-compute global hue shift
      const _baseHueShift = Math.sin(t * 0.3) * 0.04;
      // Reusable color object
      const _gcTmp = { r: 0, g: 0, b: 0 };

      // Pre-filter nearby obstacles (once)
      const _nearBldg = [];
      for (let bi = 0; bi < buildingAttractors.length; bi++) {
        const ba = buildingAttractors[bi];
        if (ba.destroyed) continue;
        if ((ba.x - px) ** 2 + (ba.z - pz) ** 2 < (GHOST_OUTER_R + GHOST_OBS_RANGE + ba.r + 5) ** 2)
          _nearBldg.push(ba);
      }
      const _nearTrees = [];
      for (let ti = 0; ti < treePositions.length; ti++) {
        if (windTrees[ti] && windTrees[ti].chopped) continue;
        const tp = treePositions[ti];
        const tr = windTrees[ti] ? windTrees[ti].trunkR : 0.8;
        const gatherR = GHOST_OUTER_R + tr + 6;
        if ((tp.x - px) ** 2 + (tp.z - pz) ** 2 < gatherR * gatherR)
          _nearTrees.push({ x: tp.x, y: tp.y, z: tp.z, trunkR: tr });
      }

      // ── Update each blob ──
      for (let i = 0; i < GHOST_MAX; i++) {
        if (!_gbac[i]) {
          _ghostDummy.position.set(0, -1000, 0);
          _ghostDummy.scale.setScalar(0);
          _ghostDummy.updateMatrix();
          ghostCloud.setMatrixAt(i, _ghostDummy.matrix);
          _ghostColors[i * 3] = 0; _ghostColors[i * 3 + 1] = 0; _ghostColors[i * 3 + 2] = 0;
          continue;
        }

        // Formation target — spherical distribution
        const orbR = _gborbit[i] * breath;
        const orbAngle = _gbphase[i] + t * (0.3 + _gblayer[i] * 0.5);
        // Elevation angle derived from phase — spread blobs vertically across a sphere
        const elevAngle = Math.acos(1 - 2 * ((_gbphase[i] * 2.347) % 1)) - Math.PI * 0.5; // -π/2..π/2
        const elevDrift = Math.sin(_gbphase[i] * 3.7 + t * 0.8) * 0.3; // gentle wobble
        const cosElev = Math.cos(elevAngle + elevDrift);
        const sinElev = Math.sin(elevAngle + elevDrift);
        const tgtX = px + Math.cos(orbAngle) * orbR * cosElev + windLeanX;
        const tgtZ = pz + Math.sin(orbAngle) * orbR * cosElev + windLeanZ;
        const tgtY = py + 2.0 + orbR * sinElev;

        // Per-blob wind — each blob feels wind at its own position
        const bw = windForSmoke(_gbx[i], _gbz[i], _gby[i], playerGndY, windTime);
        const bwdx = bw.dx * SMOKE_WIND_SPEED * GHOST_WIND_FACTOR;
        const bwdz = bw.dz * SMOKE_WIND_SPEED * GHOST_WIND_FACTOR;
        // Suppress vertical wind near buildings so chimney/updraft effects
        // don't rip the ghost cloud apart or suck it into structures
        let _blobVWindDamp = 1.0;
        for (let _bi = 0; _bi < _nearBldg.length; _bi++) {
          const _ba = _nearBldg[_bi];
          const _bd2 = (_gbx[i] - _ba.x) ** 2 + (_gbz[i] - _ba.z) ** 2;
          const _bThresh = _ba.r + 20; // suppress within ~20 units of building center
          if (_bd2 < _bThresh * _bThresh) {
            const _bProx = 1.0 - Math.sqrt(_bd2) / _bThresh;
            _blobVWindDamp = Math.min(_blobVWindDamp, 1.0 - _bProx * 0.98); // up to 98% suppression
          }
        }
        const bwdy = bw.dy * SMOKE_WIND_SPEED * GHOST_WIND_FACTOR * 0.15 * _blobVWindDamp;

        // Spring + shared curl + per-blob wind
        let fx = (tgtX - _gbx[i]) * GHOST_SPRING + _curlCenter.x * GHOST_CURL_STR + bwdx;
        let fy = (tgtY - _gby[i]) * GHOST_SPRING + _curlCenter.y * GHOST_CURL_STR * 0.5 + bwdy;
        let fz = (tgtZ - _gbz[i]) * GHOST_SPRING + _curlCenter.z * GHOST_CURL_STR + bwdz;

        // Per-blob curl variation: cheap phase-offset of shared curl (no extra simplex)
        const phOff = _gbphase[i] * (Math.random() * 0.5);
        const cSin = Math.sin(phOff), cCos = Math.cos(phOff);
        fx += (_curlCenter.x * cCos - _curlCenter.z * cSin) * 0.8;
        fz += (_curlCenter.x * cSin + _curlCenter.z * cCos) * 0.8;

        // Obstacle avoidance — all blobs interact with buildings and trees
        for (let bi = 0; bi < _nearBldg.length; bi++) {
          const ba = _nearBldg[bi];
          const odx = _gbx[i] - ba.x, odz = _gbz[i] - ba.z;
          const od2 = odx * odx + odz * odz;
          const thresh = ba.r + GHOST_OBS_RANGE;
          if (od2 < thresh * thresh && od2 > 0.01) {
            const od = Math.sqrt(od2);
            const pen = 1.0 - od / thresh;
            const push = GHOST_OBS_PUSH * pen * pen;
            fx += (odx / od) * push + (-odz / od) * push * 0.7;
            fz += (odz / od) * push + (odx / od) * push * 0.7;
            if (_gby[i] < ba.y + 3) fy += push * 0.6;
          }
        }
        for (let ti = 0; ti < _nearTrees.length; ti++) {
          const tp = _nearTrees[ti];
          const odx = _gbx[i] - tp.x, odz = _gbz[i] - tp.z;
          const od2 = odx * odx + odz * odz;
          const tR = tp.trunkR;
          const TRUNK_AVOID_R = tR + 2.5; // soft push starts outside trunk
          if (od2 < TRUNK_AVOID_R * TRUNK_AVOID_R && od2 > 0.01) {
            const od = Math.sqrt(od2);
            const pen = 1.0 - od / TRUNK_AVOID_R;
            const push = GHOST_OBS_PUSH * pen * pen * 4.0;
            fx += (odx / od) * push + (-odz / od) * push * 0.5;
            fz += (odz / od) * push + (odx / od) * push * 0.5;
            if (_gby[i] < tp.y + tR * 4) fy += push * 0.4;
          }
        }

        // Integrate — frame-rate-independent damping
        const damp = Math.pow(GHOST_DAMP, dt);
        _gbvx[i] = (_gbvx[i] + fx * dt) * damp;
        _gbvy[i] = (_gbvy[i] + fy * dt) * damp;
        _gbvz[i] = (_gbvz[i] + fz * dt) * damp;
        _gbx[i] += _gbvx[i] * dt;
        _gby[i] += _gbvy[i] * dt;
        _gbz[i] += _gbvz[i] * dt;

        // Hard trunk clamp — enforce after integration so nothing penetrates
        for (let ti = 0; ti < _nearTrees.length; ti++) {
          const tp = _nearTrees[ti];
          const cdx = _gbx[i] - tp.x, cdz = _gbz[i] - tp.z;
          const cd2 = cdx * cdx + cdz * cdz;
          const minR = tp.trunkR + 0.3;
          if (cd2 < minR * minR && cd2 > 0.0001) {
            const cd = Math.sqrt(cd2);
            const nx = cdx / cd, nz = cdz / cd;
            _gbx[i] = tp.x + nx * minR;
            _gbz[i] = tp.z + nz * minR;
            // Kill inward velocity, keep tangential
            const vDot = _gbvx[i] * nx + _gbvz[i] * nz;
            if (vDot < 0) {
              _gbvx[i] -= vDot * nx;
              _gbvz[i] -= vDot * nz;
            }
          }
        }

        // Ground check: use player ground Y (blobs are close to player)
        if (_gby[i] < playerGndY + 0.2) { _gby[i] = playerGndY + 0.2; _gbvy[i] = Math.max(0, _gbvy[i]); }

        // Render
        const shimmer = 0.9 + Math.sin(t * 4.0 + _gbphase[i] * 5) * 0.1;
        const layerFade = _gblayer[i] === 0 ? 1.0 : 0.7;
        _ghostDummy.position.set(_gbx[i], _gby[i], _gbz[i]);
        _ghostDummy.scale.setScalar(_gbsz[i] * breath * shimmer * ghostFade * layerFade);
        _ghostDummy.updateMatrix();
        ghostCloud.setMatrixAt(i, _ghostDummy.matrix);

        // Color: reuse inline HSV calc (no object allocation)
        const hue = ((_gbhue[i] + _baseHueShift + Math.sin(t * 0.6 + _gbphase[i]) * 0.02) % 1 + 1) % 1;
        const sat = 1.0; // fully saturated — vivid colors
        const c = sat, x = c * (1 - Math.abs((hue * 6) % 2 - 1)), m = 0;
        const h6 = hue * 6;
        let cr, cg, cb;
        if (h6 < 1) { cr = c; cg = x; cb = 0; }
        else if (h6 < 2) { cr = x; cg = c; cb = 0; }
        else if (h6 < 3) { cr = 0; cg = c; cb = x; }
        else if (h6 < 4) { cr = 0; cg = x; cb = c; }
        else if (h6 < 5) { cr = x; cg = 0; cb = c; }
        else { cr = c; cg = 0; cb = x; }
        _ghostColors[i * 3] = cr + m;
        _ghostColors[i * 3 + 1] = cg + m;
        _ghostColors[i * 3 + 2] = cb + m;
      }

      ghostCloud.count = GHOST_MAX;
      ghostCloud.instanceMatrix.needsUpdate = true;
      ghostCloud.instanceColor.needsUpdate = true;
      _ghostMat.emissiveIntensity = 0.3 + gp * 0.4;
      _ghostMat.opacity = 0.85 + ghostFade * 0.1;

      // ── Ghost lights: track core blobs ──
      for (let li = 0; li < GHOST_LIGHT_COUNT; li++) {
        const gl = ghostLights[li];
        gl.light.visible = ghostFade > 0.1;
        if (!gl.light.visible) continue;
        if (gl.blobIdx < 0 || !_gbac[gl.blobIdx]) {
          gl.blobIdx = -1;
          const start = (Math.random() * GHOST_MAX) | 0;
          for (let j = 0; j < GHOST_MAX; j++) {
            const idx = (start + j) % GHOST_MAX;
            if (_gbac[idx] && _gblayer[idx] === 0) { gl.blobIdx = idx; break; }
          }
          if (gl.blobIdx < 0) {
            for (let j = 0; j < GHOST_MAX; j++) {
              if (_gbac[(start + j) % GHOST_MAX]) { gl.blobIdx = (start + j) % GHOST_MAX; break; }
            }
          }
        }
        if (gl.blobIdx >= 0) {
          const bi = gl.blobIdx;
          const lr = 1 - Math.pow(0.005, dt);
          gl.light.position.x += (_gbx[bi] - gl.light.position.x) * lr;
          gl.light.position.y += (_gby[bi] - gl.light.position.y) * lr;
          gl.light.position.z += (_gbz[bi] - gl.light.position.z) * lr;
          // Each light uses its own deep blue/purple hue with gentle drift
          const h = gl.baseHue + Math.sin(t * 0.7 + li * 1.7) * 0.04;
          const c = hsvToColor(((h % 1) + 1) % 1, 0.85, 0.6);
          gl.light.color.copy(c);
          const blobRatio = ghostMaxBlobs > 0 ? ghostBlobCount / ghostMaxBlobs : 0;
          gl.light.intensity = (200 + Math.sin(t * 1.8 + li * 1.5) * 100) * ghostFade * gp * blobRatio;
          gl.light.distance = 400 + gp * 80;
        }
      }

      // ── Moon jump ──
      if (ghostActive && keys[' '] && !playerAirborne) {
        playerAirborne = true;
        _jumpLaunchFrame = true;
        playerYVel = JUMP_VELOCITY;
        // Launch carries current horizontal velocity — no reset
      }
      if (playerAirborne) {
        playerYVel -= MOON_GRAVITY * dt;

        // Space while already airborne = dive downward (skip launch frame)
        if (keys[' '] && !_jumpLaunchFrame) {
          playerYVel -= 120.0 * dt;
        }
        _jumpLaunchFrame = false;

        // Wind drives airborne velocity — ghost power determines wind resistance
        const airGndY = getTerrainY(playerGroup.position.x, playerGroup.position.z);
        const airHag = Math.max(0, playerGroup.position.y - airGndY);
        const gp = getGhostPower();
        // Wind ramps gently with altitude, capped modestly
        const airWindScale = Math.min(airHag / 10.0, 1.5);
        const airWind = windForSmoke(playerGroup.position.x, playerGroup.position.z,
                                     playerGroup.position.y, airGndY, windTime);
        // Target velocity = wind vector scaled down (was way too strong)
        const windTargetX = airWind.dx * SMOKE_WIND_SPEED * airWindScale * 0.4;
        const windTargetZ = airWind.dz * SMOKE_WIND_SPEED * airWindScale * 0.4;
        // Wind drag: strong ghost (gp=1) resists wind, weak ghost (gp=0.25) carried by it
        // gp=1.0 → drag 0.3, gp=0.25 → drag 1.2
        const windDrag = Math.min((1.5 - gp * 1.2) * dt, 0.85);
        playerVelocity.x += (windTargetX - playerVelocity.x) * windDrag;
        playerVelocity.z += (windTargetZ - playerVelocity.z) * windDrag;
        // Vertical wind — gentle
        playerYVel += airWind.dy * SMOKE_WIND_SPEED * airWindScale * dt * 0.25;

        playerGroup.position.y += playerYVel * dt;
        const groundY = getExactTerrainY(playerGroup.position.x, playerGroup.position.z);
        if (playerGroup.position.y <= groundY) {
          playerGroup.position.y = groundY;
          playerAirborne = false; playerYVel = 0; smoothedY = groundY;
        }
      }

    }

    // ─────────────────────────────────────────
    //  CONTAMINATION VINE SYSTEM
    // ─────────────────────────────────────────
    const VINE_COLOR = 0x8a1a1a;
    const VINE_EMISSIVE = 0x660000;
    const VINE_COUNT_PER_FACE = 4; // vines per wall face
    const CLEANSE_RANGE = 6.0; // must be within this distance
    const SWING_DURATION = 0.3; // seconds per full swing arc

    function contaminateBuilding(ba) {
      if (ba.contaminated) return;
      ba.contaminated = true;
      ba.cleanseProgress = 0;

      const vg = new THREE.Group();
      vg.position.set(ba.x, ba.groundY, ba.z);
      vg.rotation.y = ba.rotation;

      const { w, h, d } = ba.dims;
      // Generate vines on each wall face
      const faces = [
        { nx: 0, nz: 1, offX: 0, offZ: d / 2 + 0.05, spanW: w, spanH: h },   // +Z
        { nx: 0, nz: -1, offX: 0, offZ: -d / 2 - 0.05, spanW: w, spanH: h },  // -Z
        { nx: 1, nz: 0, offX: w / 2 + 0.05, offZ: 0, spanW: d, spanH: h, rotY: Math.PI / 2 }, // +X
        { nx: -1, nz: 0, offX: -w / 2 - 0.05, offZ: 0, spanW: d, spanH: h, rotY: Math.PI / 2 }, // -X
      ];

      const vineMeshes = [];
      for (const face of faces) {
        for (let vi = 0; vi < VINE_COUNT_PER_FACE; vi++) {
          // Each vine: a curving tendril from bottom to partway up the wall
          const vineH = h * (0.3 + Math.random() * 0.6);
          const segments = 5 + Math.floor(Math.random() * 3);
          const points = [];
          const baseX = (Math.random() - 0.5) * face.spanW * 0.8;
          for (let si = 0; si <= segments; si++) {
            const t = si / segments;
            const sx = baseX + Math.sin(t * Math.PI * (1.5 + Math.random())) * 0.4;
            const sy = t * vineH;
            const sz = Math.sin(t * Math.PI * 2 * Math.random()) * 0.1;
            points.push(new THREE.Vector3(sx, sy, sz));
          }
          const curve = new THREE.CatmullRomCurve3(points);
          const tubeGeo = new THREE.TubeGeometry(curve, segments * 2, 0.06 + Math.random() * 0.05, 4, false);
          const vineMat = new THREE.MeshStandardMaterial({
            color: VINE_COLOR, emissive: VINE_EMISSIVE,
            emissiveIntensity: 0.6,
            flatShading: true, transparent: true, opacity: 0.9,
            roughness: 0.6,
          });
          const vineMesh = new THREE.Mesh(tubeGeo, vineMat);
          vineMesh.position.set(face.offX, 0, face.offZ);
          if (face.rotY) vineMesh.rotation.y = face.rotY;
          vineMesh.userData.phase = Math.random() * Math.PI * 2;
          vineMesh.userData.vineMat = vineMat;
          vineMesh.userData.basePoints = points.map(p => p.clone());
          vineMesh.userData.curve = curve;
          vineMesh.userData.segments = segments;
          vg.add(vineMesh);
          vineMeshes.push(vineMesh);

          // Add small leaf/bulb nodes along vine
          const bulbCount = 1 + Math.floor(Math.random() * 3);
          for (let bi = 0; bi < bulbCount; bi++) {
            const bt = 0.3 + Math.random() * 0.6;
            const bPos = curve.getPoint(bt);
            const bulbGeo = new THREE.IcosahedronGeometry(0.1 + Math.random() * 0.08, 0);
            const bulbMat = new THREE.MeshStandardMaterial({
              color: 0xbe2f2f, emissive: 0xcc0000,
              emissiveIntensity: 0.8, flatShading: true,
              transparent: true, opacity: 0.85,
            });
            const bulb = new THREE.Mesh(bulbGeo, bulbMat);
            bulb.position.copy(bPos).add(new THREE.Vector3(face.offX, 0, face.offZ));
            if (face.rotY) {
              const rx = bulb.position.x;
              const rz = bulb.position.z;
              bulb.position.x = rz;
              bulb.position.z = -rx + face.offX;
              bulb.position.x += face.offX;
            }
            bulb.userData.phase = Math.random() * Math.PI * 2;
            bulb.userData.bulbMat = bulbMat;
            vg.add(bulb);
            vineMeshes.push(bulb);
          }
        }
      }

      ba.vineGroup = vg;
      ba.vineMeshes = vineMeshes;
      scene.add(vg);
    }

    function decontaminateBuilding(ba) {
      if (!ba.contaminated) return;
      ba.contaminated = false;
      ba.cleanseProgress = 0;
      if (ba.vineGroup) {
        scene.remove(ba.vineGroup);
        ba.vineGroup.traverse(c => {
          if (c.geometry) c.geometry.dispose();
          if (c.material) c.material.dispose();
        });
        ba.vineGroup = null;
        ba.vineMeshes = null;
      }
    }

    function updateContamination(dt) {
      const t = performance.now() * 0.001;
      for (let bi = 0; bi < buildingAttractors.length; bi++) {
        const ba = buildingAttractors[bi];
        if (!ba.contaminated || !ba.vineMeshes) continue;

        // Contaminated buildings can't hold charge
        ba.charge = 0;
        ba.glowIntensity = 0;

        // Animate vines — pulsating glow + subtle movement
        for (let vi = 0; vi < ba.vineMeshes.length; vi++) {
          const vm = ba.vineMeshes[vi];
          const phase = vm.userData.phase;
          const pulse = 0.4 + Math.sin(t * 1.5 + phase) * 0.3 + Math.sin(t * 3.7 + phase * 2.1) * 0.15;

          if (vm.userData.vineMat) {
            vm.userData.vineMat.emissiveIntensity = pulse;
          }
          if (vm.userData.bulbMat) {
            vm.userData.bulbMat.emissiveIntensity = 0.5 + Math.sin(t * 2.0 + phase) * 0.4;
            const sc = 1.0 + Math.sin(t * 1.8 + phase) * 0.15;
            vm.scale.setScalar(sc);
          }

          // Gentle sway for vine tubes
          if (vm.userData.curve) {
            vm.rotation.z = Math.sin(t * 0.8 + phase) * 0.04;
            vm.rotation.x = Math.sin(t * 0.6 + phase * 1.3) * 0.03;
          }
        }

        // Red tint on windows
        for (let mi = 0; mi < ba.windowMats.length; mi++) {
          const wm = ba.windowMats[mi];
          const wp = 0.15 + Math.sin(t * 1.2 + mi) * 0.1;
          wm.color.setRGB(wp, wp * 0.05, 0);
        }
      }
    }

    // ─────────────────────────────────────────
    //  PLAYER ATTACK — daytime sword cleanse
    // ─────────────────────────────────────────
    let attackTargetIdx = -1;
    let swingTimer = 0;       // time within current swing
    let swingLanded = false;  // did this swing already remove a vine?

    function removeOneVine(ba) {
      if (!ba.vineMeshes || ba.vineMeshes.length === 0) return false;
      // Remove last vine mesh (tube or bulb)
      const vm = ba.vineMeshes.pop();
      if (vm.parent) vm.parent.remove(vm);
      if (vm.geometry) vm.geometry.dispose();
      if (vm.material) vm.material.dispose();
      // If no vines left, fully decontaminate
      if (ba.vineMeshes.length === 0) {
        decontaminateBuilding(ba);
        return true; // building cleansed
      }
      return false;
    }

    function updatePlayerAttack(dt) {
      const isDay = timeOfDay > 0.28 && timeOfDay < 0.72;
      swordGroup.visible = isDay && !ghostActive;

      if (!isDay || ghostActive) {
        isAttacking = false;
        swingTimer = 0;
        attackTargetIdx = -1;
        swingLanded = false;
        swordSwingPhase = Math.max(0, swordSwingPhase - dt * 4);
        swordGroup.rotation.z = 0.2;
        swordGroup.rotation.x = 0;
        return;
      }

      const px = playerGroup.position.x;
      const pz = playerGroup.position.z;

      if (mouseDown) {
        // Find nearest contaminated building
        let bestIdx = -1, bestD2 = CLEANSE_RANGE * CLEANSE_RANGE;
        for (let bi = 0; bi < buildingAttractors.length; bi++) {
          const ba = buildingAttractors[bi];
          if (!ba.contaminated || ba.destroyed) continue;
          const dd2 = (ba.x - px) ** 2 + (ba.z - pz) ** 2;
          if (dd2 < bestD2) { bestD2 = dd2; bestIdx = bi; }
        }

        if (bestIdx >= 0) {
          if (attackTargetIdx !== bestIdx) {
            attackTargetIdx = bestIdx;
            swingTimer = 0;
            swingLanded = false;
          }
          isAttacking = true;

          // Advance swing timer
          swingTimer += dt;

          // Swing arc: wind up → strike → follow through, repeating
          const swingT = (swingTimer % SWING_DURATION) / SWING_DURATION; // 0→1 per swing
          const windUp = Math.min(swingT * 3, 1.0);
          const strike = Math.max(0, Math.min((swingT - 0.33) * 3, 1.0));
          swordGroup.rotation.z = -0.3 - windUp * 1.2 + strike * 2.0;
          swordGroup.rotation.x = -0.3 - windUp * 0.6 + strike * 0.9;

          // Face the building
          const ba = buildingAttractors[bestIdx];
          const toX = ba.x - px, toZ = ba.z - pz;
          const targetAngle = Math.atan2(toX, toZ);
          let angleDiff = targetAngle - playerFacingAngle;
          while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
          while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
          playerFacingAngle += angleDiff * Math.min(1, 6 * dt);
          playerGroup.rotation.y = playerFacingAngle;

          // Strike lands at midpoint of each swing — remove one vine
          if (swingT > 0.5 && !swingLanded) {
            swingLanded = true;
            const cleansed = removeOneVine(ba);
            if (cleansed) {
              attackTargetIdx = -1;
              isAttacking = false;
              swingTimer = 0;
            }
          }
          // Reset for next swing cycle
          if (swingT < 0.1) {
            swingLanded = false;
          }
        } else {
          // Swinging at nothing
          isAttacking = false;
          attackTargetIdx = -1;
          swingTimer = 0;
          swordSwingPhase += dt * 6;
          swordGroup.rotation.z = -0.3 + Math.sin(swordSwingPhase) * 0.5;
          swordGroup.rotation.x = Math.sin(swordSwingPhase * 0.7) * 0.3;
        }
      } else {
        // Release — reset
        isAttacking = false;
        attackTargetIdx = -1;
        swingTimer = 0;
        swingLanded = false;
        // Return sword to rest
        swordSwingPhase *= 0.9;
        swordGroup.rotation.z = 0.2 + Math.sin(swordSwingPhase) * 0.05;
        swordGroup.rotation.x = 0;
      }
    }

    // ─────────────────────────────────────────
    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.05);

      // Time of day + moon phase advancement
      if (autoCycle) {
        timeOfDay = (timeOfDay + CYCLE_SPEED * dt) % 1;
      }
      const isDay = timeOfDay > 0.3 && timeOfDay < 0.7;
      // Advance moon phase on day→night transition
      if (lastDayState && !isDay) {
        dayCounter++;
        if (dayCounter >= DAYS_PER_PHASE) {
          dayCounter = 0;
          moonPhaseIndex = (moonPhaseIndex + 1) % MOON_PHASES.length;
        }
      }
      lastDayState = isDay;
      applyLighting(timeOfDay);
      updateTimeDisplay();

      // Player
      updatePlayer(dt);

      // Wind
      updateWind(dt);
      updateWindDebug(dt);

      // Smoke night glow — inversely proportional to moon brightness
      const nightFac = (timeOfDay <= 0.25 || timeOfDay >= 0.75)
        ? 1.0
        : (timeOfDay < 0.35 ? 1.0 - (timeOfDay - 0.25) / 0.10
         : timeOfDay > 0.65 ? (timeOfDay - 0.65) / 0.10 : 0.0);
      const moonBrightness = getCurrentMoonPhase().light;
      // Squared falloff: full moon → near zero glow, new moon → full glow
      const moonDim = (1.0 - moonBrightness * 0.3);
      smokeMat.uniforms.uNightGlow.value = nightFac * moonDim * moonDim;

      // NPCs + Mobs
      updateNPCs(dt);
      updateSquirrels(dt);
      updateGrowingTrees(dt);
      updateNightMobs(dt);

      // Building lights (deferred) + Smoke + Contamination
      updateBuildingLights(dt);
      updateSmoke(dt);
      updateChimneySmoke(dt);
      updateContamination(dt);
      updatePlayerAttack(dt);

      // Ghost cloud + player mesh visibility
      updateGhostCloud(dt);
      for (const part of playerBodyParts) part.visible = !ghostActive;

      // Camera
      updateCamera();
      drawAxisHud();

      deferredLightsRender();
    }

    // ─────────────────────────────────────────
    //  RESIZE
    // ─────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      _deferredColorTarget.setSize(window.innerWidth, window.innerHeight);
      _lightAccumMat.uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
    });

    // Start
    animate();
  </script>
</body>
